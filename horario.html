<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Horario de Clases · Organic English</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:transparent;margin:0;padding:0;overflow:hidden}

/* MODAL ocupa todo el iframe — el overlay oscuro lo maneja el modulo padre */
.modal{
  width:fit-content;
  min-width:500px;
  max-width:98vw;
  height:100%;
  background:#f1f5f9;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* TOPBAR */
.topbar{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;
  background:#1c2b5e;
}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-left img{height:34px;object-fit:contain}
.topbar-left h1{font-size:18px;font-weight:800;color:#fff}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn-sm{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:7px 16px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-sm:hover{background:rgba(255,255,255,0.22)}
.btn-close{background:rgba(220,38,38,0.25);border-color:rgba(220,38,38,0.45);color:#fca5a5}
.btn-close:hover{background:rgba(220,38,38,0.45);color:#fff}
.week-label{font-size:16px;color:rgba(255,255,255,0.9);font-weight:700}

/* LEGEND */
.legend{
  flex-shrink:0;
  display:flex;flex-wrap:wrap;align-items:center;gap:6px;
  padding:6px 20px;
  background:#fff;
  border-bottom:1px solid #e2e8f0;
}
.lg-t{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-right:4px}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:#64748b}
.ld{width:8px;height:8px;border-radius:2px}

/* AREA DE SCROLL — ocupa todo el espacio restante */
.scroll-area{
  flex:1;
  min-height:0;
  overflow-y:scroll;
  overflow-x:auto;
  padding:0 10px 12px 10px;
  background:#f1f5f9;
}
/* Scrollbar visible */
.scroll-area::-webkit-scrollbar{width:10px}
.scroll-area::-webkit-scrollbar-track{background:#e2e8f0}
.scroll-area::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:5px}
.scroll-area::-webkit-scrollbar-thumb:hover{background:#64748b}

/* GRID — columnas fijas: hora + 1fr por maestro */
.grid-horario{
  display:grid;
  gap:0;
  width:100%;
}

/* CABECERAS MAESTROS */
.t-head-empty{height:44px;position:sticky;top:0;z-index:10;background:#f1f5f9}
.t-header{
  background:#1c2b5e;
  border-radius:6px;
  padding:8px 6px;
  text-align:center;
  margin:6px 3px 0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:sticky;top:0;z-index:10;
}
.t-header.sin{background:#475569}
.t-name{font-size:13px;font-weight:700;color:#fff;line-height:1.3}
.t-id{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px}
.t-count{display:inline-block;margin-top:4px;font-size:11px;font-weight:700;background:rgba(249,115,22,0.25);color:#fb923c;padding:2px 8px;border-radius:100px}

/* SEPARADOR DE HORA — fila completa */
.hora-sep{
  grid-column:1 / -1;
  height:3px;
  background:#94a3b8;
  margin:4px 0;
  border-radius:2px;
}

/* ETIQUETA DE HORA */
.time-label{
  display:flex;align-items:flex-start;justify-content:center;
  font-size:13px;font-weight:700;color:#475569;
  padding:10px 4px 4px;
  white-space:nowrap;
}

/* CELDA */
.cell{
  padding:2px 3px;
  display:flex;flex-direction:column;gap:2px;
  min-height:48px;
}

/* TARJETA DE GRUPO */
.g-card{border-radius:5px;padding:4px 6px;cursor:pointer;transition:all 0.12s;box-shadow:0 1px 2px rgba(0,0,0,0.15)}
.g-card:hover{transform:translateY(-1px);filter:brightness(1.12);box-shadow:0 3px 8px rgba(0,0,0,0.25)}
.g-card.lvl-a1{background:#1e3a6e}
.g-card.lvl-a2{background:#0891b2}
.g-card.lvl-b1{background:#16a34a}
.g-card.lvl-b2{background:#ea580c}
.g-card.lvl-c1{background:#7c3aed}
.g-card.lvl-starter{background:#64748b}
.g-line1{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.g-id{font-size:12px;font-weight:700;color:rgba(255,255,255,0.7)}
.g-nombre{font-size:13px;font-weight:700;color:#fff}
.g-nombre.jovenes{color:#facc15}
.g-nivel{font-size:10px;font-weight:700;color:rgba(255,255,255,0.6);margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px}
.g-cap{font-size:11px;color:rgba(255,255,255,0.8)}
.g-cap strong{color:#fff}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:#64748b;gap:12px;padding:3rem}
.spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top:3px solid #f97316;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESPONSIVE MOVIL */
@media(max-width:640px){
  .modal{border-radius:12px}
  .topbar{padding:8px 12px}
  .topbar-left h1{font-size:14px}
  .topbar-left img{height:26px}
  .week-label{font-size:11px}
  .btn-sm{padding:5px 10px;font-size:11px}
  .legend{padding:4px 10px;gap:4px}
  .scroll-area{padding:0 6px 12px}
  .t-name{font-size:10px}
  .t-id{display:none}
  .g-id{font-size:9px}
  .g-nombre{font-size:10px}
  .g-nivel{max-width:40px;font-size:8px}
  .g-cap{font-size:9px}
  .time-label{font-size:11px;padding:6px 2px 2px}
}

/* MODAL ALUMNOS */
.st-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999}
.st-overlay.open{display:flex}
.st-box{background:#fff;border-radius:16px;padding:24px;max-width:400px;width:92%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,0.3)}
.st-box h2{font-size:17px;font-weight:800;color:#1c2b5e;margin-bottom:4px}
.st-sub{font-size:13px;color:#64748b;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #e2e8f0}
.st-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#f8fafc;border-radius:8px;margin-bottom:5px}
.st-num{width:22px;height:22px;border-radius:50%;background:#1c2b5e;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.st-id{font-size:11px;font-weight:700;color:#f97316;min-width:58px}
.st-name{font-size:13px;font-weight:600;color:#1e293b}
.st-empty{padding:2rem;text-align:center;color:#64748b;font-size:14px}
.st-close{width:100%;margin-top:14px;background:#f1f5f9;border:1px solid #e2e8f0;color:#64748b;padding:11px;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<div class="modal">

  <div class="topbar">
    <div class="topbar-left">
      <img src="https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/logoblanco.png">
      <h1>📅 Horario de Clases</h1>
    </div>
    <div class="topbar-right">
      <span class="week-label" id="weekLabel"></span>
      <button class="btn-sm" onclick="cambiarSemana(-1)">◀</button>
      <button class="btn-sm" onclick="cambiarSemana(1)">▶</button>
      <button class="btn-sm btn-close" onclick="cerrarHorario()">✕ Cerrar</button>
    </div>
  </div>

  <div class="legend">
    <span class="lg-t">Niveles</span>
    <span class="li"><span class="ld" style="background:#1e3a6e"></span>A1</span>
    <span class="li"><span class="ld" style="background:#0891b2"></span>A2</span>
    <span class="li"><span class="ld" style="background:#16a34a"></span>B1</span>
    <span class="li"><span class="ld" style="background:#ea580c"></span>B2</span>
    <span class="li"><span class="ld" style="background:#7c3aed"></span>C1</span>
    <span class="li"><span class="ld" style="background:#64748b"></span>Starter</span>
    <span style="margin-left:8px;font-size:11px;color:#94a3b8">👆 Clic en grupo para ver alumnos</span>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando horario...</p>
  </div>

  <div class="scroll-area" id="scrollArea" style="display:none">
    <div class="grid-horario" id="grid"></div>
  </div>

</div>

<!-- Modal alumnos -->
<div class="st-overlay" id="stOverlay" onclick="if(event.target===this)cerrarAlumnos()">
  <div class="st-box">
    <h2 id="stTitle"></h2>
    <div class="st-sub" id="stSub"></div>
    <div id="stList"></div>
    <button class="st-close" onclick="cerrarAlumnos()">Cerrar</button>
  </div>
</div>

<script>

const SHEET_ID = '1o4j9xO55LOMe7APJGYZlonq6pbAiN8Gy16istfKh0vU';

var urlParams = new URLSearchParams(window.location.search);
var returnUrl = urlParams.get('return');

var grupos = [], maestros = {}, alumnos = {}, allTeachers = [], byTeacher = {}, semanaOffset = 0;

function parseGS(cell) {
  if (!cell || cell.v === null || cell.v === undefined) return null;
  if (typeof cell.v === 'object' && cell.v.$t) return cell.v.$t;
  return cell.v;
}

function parseHour(h) {
  if (!h) return 99;
  var m = String(h).match(/(\d{1,2})[:\s]*(\d{2})?\s*(AM|PM)/i);
  if (!m) return 99;
  var hr = parseInt(m[1], 10);
  var p = (m[3]||'').toUpperCase();
  if (p === 'PM' && hr !== 12) hr += 12;
  if (p === 'AM' && hr === 12) hr = 0;
  return hr;
}

function fmtHour(h) {
  if (h === 0) return '12 AM';
  if (h < 12) return h + ' AM';
  if (h === 12) return '12 PM';
  return (h - 12) + ' PM';
}

function getLevelBase(n) {
  if (!n) return 'a1';
  var s = n.toLowerCase();
  if (s.includes('starter')) return 'starter';
  var m = n.match(/([ABC]\d)/i);
  return m ? m[1].toLowerCase() : 'a1';
}

function parseFechaGrupo(val) {
  if (!val) return null;
  if (typeof val === 'string' && val.startsWith('Date(')) {
    var p = val.replace('Date(','').replace(')','').split(',').map(Number);
    return new Date(p[0], p[1], p[2]);
  }
  if (typeof val === 'number') {
    var d = new Date(Date.UTC(1899, 11, 30) + val * 86400000);
    return isNaN(d) ? null : d;
  }
  var d = new Date(val);
  return isNaN(d) ? null : d;
}

async function cargarMaestros() {
  try {
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=MAESTROS&t=' + Date.now();
    var res = await fetch(url);
    var text = await res.text();
    var json = JSON.parse(text.substring(47, text.length - 2));
    json.table.rows.forEach(function(r) {
      var id = r.c[0]?.v || '', name = r.c[1]?.v || '';
      var activo = r.c[5]?.v;
      if (id && name && activo !== false) maestros[id] = name;
    });
  } catch(e) {}
}

async function cargarAlumnos() {
  try {
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=INSCRIPCIONES&t=' + Date.now();
    var res = await fetch(url);
    var text = await res.text();
    var json = JSON.parse(text.substring(47, text.length - 2));
    json.table.rows.forEach(function(r) {
      var idGrupo  = parseGS(r.c[4]) || '';
      var idAlumno = parseGS(r.c[0]) || '';
      var nombre   = parseGS(r.c[2]) || '';
      var estatus  = parseGS(r.c[6]) || '';
      if (idGrupo && nombre && estatus !== 'Cancelado' && estatus !== 'Baja') {
        if (!alumnos[idGrupo]) alumnos[idGrupo] = [];
        alumnos[idGrupo].push({ id: idAlumno, nombre: nombre });
      }
    });
  } catch(e) {}
}

async function cargarGrupos() {
  await Promise.all([cargarMaestros(), cargarAlumnos()]);
  try {
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=GRUPOS&t=' + Date.now();
    var res = await fetch(url);
    var text = await res.text();
    var json = JSON.parse(text.substring(47, text.length - 2));
    grupos = json.table.rows.map(function(r) {
      return {
        id:          parseGS(r.c[0]),
        nombre:      parseGS(r.c[1]),
        horario:     parseGS(r.c[2]),
        fechaInicio: r.c[3] ? (r.c[3].v || null) : null,
        nivel:       String(parseGS(r.c[4]) || '').trim(),
        cupoMax:     r.c[5]?.v ?? 10,
        inscritos:   r.c[6]?.v ?? 0,
        estado:      parseGS(r.c[8]) || '',
        idMaestro:   parseGS(r.c[11]) || '',
        demo:        parseGS(r.c[15]) || ''
      };
    }).filter(function(g) {
      var dem = String(g.demo||'').trim().toUpperCase();
      var est = String(g.estado||'').trim().toUpperCase();
      return g.id && est !== 'CANCELADO' && dem !== 'DEMO';
    });
    renderizar();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
  document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function mostrarAlumnos(idGrupo, grupoNombre) {
  var lista = alumnos[idGrupo] || [];
  document.getElementById('stTitle').textContent = grupoNombre || idGrupo;
  document.getElementById('stSub').textContent = idGrupo + ' · ' + lista.length + ' alumno' + (lista.length !== 1 ? 's' : '');
  var html = lista.length ? '' : '<div class="st-empty">Sin alumnos registrados</div>';
  lista.forEach(function(a, i) {
    html += '<div class="st-item">' +
      '<span class="st-num">' + (i+1) + '</span>' +
      '<span class="st-id">' + (a.id||'—') + '</span>' +
      '<span class="st-name">' + a.nombre + '</span>' +
      '</div>';
  });
  document.getElementById('stList').innerHTML = html;
  document.getElementById('stModal').classList.add('open');
}

function cerrarAlumnos() {
  document.getElementById('stModal').classList.remove('open');
}

function getWeekRange(offset) {
  var now = new Date();
  var day = now.getDay();
  var diff = day === 0 ? -6 : 1 - day;
  var mon = new Date(now); mon.setDate(now.getDate() + diff + offset * 7);
  var thu = new Date(mon); thu.setDate(mon.getDate() + 3);
  return { monday: mon, thursday: thu };
}

function fmtDate(d) {
  var months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return ('0'+d.getDate()).slice(-2) + ' ' + months[d.getMonth()];
}

function renderizar() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('loading').style.display = 'none';
  // Limpiar Sin Asignar del render anterior para evitar duplicados
  delete maestros['__sin__'];

  var rng = getWeekRange(semanaOffset);
  var jueves = new Date(rng.thursday); jueves.setHours(23,59,59,0);

  var label = (semanaOffset === 0 ? 'Esta semana' : semanaOffset === -1 ? 'Semana pasada' : 'Prox. semana');
  document.getElementById('weekLabel').textContent = label + ' · ' + fmtDate(rng.monday) + ' — ' + fmtDate(rng.thursday);

  // Filtrar grupos activos acumulados hasta el jueves de la semana mostrada
  var gruposSemana = grupos.filter(function(g) {
    var fi = parseFechaGrupo(g.fechaInicio);
    if (!fi) return false;
    fi.setHours(0,0,0,0);
    return fi <= jueves;
  });

  // Construir byTeacher
  byTeacher = {};
  var haySinAsignar = false;

  gruposSemana.forEach(function(g) {
    var esSin = !g.idMaestro || !maestros[g.idMaestro];
    var key = esSin ? '__sin__' : g.idMaestro;
    if (esSin) haySinAsignar = true;
    if (!byTeacher[key]) byTeacher[key] = [];
    byTeacher[key].push(g);
  });

  // Maestros SIEMPRE visibles (todos los activos), ordenados por nombre
  // Agregar Sin Asignar ANTES de construir allTeachers para evitar duplicados
  if (haySinAsignar) {
    maestros['__sin__'] = 'Sin Asignar';
  }

  allTeachers = Object.keys(maestros)
    .filter(function(k){ return k !== '__sin__'; })
    .sort(function(a,b){ return (maestros[a]||a).localeCompare(maestros[b]||b); });

  if (haySinAsignar) {
    allTeachers.push('__sin__');
  }

  // Horas con grupos
  var hoursSet = {};
  gruposSemana.forEach(function(g) {
    var h = parseHour(g.horario);
    if (h !== 99) hoursSet[h] = true;
  });
  var hours = Object.keys(hoursSet).map(Number).sort(function(a,b){return a-b;});

  var grid = document.getElementById('grid');
  // Columnas compactas: min 110px, max 1fr
  grid.style.gridTemplateColumns = '56px repeat(' + allTeachers.length + ', 1fr)';

  var html = '<div></div>'; // celda vacía esquina

  // Cabeceras de maestros
  allTeachers.forEach(function(tid) {
    var tname = maestros[tid] || tid;
    var tg = byTeacher[tid] || [];
    var cls = tid === '__sin__' ? 't-header sin-asignar' : 't-header';
    html += '<div class="' + cls + '">' +
      '<span class="t-name">' + tname + '</span>' +
      '<span class="t-id">' + (tid === '__sin__' ? '' : tid) + '</span>' +
      '<span class="t-count">' + tg.length + ' grupo' + (tg.length !== 1 ? 's' : '') + '</span>' +
      '</div>';
  });

  // Filas por hora
  hours.forEach(function(h) {
    html += '<div class="hora-sep" style="grid-column:1/-1"></div>';
    html += '<div class="time-label">' + fmtHour(h) + '</div>';
    allTeachers.forEach(function(tid) {
      var tg = byTeacher[tid] || [];
      var matching = tg.filter(function(g) { return parseHour(g.horario) === h; });
      html += '<div class="cell' + (matching.length ? ' has-groups' : '') + '">';
      matching.forEach(function(g) {
        var lb = getLevelBase(g.nivel);
        var insc = Math.max(0, Math.min(g.cupoMax, g.inscritos));
        var vac  = Math.max(0, g.cupoMax - insc);
        var nom  = (g.nombre||'').trim();
        var nc   = 'g-nombre' + (nom.toLowerCase() === 'jovenes' ? ' jovenes' : '');
        var niv  = g.nivel.replace(/Bloque\s*/gi,'Bloq. ').replace(/Nivel\s*/gi,'').trim();
        html += '<div class="g-card lvl-' + lb + '" onclick="mostrarAlumnos(\'' + g.id + '\',\'' + nom.replace(/'/g,"\\'") + '\')">';
        html += '<div class="g-line"><span class="g-id">' + g.id + '</span><span class="' + nc + '">' + nom + '</span><span class="g-nivel">' + niv + '</span></div>';
        html += '<div class="g-line"><span class="g-cap"><strong>' + vac + '</strong> vac. · ' + insc + '/' + g.cupoMax + '</span></div>';
        html += '</div>';
      });
      html += '</div>';
    });
  });

  grid.innerHTML = html;
  document.getElementById('scrollArea').style.display = 'block';

  // Notificar al padre si está en iframe
  window.addEventListener('message', function(e) {
    if (e.data === 'cerrarHorario') cerrarHorario();
  });
}

function cambiarSemana(dir) { semanaOffset += dir; renderizar(); }

function cerrarHorario() {
  // Siempre notificar al padre — el overlay lo maneja el modulo padre
  if (window.parent && window.parent !== window) {
    window.parent.postMessage('cerrarHorario', '*');
  } else {
    history.back();
  }
}

cargarGrupos();

</script>
</body>
</html>

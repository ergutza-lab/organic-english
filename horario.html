<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Horario · Organic English</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f1f5f9;--surface:#ffffff;--surface2:#f8fafc;--border:#e2e8f0;--navy:#1c2b5e;--orange:#f97316;--orange2:#fb923c;--text:#1e293b;--text-muted:#64748b;--text-subtle:#94a3b8}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{min-height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text)}

/* TOPBAR */
.topbar{background:var(--navy);padding:12px 16px;display:flex;flex-direction:column;gap:10px;position:sticky;top:0;z-index:100}
.topbar-row1{display:flex;align-items:center;justify-content:space-between}
.topbar-logo{display:flex;align-items:center;gap:8px}
.topbar-logo img{height:30px;object-fit:contain}
.topbar-logo h1{font-size:17px;font-weight:800;color:#fff}
.btn-close{background:rgba(220,38,38,0.25);border:1px solid rgba(220,38,38,0.4);color:#fca5a5;font-size:13px;font-weight:700;padding:7px 14px;border-radius:100px;cursor:pointer;font-family:'DM Sans',sans-serif}
.topbar-row2{display:flex;align-items:center;justify-content:space-between}
.week-label{font-size:13px;font-weight:600;color:rgba(255,255,255,0.7)}
.week-nav{display:flex;gap:6px}
.btn-nav{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.18);color:#fff;font-size:15px;width:36px;height:36px;border-radius:100px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center}

/* LEGEND */
.legend{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;flex-wrap:wrap;gap:6px 12px;align-items:center}
.lg-t{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;width:100%}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted)}
.ldot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* CONTENT */
.content{padding:12px 12px 80px}

/* TEACHER SECTION */
.teacher-section{margin-bottom:12px;background:var(--surface);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.teacher-header{background:var(--navy);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.teacher-header.sin-asignar{background:#475569}
.t-name{font-size:14px;font-weight:800;color:#fff}
.t-badge{font-size:11px;font-weight:700;background:rgba(249,115,22,0.2);color:var(--orange2);padding:3px 10px;border-radius:100px}

/* HOUR BLOCK */
.hour-block{border-top:1px solid var(--border)}
.hour-block:first-child{border-top:none}
.hour-label{padding:6px 14px;font-size:11px;font-weight:700;color:var(--text-muted);background:var(--surface2);text-transform:uppercase;letter-spacing:0.04em}
.groups-list{display:flex;flex-direction:column;gap:6px;padding:8px 10px}

/* GROUP CARD */
.g-card{border-radius:10px;padding:10px 12px;cursor:pointer;active-outline:none;-webkit-tap-highlight-color:transparent}
.g-card:active{filter:brightness(1.15)}
.g-card.lvl-a1{background:#1e3a6e;border:1px solid rgba(255,255,255,0.12)}
.g-card.lvl-a2{background:#0891b2;border:1px solid rgba(255,255,255,0.12)}
.g-card.lvl-b1{background:#16a34a;border:1px solid rgba(255,255,255,0.12)}
.g-card.lvl-b2{background:#ea580c;border:1px solid rgba(255,255,255,0.12)}
.g-card.lvl-c1{background:#7c3aed;border:1px solid rgba(255,255,255,0.12)}
.g-card.lvl-starter{background:#64748b;border:1px solid rgba(255,255,255,0.15)}
.g-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.g-id{font-size:11px;font-weight:700;color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.2);padding:2px 7px;border-radius:100px}
.g-nombre{font-size:14px;font-weight:800;color:#fff;flex:1}
.g-nombre.jovenes{color:#facc15}
.g-nivel{font-size:10px;font-weight:700;color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.2);padding:2px 8px;border-radius:100px;white-space:nowrap}
.g-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.g-cap{font-size:12px;color:rgba(255,255,255,0.8)}
.g-cap strong{color:#fff;font-weight:700}
.g-tap{font-size:10px;color:rgba(255,255,255,0.5);font-weight:600}

/* LOADING / ERROR */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:12px;color:var(--text-muted)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top:3px solid var(--orange);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{margin:2rem;background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:1.5rem;text-align:center;color:#dc2626;font-size:14px}

/* STUDENT MODAL — BOTTOM SHEET */
.st-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.st-overlay.open{display:flex}
.st-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-height:80vh;overflow-y:auto}
.st-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.st-title{font-size:17px;font-weight:800;color:var(--navy);margin-bottom:2px}
.st-sub{font-size:13px;color:var(--text-muted);margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.st-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:10px;margin-bottom:6px}
.st-num{width:24px;height:24px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.st-id{font-size:11px;font-weight:700;color:#f97316;min-width:64px;flex-shrink:0}
.st-name{font-size:13px;font-weight:600;color:var(--text)}
.st-empty{padding:2rem;text-align:center;color:var(--text-muted);font-size:14px}
.st-close{width:100%;margin-top:16px;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:12px;border-radius:100px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row1">
    <div class="topbar-logo">
      <img src="https://github.com/ergutza-lab/organic-english-classes/raw/main/imagenes/logoblanco2.png" alt="OE">
      <h1>Horario</h1>
    </div>
    <button class="btn-close" onclick="cerrarModal()">✕ Cerrar</button>
  </div>
  <div class="topbar-row2">
    <span class="week-label" id="weekLabel">Cargando...</span>
    <div class="week-nav">
      <button class="btn-nav" onclick="cambiarSemana(-1)">◀</button>
      <button class="btn-nav" onclick="cambiarSemana(1)">▶</button>
    </div>
  </div>
</div>

<div class="legend" id="legend">
  <span class="lg-t">Niveles</span>
  <span class="legend-item"><span class="ldot" style="background:#1e3a6e"></span>A1</span>
  <span class="legend-item"><span class="ldot" style="background:#0891b2"></span>A2</span>
  <span class="legend-item"><span class="ldot" style="background:#16a34a"></span>B1</span>
  <span class="legend-item"><span class="ldot" style="background:#ea580c"></span>B2</span>
  <span class="legend-item"><span class="ldot" style="background:#7c3aed"></span>C1</span>
  <span class="legend-item"><span class="ldot" style="background:#64748b"></span>Starter</span>
</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>Cargando horario...</p>
</div>
<div id="error" class="error-box" style="display:none"><p>No se pudieron cargar los datos.</p></div>
<div id="content" class="content" style="display:none"></div>

<!-- Bottom Sheet Modal -->
<div class="st-overlay" id="stOverlay" onclick="if(event.target===this)cerrarAlumnos()">
  <div class="st-sheet">
    <div class="st-handle"></div>
    <div class="st-title" id="stTitle">Alumnos</div>
    <div class="st-sub" id="stSub"></div>
    <div id="stList"></div>
    <button class="st-close" onclick="cerrarAlumnos()">Cerrar</button>
  </div>
</div>

<script>
const SHEET_ID = '1o4j9xO55LOMe7APJGYZlonq6pbAiN8Gy16istfKh0vU';

var urlParams = new URLSearchParams(window.location.search);
var returnUrl = urlParams.get('return');

var grupos = [], maestros = {}, alumnos = {}, allTeachers = [], byTeacher = {}, semanaOffset = 0;

function parseGS(cell) {
  if (!cell || !cell.v) return null;
  if (typeof cell.v === 'object' && cell.v.$t) return cell.v.$t;
  return cell.v;
}

function parseHour(h) {
  if (!h) return 99;
  var m = h.match(/(\d{1,2})[:\s]*(\d{2})?\s*(AM|PM)/i);
  if (!m) return 99;
  var hr = parseInt(m[1], 10);
  var p = (m[3]||'').toUpperCase();
  if (p === 'PM' && hr !== 12) hr += 12;
  if (p === 'AM' && hr === 12) hr = 0;
  return hr;
}

function fmtHour(h) {
  if (h === 0) return '12 AM';
  if (h < 12) return h + ' AM';
  if (h === 12) return '12 PM';
  return (h - 12) + ' PM';
}

function getLevelBase(n) {
  if (!n) return 'a1';
  if (n.toLowerCase().includes('starter')) return 'starter';
  var m = n.match(/([ABC]\d)/i);
  return m ? m[1].toLowerCase() : 'a1';
}

function parseFechaGrupo(val) {
  if (!val) return null;
  if (typeof val === 'string' && val.startsWith('Date(')) {
    var p = val.replace('Date(','').replace(')','').split(',').map(Number);
    return new Date(p[0], p[1], p[2]);
  }
  if (typeof val === 'number') {
    var d = new Date(Date.UTC(1899, 11, 30) + val * 86400000);
    return isNaN(d) ? null : d;
  }
  var d = new Date(val);
  return isNaN(d) ? null : d;
}

async function cargarMaestros() {
  try {
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=MAESTROS&t=' + Date.now();
    var res = await fetch(url);
    var text = await res.text();
    var json = JSON.parse(text.substring(47, text.length - 2));
    json.table.rows.forEach(function(r) {
      var id = r.c[0]?.v || '', name = r.c[1]?.v || '';
      if (id && name && !String(id).toUpperCase().startsWith('S-')) maestros[id] = name;
    });
  } catch(e) {}
}

async function cargarAlumnos() {
  try {
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=INSCRIPCIONES&t=' + Date.now();
    var res = await fetch(url);
    var text = await res.text();
    var json = JSON.parse(text.substring(47, text.length - 2));
    json.table.rows.forEach(function(r) {
      var idGrupo = parseGS(r.c[4]) || '';
      var idAlumno = parseGS(r.c[0]) || '';
      var nombre = parseGS(r.c[2]) || '';
      var estatus = parseGS(r.c[6]) || '';
      if (idGrupo && nombre && estatus !== 'Cancelado') {
        if (!alumnos[idGrupo]) alumnos[idGrupo] = [];
        alumnos[idGrupo].push({id: idAlumno, nombre: nombre});
      }
    });
  } catch(e) {}
}

async function cargarGrupos() {
  await Promise.all([cargarMaestros(), cargarAlumnos()]);
  try {
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=GRUPOS&t=' + Date.now();
    var res = await fetch(url);
    var text = await res.text();
    var json = JSON.parse(text.substring(47, text.length - 2));
    grupos = json.table.rows.map(function(r) {
      return {
        id: parseGS(r.c[0]), nombre: parseGS(r.c[1]), horario: parseGS(r.c[2]),
        fechaInicio: r.c[3] ? (r.c[3].v || null) : null,
        nivel: String(parseGS(r.c[4]) || '').trim(),
        cupoMax: r.c[5]?.v ?? 10, inscritos: r.c[6]?.v ?? 0,
        estado: parseGS(r.c[8]) || '',
        idMaestro: parseGS(r.c[11]) || '', demo: parseGS(r.c[15]) || ''
      };
    }).filter(function(g) {
      return g.id && String(g.estado).trim() !== 'Cancelado' && !g.demo;
    });
    renderizar();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function mostrarAlumnos(idGrupo, grupoNombre) {
  var lista = alumnos[idGrupo] || [];
  document.getElementById('stTitle').textContent = grupoNombre || idGrupo;
  document.getElementById('stSub').textContent = idGrupo + ' · ' + lista.length + ' alumno' + (lista.length !== 1 ? 's' : '');
  var html = lista.length ? '' : '<div class="st-empty">Sin alumnos registrados</div>';
  lista.forEach(function(a, i) {
    html += '<div class="st-item"><span class="st-num">' + (i+1) + '</span>' +
      '<span class="st-id">' + (a.id||'—') + '</span>' +
      '<span class="st-name">' + (a.nombre||a) + '</span></div>';
  });
  document.getElementById('stList').innerHTML = html;
  document.getElementById('stOverlay').classList.add('open');
}

function cerrarAlumnos() {
  document.getElementById('stOverlay').classList.remove('open');
}

function getWeekRange(offset) {
  var now = new Date();
  var day = now.getDay();
  var diff = day === 0 ? -6 : 1 - day;
  var mon = new Date(now); mon.setDate(now.getDate() + diff + offset * 7);
  var thu = new Date(mon); thu.setDate(mon.getDate() + 3);
  return { monday: mon, thursday: thu };
}

function fmtDate(d) {
  var dd = ('0' + d.getDate()).slice(-2);
  var months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return dd + ' ' + months[d.getMonth()];
}

function renderizar() {
  document.getElementById('loading').style.display = 'none';

  var rng = getWeekRange(semanaOffset);
  var jueves = new Date(rng.thursday); jueves.setHours(23,59,59,0);

  document.getElementById('weekLabel').textContent = fmtDate(rng.monday) + ' — ' + fmtDate(rng.thursday);

  var gruposSemana = grupos.filter(function(g) {
    var fi = parseFechaGrupo(g.fechaInicio);
    if (!fi) return false;
    fi.setHours(0,0,0,0);
    return fi <= jueves;
  });

  byTeacher = {};
  var haySinAsignar = false;
  gruposSemana.forEach(function(g) {
    var esSinAsignar = !g.idMaestro || !maestros[g.idMaestro] || String(g.idMaestro).toUpperCase().startsWith('S-');
    var key = esSinAsignar ? '__sin__' : g.idMaestro;
    if (esSinAsignar) haySinAsignar = true;
    if (!byTeacher[key]) byTeacher[key] = [];
    byTeacher[key].push(g);
  });

  allTeachers = Object.keys(maestros).sort(function(a,b) {
    return (maestros[a]||a).localeCompare(maestros[b]||b);
  });
  if (haySinAsignar) {
    maestros['__sin__'] = 'Sin Asignar';
    if (allTeachers.indexOf('__sin__') === -1) allTeachers.push('__sin__');
  }

  var html = '';

  allTeachers.forEach(function(tid) {
    var tg = byTeacher[tid] || [];
    if (!tg.length) return;
    var tname = maestros[tid] || tid;

    // Agrupar por hora
    var hoursMap = {};
    tg.forEach(function(g) {
      var h = parseHour(g.horario);
      if (!hoursMap[h]) hoursMap[h] = [];
      hoursMap[h].push(g);
    });
    var hours = Object.keys(hoursMap).map(Number).sort(function(a,b){return a-b;});

    var headerClass = 'teacher-header' + (tid === '__sin__' ? ' sin-asignar' : '');
    html += '<div class="teacher-section">';
    html += '<div class="' + headerClass + '"><span class="t-name">' + tname + '</span><span class="t-badge">' + tg.length + ' grupo' + (tg.length!==1?'s':'') + '</span></div>';

    hours.forEach(function(h) {
      var gs = hoursMap[h];
      html += '<div class="hour-block"><div class="hour-label">' + fmtHour(h) + '</div><div class="groups-list">';
      gs.forEach(function(g) {
        var lb = getLevelBase(g.nivel);
        var insc = Math.max(0, Math.min(g.cupoMax, g.inscritos));
        var vac = Math.max(0, g.cupoMax - insc);
        var nom = (g.nombre||'').trim();
        var nc = 'g-nombre' + (nom.toLowerCase() === 'jovenes' ? ' jovenes' : '');
        var niv = g.nivel.replace(/Bloque/gi,'Bloq.').replace(/Starter/gi,'Starter');
        html += '<div class="g-card lvl-' + lb + '" onclick="mostrarAlumnos(\'' + g.id + '\',\'' + nom.replace(/'/g,"\\'") + '\')">';
        html += '<div class="g-top"><span class="g-id">' + g.id + '</span><span class="' + nc + '">' + nom + '</span><span class="g-nivel">' + niv + '</span></div>';
        html += '<div class="g-bottom"><span class="g-cap"><strong>' + vac + '</strong> vacante' + (vac!==1?'s':'') + ' · ' + insc + '/' + g.cupoMax + '</span><span class="g-tap">Ver alumnos ›</span></div>';
        html += '</div>';
      });
      html += '</div></div>';
    });

    html += '</div>';
  });

  if (!html) {
    html = '<div style="padding:2rem;text-align:center;color:var(--text-muted);font-size:14px;">No hay grupos activos esta semana.</div>';
  }

  document.getElementById('content').innerHTML = html;
  document.getElementById('content').style.display = 'block';
}

function cambiarSemana(dir) { semanaOffset += dir; renderizar(); }

function cerrarModal() {
  if (returnUrl) { window.location.href = returnUrl; }
  else if (window.parent && window.parent !== window) { window.parent.postMessage('cerrarHorario', '*'); }
  else { history.back(); }
}

cargarGrupos();
</script>
</body>
</html>

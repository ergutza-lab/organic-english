<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Asesor — Organic English</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background-color: #0f172a; 
    font-family: 'Segoe UI', Arial, sans-serif; 
    min-height: 100vh;
    background-image: url('https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/hero3.webp');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.75);
    z-index: -1;
  }
  .screen { position: relative; z-index: 1; display: none; }
  .screen.active { display: block; }

  /* LOGIN */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-box { background: #1e2a4a; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.08); }
  .login-box img { display: block; margin: 0 auto 10px; height: 80px; }
  .login-box h1 { color: #fff; font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 6px; }
  .login-box p { color: #64748b; font-size: 13px; text-align: center; margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; color: #94a3b8; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
  .field input { width: 100%; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 16px; color: #f1f5f9; font-size: 15px; outline: none; }
  .field input:focus { border-color: #f97316; }
  .btn-primary { width: 100%; background: linear-gradient(135deg, #f97316, #ea580c); color: #fff; border: none; border-radius: 100px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .btn-primary:hover { opacity: 0.9; }
  .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 12px 16px; color: #f87171; font-size: 13px; margin-top: 14px; display: none; text-align: center; }

  /* PANEL */
  .panel-wrap { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .panel-header img { height: 36px; }
  .btn-logout { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; border-radius: 100px; padding: 8px 16px; font-size: 12px; cursor: pointer; }

  .bienvenida { background: linear-gradient(135deg, #1c2b5e, #0f1a3d); border-radius: 16px; padding: 24px; margin-bottom: 20px; border-bottom: 3px solid #f97316; }
  .bienvenida p { color: #94a3b8; font-size: 13px; margin-bottom: 4px; }
  .bienvenida h2 { color: #fff; font-size: 22px; font-weight: 600; }

  .seccion-titulo { color: #64748b; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }

  .alumno-card { background: #1e2a4a; border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06); }
  .alumno-card .nombre { color: #f1f5f9; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .alumno-card .detalle { color: #64748b; font-size: 12px; margin-bottom: 12px; }
  .alumno-card .detalle span { color: #94a3b8; margin-right: 12px; }
  .card-actions { display: flex; gap: 10px; }
  .btn-validar { flex: 1; background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; border: none; border-radius: 100px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-validar:hover { opacity: 0.9; }
  .btn-whatsapp { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; border-radius: 100px; padding: 10px 16px; font-size: 13px; cursor: pointer; text-decoration: none; display: inline-block; }

  .empty-state { text-align: center; padding: 40px 20px; color: #475569; }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
  .loading { text-align: center; padding: 40px; color: #475569; font-size: 14px; }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.active { display:flex; }
  .modal-box { background:#1e2a4a; border-radius:20px; padding:32px 24px; width:100%; max-width:380px; border:1px solid rgba(255,255,255,0.08); text-align:center; }
  .modal-box .modal-icon { font-size:40px; margin-bottom:12px; }
  .modal-box h3 { color:#f1f5f9; font-size:17px; font-weight:600; margin-bottom:8px; }
  .modal-box p { color:#64748b; font-size:13px; margin-bottom:24px; line-height:1.5; }
  .modal-actions { display:flex; flex-direction:column; gap:10px; }
  .btn-notificar { background:linear-gradient(135deg,#16a34a,#15803d); color:#fff; border:none; border-radius:100px; padding:13px; font-size:14px; font-weight:700; cursor:pointer; }
  .btn-cerrar-modal { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#94a3b8; border-radius:100px; padding:13px; font-size:14px; cursor:pointer; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screenLogin" class="screen active">
  <div class="login-wrap">
    <div class="login-box">
      <img src="https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/logoblanco.png" />
      <h1>Panel de Asesor</h1>
      <p>Ingresa con tu ID y clave personal</p>
      <div class="field">
        <label>ID de Asesor</label>
        <input type="text" id="inputId" placeholder="Ej: ASE-01" autocomplete="off" />
      </div>
      <div class="field">
        <label>Clave</label>
        <input type="text" id="inputClave" placeholder="Tu clave personal" autocomplete="off" />
      </div>
      <button class="btn-primary" onclick="login()">Entrar</button>
      <div class="error-msg" id="errorMsg">ID o clave incorrectos. Intenta de nuevo.</div>
    </div>
  </div>
</div>

<!-- PANEL -->
<div id="screenPanel" class="screen">
  <div class="panel-wrap">
    <div class="panel-header">
      <img src="https://media.base44.com/images/public/69b6f6597a3725a9077d7706/42de62c34_image.png" alt="Organic English" />
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
    <div class="bienvenida">
      <p>Bienvenido/a,</p>
      <h2 id="asesorNombre">—</h2>
    </div>
    <div class="seccion-titulo">Alumnos pendientes de validación de pago</div>
    <div id="listaPendientes"><div class="loading">Cargando...</div></div>
    <div style="margin-top:28px;padding:14px 18px;background:#1e2a4a;border-radius:12px;border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between">
      <span style="color:#64748b;font-size:12px">Comisiones esta semana</span>
      <span id="comisionSemana" style="color:#fb923c;font-size:14px;font-weight:700">$0 MXN</span>
    </div>
  </div>
</div>

<!-- MODAL NOTIFICACIÓN -->
<div class="modal-overlay" id="modalNotificacion">
  <div class="modal-box">
    <div class="modal-icon">✅</div>
    <h3 id="modalTitulo">Plaza validada</h3>
    <p id="modalMensaje"></p>
    <div class="modal-actions">
      <button class="btn-notificar" id="btnNotificar">Notificar</button>
      <button class="btn-cerrar-modal" onclick="cerrarModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>
  const APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbwZm4Yl1u_Qm-FSyS6FGA84wV8cp6flpHggXnslzg-PxlUD7LVD-1Iftr3NHBJwHFYO/exec';

  var asesorData = null;
  var modalData = null;

  function login() {
    var id    = document.getElementById('inputId').value.trim().toUpperCase();
    var clave = document.getElementById('inputClave').value.trim();
    var err   = document.getElementById('errorMsg');
    if (!id || !clave) { err.style.display = 'block'; err.textContent = 'Completa todos los campos.'; return; }
    err.style.display = 'none';
    var btn = document.querySelector('.btn-primary');
    btn.textContent = 'Verificando...';
    btn.disabled = true;
    fetch(APPS_SCRIPT + '?action=loginAsesor&id=' + encodeURIComponent(id) + '&clave=' + encodeURIComponent(clave))
      .then(r => r.json())
      .then(data => {
        btn.textContent = 'Entrar';
        btn.disabled = false;
        if (data.success) {
          asesorData = data.asesor;
          mostrarPanel();
        } else {
          err.style.display = 'block';
          err.textContent = 'ID o clave incorrectos. Intenta de nuevo.';
        }
      })
      .catch(() => {
        btn.textContent = 'Entrar';
        btn.disabled = false;
        err.style.display = 'block';
        err.textContent = 'Error de conexión. Intenta más tarde.';
      });
  }

  function mostrarPanel() {
    document.getElementById('screenLogin').classList.remove('active');
    document.getElementById('screenPanel').classList.add('active');
    document.getElementById('asesorNombre').textContent = asesorData.nombre;
    document.getElementById('comisionSemana').textContent = '$' + asesorData.comisionSemana + ' MXN';
    renderPendientes(asesorData.alumnosPendientes);
  }

  function calcularVencimiento(fechaRegistro) {
    var fecha = new Date(fechaRegistro);
    var dia = fecha.getDay();
    var diasSumar = 1;
    if (dia === 5) diasSumar = 3; // viernes → lunes
    if (dia === 6) diasSumar = 2; // sábado → lunes
    if (dia === 0) diasSumar = 1; // domingo → lunes
    fecha.setDate(fecha.getDate() + diasSumar);
    var dias = ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
    var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return dias[fecha.getDay()] + ' ' + fecha.getDate() + ' de ' + meses[fecha.getMonth()] + ' a las 4:00 PM';
  }

  function renderPendientes(pendientes) {
    var lista = document.getElementById('listaPendientes');
    if (!pendientes || pendientes.length === 0) {
      lista.innerHTML = '<div class="empty-state"><div class="icon">✓</div><p>No tienes alumnos pendientes de pago.</p></div>';
      return;
    }
    lista.innerHTML = pendientes.map(function(a) {
      var fecha = new Date(a.fecha);
      var fechaStr = fecha.getDate() + '/' + (fecha.getMonth()+1) + '/' + fecha.getFullYear();
      var vencimiento = calcularVencimiento(a.fecha);
      var msg;
if (!a.idGrupo || a.idGrupo === 'undefined') {
  msg = '¡Hola! ' + a.nombre + ' Con gusto te comparto la informacion para completar tu inscripcion en Organic English.\n\n' +
    '⚠️ IMPORTANTE: Tu registro vence el ' + vencimiento + '. Despues de esta hora, el sistema cancela automaticamente los lugares sin pago validado.\n\n' +
    'Opciones de pago:\n' +
    '· $150 MXN — Pago semanal (lunes a jueves).\n' +
    '· $570 MXN — Pago por 4 semanas (Ahorras $30).\n\n' +
    'Datos Bancarios (BBVA):\n' +
    '· Cuenta: 1234 5678 9012 3456\n' +
    '· CLABE: 012 345 678 901 234 567\n' +
    '· Titular: Organic English S.A. de C.V.\n\n' +
    'Proceso de validacion y alta:\n' +
    '1. Una vez realizado el pago, enviame tu comprobante por este medio (PDF o foto). Asegurate de que se vean claramente: fecha, monto, numero de referencia y tu nombre.\n' +
    '2. Cuando tu pago quede validado, el encargado de colocacion se pondra en contacto contigo para agendar tu evaluacion y asignarte al grupo ideal segun tu nivel.\n' +
    '3. Una vez que tengas un grupo asignado, recibiras un correo con el acceso a tus clases y los datos de tu Asistente de Control Escolar, quien te apoyara con dudas de pagos o grupo.\n\n' +
    'Nota: Tu inscripcion cubre la primera semana. A partir de la segunda, los comprobantes se suben directamente a tu panel personal.';
} else {
  msg = '¡Hola! ' + a.nombre + ' Con gusto te comparto la informacion para completar tu inscripcion en Organic English.\n\n' +
    '⚠️ IMPORTANTE: Tu reserva vence el ' + vencimiento + '. Despues de esta hora, el sistema cancela automaticamente los lugares sin pago validado.\n\n' +
    'Opciones de pago:\n' +
    '· $150 MXN — Pago semanal (lunes a jueves).\n' +
    '· $570 MXN — Pago por 4 semanas (Ahorras $30).\n\n' +
    'Datos Bancarios (BBVA):\n' +
    '· Cuenta: 1234 5678 9012 3456\n' +
    '· CLABE: 012 345 678 901 234 567\n' +
    '· Titular: Organic English S.A. de C.V.\n\n' +
    'Pasos siguientes:\n' +
    '1. Envia tu comprobante (PDF o foto) por aqui. Asegurate de que se vea: fecha, monto, referencia y tu nombre.\n' +
    '2. Una vez validado, recibiras un correo con el acceso a tus clases y los datos de tu Asistente de Control Escolar, quien te apoyara con dudas de pagos o grupo.\n\n' +
    'Nota: Tu inscripcion cubre la primera semana. A partir de la segunda, los comprobantes se suben directamente a tu panel personal.';
}
      var waUrl = 'https://wa.me/52' + a.whatsapp + '?text=' + encodeURIComponent(msg);
      return '<div class="alumno-card">' +
        '<div class="nombre">' + a.nombre + ' <span style="font-size:11px;font-weight:500;padding:2px 8px;border-radius:100px;background:rgba(249,115,22,0.15);color:#fb923c;">' + (a.idGrupo ? a.idGrupo : 'Por colocacion') + '</span></div>' +
        '<div class="detalle">' +
          '<span>' + a.idAlumno + '</span>' +
          '<span>' + (a.idGrupo || '') + '</span>' +
          '<span>Reserva: ' + fechaStr + '</span>' +
        '</div>' +
        '<div class="card-actions">' +
          '<button class="btn-validar" onclick="validarPago(\'' + a.idAlumno + '\', this)">Validar pago</button>' +
          '<a class="btn-whatsapp" href="' + waUrl + '" target="_blank">WhatsApp</a>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function validarPago(idAlumno, btn) {
    btn.textContent = 'Validando...';
    btn.disabled = true;
    fetch(APPS_SCRIPT + '?action=validarPago&idAlumno=' + encodeURIComponent(idAlumno))
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          var card = btn.closest('.alumno-card');
          card.style.opacity = '0.4';
          card.style.pointerEvents = 'none';
          btn.textContent = 'Validado';
          asesorData.comisionSemana += 100;
          document.getElementById('comisionSemana').textContent = '$' + asesorData.comisionSemana + ' MXN';
          if (data.esColocacion) {
            modalData = { tipo: 'colocacion', data: data };
            document.getElementById('modalTitulo').textContent = 'Pago validado';
            document.getElementById('modalMensaje').textContent =
              'El pago de ' + data.nombreAlumno + ' ha sido registrado. ¿Deseas notificar al alumno y al encargado de colocación?';
          } else {
            modalData = { tipo: 'normal', data: data };
            document.getElementById('modalTitulo').textContent = 'Plaza validada';
            document.getElementById('modalMensaje').textContent =
              'El pago de ' + data.nombreAlumno + ' fue validado y se envió el correo de bienvenida. ¿Deseas notificar al Asistente CE y al Maestro?';
          }
          document.getElementById('modalNotificacion').classList.add('active');
        } else {
          btn.textContent = 'Validar pago';
          btn.disabled = false;
          alert('Error: ' + data.error);
        }
      })
      .catch(() => {
        btn.textContent = 'Validar pago';
        btn.disabled = false;
        alert('Error de conexión.');
      });
  }

  function cerrarModal() {
    document.getElementById('modalNotificacion').classList.remove('active');
    modalData = null;
  }

  document.getElementById('btnNotificar').addEventListener('click', function() {
    if (!modalData) return;
    var d = modalData.data;
    if (modalData.tipo === 'colocacion') {
      var msgAlumno = encodeURIComponent(
        'Hola ' + d.nombreAlumno + ', tu pago ha sido validado en Organic English. ' +
        'En breve el encargado de colocacion se pondra en contacto contigo para agendar tu evaluacion. Bienvenido/a!'
      );
      window.open('https://wa.me/52' + d.whatsappAlumno + '?text=' + msgAlumno, '_blank');
      if (d.colocadorWA) {
        document.getElementById('modalTitulo').textContent = 'Notificar al Colocador';
        document.getElementById('modalMensaje').textContent =
          '¿Deseas notificar al encargado de colocación sobre ' + d.nombreAlumno + '?';
        modalData = { tipo: 'colocador', data: d };
      } else {
        cerrarModal();
      }
    } else if (modalData.tipo === 'normal') {
      if (d.asisWA) {
        var msgCE = encodeURIComponent(
          'Hola ' + d.asisNombre + ', se ha inscrito un nuevo alumno en tu grupo ' + d.idGrupo + ': ' +
          d.nombreAlumno + '. Por favor presentate con el por WhatsApp para darle la bienvenida.'
        );
        window.open('https://wa.me/52' + d.asisWA + '?text=' + msgCE, '_blank');
      }
      if (d.maestroWA) {
        document.getElementById('modalTitulo').textContent = 'Notificar al Maestro';
        document.getElementById('modalMensaje').textContent =
          '¿Deseas notificar al maestro sobre la inscripción de ' + d.nombreAlumno + ' en el grupo ' + d.idGrupo + '?';
        modalData = { tipo: 'maestro', data: d };
      } else {
        cerrarModal();
      }
    } else if (modalData.tipo === 'maestro') {
      var msgMaestro = encodeURIComponent(
        'Hola ' + d.maestroNombre + ', hay un nuevo alumno en tu grupo ' + d.idGrupo + ': ' +
        d.nombreAlumno + '. Ya cuenta con acceso a su panel personal.'
      );
      window.open('https://wa.me/52' + d.maestroWA + '?text=' + msgMaestro, '_blank');
      cerrarModal();
    } else if (modalData.tipo === 'colocador') {
      var msgColocador = encodeURIComponent(
        'Hola ' + d.colocadorNombre + ', hay un nuevo alumno por colocacion: ' +
        d.nombreAlumno + '. Su pago ya fue validado. Por favor contactalo para agendar su evaluacion.'
      );
      window.open('https://wa.me/52' + d.colocadorWA + '?text=' + msgColocador, '_blank');
      cerrarModal();
    }
  });

  function logout() {
    asesorData = null;
    document.getElementById('inputId').value = '';
    document.getElementById('inputClave').value = '';
    document.getElementById('screenPanel').classList.remove('active');
    document.getElementById('screenLogin').classList.add('active');
  }

  document.getElementById('inputClave').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
  });
</script>

</body>
</html>

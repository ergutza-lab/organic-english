<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Coordinacion de Asesores — Organic English</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b1120;--surface:#1a2540;--surface2:#1e2d4e;--border:rgba(255,255,255,0.07);
  --orange:#f97316;--orsoft:#fb923c;--blue:#3b82f6;--green:#22c55e;
  --red:#ef4444;--yellow:#eab308;--purple:#8b5cf6;
  --text:#f1f5f9;--muted:#64748b;
}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:#0f172a url('https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/hero3.webp') center/cover fixed;
  color:var(--text);min-height:100vh;
}
body::before{content:'';position:fixed;inset:0;background:rgba(11,17,32,0.85);z-index:0;pointer-events:none;}
.screen,.login-wrap{position:relative;z-index:1;}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:#1e2a4a;border-radius:20px;padding:32px 28px;width:100%;max-width:400px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 24px 60px rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;gap:6px;}
.login-box img{width:200px;margin-bottom:6px;}
.login-box h1{color:#fff;font-size:20px;font-weight:700;margin-bottom:2px;}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:14px;}
.field{width:100%;margin-bottom:14px;}
.field label{display:block;color:#94a3b8;font-size:11px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;margin-bottom:7px;}
.field input{width:100%;background:var(--bg);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:13px 16px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--orange);}
.btn-primary{width:100%;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;border-radius:100px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;}
.btn-primary:hover{opacity:.9;}
.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px;color:#f87171;font-size:13px;margin-top:12px;display:none;text-align:center;width:100%;}
/* PANEL */
.screen{display:none;}
.screen.active{display:block;}
.panel-root{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:10px;}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-area img{height:38px;}
.logo-text{font-size:15px;font-weight:600;}
.top-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.avatar{width:34px;height:34px;border-radius:50%;background:#1c2b5e;border:2px solid var(--orange);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.btn-logout{font-size:13px;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:7px 14px;background:transparent;cursor:pointer;}
.btn-reporte{font-size:13px;font-weight:700;color:#fff;background:var(--orange);border:none;border-radius:8px;padding:8px 16px;cursor:pointer;transition:opacity .2s;}
.btn-reporte:hover{opacity:.88;}
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:2rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;}
.stat-card.orange{border-color:rgba(249,115,22,0.3);}
.stat-card.blue{border-color:rgba(59,130,246,0.3);}
.stat-card.green{border-color:rgba(34,197,94,0.3);}
.stat-card.red{border-color:rgba(239,68,68,0.3);}
.stat-num{font-size:26px;font-weight:700;}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px;}
/* LEYENDA */
.leyenda{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:1.2rem;}
.ley-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.ley-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
/* CALENDARIOS */
.cals-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:2rem;}
.cal-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.cal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cal-mes-nombre{font-size:14px;font-weight:800;color:#fff;}
.cal-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.cal-badge.anterior{background:rgba(100,116,139,0.15);color:#94a3b8;border:1px solid rgba(100,116,139,0.25);}
.cal-badge.actual{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.25);}
.cal-badge.siguiente{background:rgba(59,130,246,0.12);color:#93c5fd;border:1px solid rgba(59,130,246,0.25);}
.cal-grid{padding:10px 10px 14px;}
.cal-dias-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.cal-dia-header{text-align:center;font-size:9px;font-weight:700;color:var(--muted);padding:4px 0;text-transform:uppercase;}
.cal-dias{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dia{
  aspect-ratio:1;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:var(--muted);
  cursor:default;transition:all .18s;
  position:relative;
}
.cal-dia.vacio{pointer-events:none;}
.cal-dia.hoy{border:2px solid var(--orange);color:var(--orange);}
.cal-dia.con-grupos{
  cursor:pointer;font-weight:800;color:#fff;
}
.cal-dia.con-grupos:hover{transform:scale(1.12);z-index:2;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
.cal-dia.seleccionado{transform:scale(1.15);z-index:3;box-shadow:0 6px 20px rgba(0,0,0,0.5);}
/* Colores vacantes */
.vac-azul{background:rgba(59,130,246,0.85);border:2px solid #3b82f6;}
.vac-verde{background:rgba(34,197,94,0.82);border:2px solid #22c55e;}
.vac-naranja{background:rgba(249,115,22,0.82);border:2px solid #f97316;}
.vac-amarillo{background:rgba(234,179,8,0.82);border:2px solid #eab308;color:#1a1a00 !important;}
.vac-rojo{background:rgba(239,68,68,0.82);border:2px solid #ef4444;}
.vac-cero{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.2) !important;cursor:default !important;}
/* GRUPOS DEL DIA */
.grupos-dia-wrap{margin-bottom:2rem;display:none;}
.grupos-dia-wrap.visible{display:block;}
.grupos-dia-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.grupos-dia-titulo{font-size:16px;font-weight:800;color:#fff;}
.btn-cerrar-dia{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;}
.grupos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.grupo-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:10px 12px;cursor:pointer;transition:all .2s;
}
.grupo-card:hover{background:var(--surface2);border-color:rgba(249,115,22,0.3);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.3);}
.grupo-card.lleno{opacity:.35;filter:saturate(0.2);cursor:default;}
.grupo-card.lleno:hover{transform:none;box-shadow:none;}
.grupo-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.grupo-id{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:0.06em;}
.vac-pill{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;border:none;white-space:nowrap;}
.vac-pill.azul{background:rgba(59,130,246,0.2);color:#93c5fd;border:1px solid rgba(59,130,246,0.4);}
.vac-pill.verde{background:rgba(34,197,94,0.2);color:#4ade80;border:1px solid rgba(34,197,94,0.4);}
.vac-pill.naranja{background:rgba(249,115,22,0.2);color:var(--orsoft);border:1px solid rgba(249,115,22,0.4);}
.vac-pill.amarillo{background:rgba(234,179,8,0.2);color:#fde047;border:1px solid rgba(234,179,8,0.4);}
.vac-pill.rojo{background:rgba(239,68,68,0.2);color:#f87171;border:1px solid rgba(239,68,68,0.4);}
.vac-pill.cero{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.1);}
.grupo-nombre{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.grupo-meta{font-size:11px;color:var(--muted);}
.grupo-footer{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(6px);z-index:900;display:none;align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto;}
.modal-bg.open{display:flex;}
.modal-box{background:#1a2540;border:1px solid rgba(255,255,255,0.08);border-radius:20px;width:100%;max-width:680px;box-shadow:0 24px 60px rgba(0,0,0,0.6);position:relative;margin:auto;}
.modal-header{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.modal-titulo{font-size:17px;font-weight:800;color:#fff;margin-bottom:3px;}
.modal-sub{font-size:12px;color:var(--muted);}
.modal-x{background:rgba(255,255,255,0.07);border:none;color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.modal-x:hover{background:rgba(255,255,255,0.14);color:#fff;}
.modal-personal{display:flex;gap:8px;padding:12px 22px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.personal-chip{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:7px 12px;font-size:12px;}
.personal-chip .pc-label{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:2px;}
.personal-chip .pc-val{color:#fff;font-weight:600;}
.modal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 22px;border-bottom:1px solid var(--border);}
.mstat{text-align:center;}
.mstat-num{font-size:20px;font-weight:800;}
.mstat-label{font-size:10px;color:var(--muted);margin-top:2px;}
.modal-body{padding:14px 22px 22px;}
.modal-body h4{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;}
.tabla-alumnos{width:100%;border-collapse:collapse;font-size:13px;}
.tabla-alumnos th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;padding:0 10px 8px;text-align:left;border-bottom:1px solid var(--border);}
.tabla-alumnos td{padding:11px 10px;border-bottom:1px solid rgba(255,255,255,0.03);color:#94a3b8;vertical-align:middle;}
.tabla-alumnos tr:last-child td{border-bottom:none;}
.tabla-alumnos tr:hover td{background:rgba(255,255,255,0.02);}
.al-nombre{font-size:13px;font-weight:600;color:#fff;}
.al-id{font-size:11px;color:var(--muted);}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;display:inline-block;}
.chip-vigente{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.25);}
.chip-vencido{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.25);}
.chip-sinpago{background:rgba(100,116,139,0.15);color:#94a3b8;border:1px solid rgba(100,116,139,0.25);}
.chip-becado{background:rgba(234,179,8,0.15);color:#fde047;border:1px solid rgba(234,179,8,0.3);}
.chip-baja{background:rgba(139,92,246,0.15);color:#c4b5fd;border:1px solid rgba(139,92,246,0.25);}
.empty{text-align:center;color:var(--muted);padding:30px;font-size:13px;}
@media(max-width:900px){.cals-wrap{grid-template-columns:1fr;}}
@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr;}.modal-stats{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screenLogin" class="screen active">
  <div class="login-wrap">
    <div class="login-box">
      <img src="https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/logoblanco.png" alt="OE"/>
      <h1>Coordinacion de Asesores</h1>
      <p>Ingresa tus credenciales para acceder</p>
      <div class="field"><label>ID de Coordinador</label><input type="text" id="inputId" placeholder="Ej. CA001" autocomplete="username"/></div>
      <div class="field"><label>Clave de acceso</label><input type="password" id="inputClave" placeholder="Tu contrasena" autocomplete="current-password"/></div>
      <button class="btn-primary" onclick="login()">Entrar</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>
</div>

<!-- PANEL -->
<div id="screenPanel" class="screen">
  <div class="panel-root">
    <div class="top-bar">
      <div class="logo-area">
        <img src="https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/logoblanco.png" alt="OE"/>
        <span class="logo-text">Coordinacion de Asesores</span>
      </div>
      <div class="top-right">
        <button class="btn-reporte" onclick="mandarReporte()">Mandar reporte</button>
        <div class="avatar" id="avatarIni">CA</div>
        <button class="btn-logout" onclick="logout()">Salir</button>
      </div>
    </div>

    <!-- TABS -->
    <div style="display:flex;gap:8px;margin-bottom:20px;border-bottom:2px solid rgba(255,255,255,0.07);padding-bottom:0;">
      <button id="tabGruposBtn" onclick="cambiarTab('grupos')" style="padding:10px 20px;border:none;background:none;color:#f97316;font-weight:700;font-size:13px;cursor:pointer;border-bottom:3px solid #f97316;margin-bottom:-2px;">📅 Grupos</button>
      <button id="tabAsesoresBtn" onclick="cambiarTab('asesores')" style="padding:10px 20px;border:none;background:none;color:#64748b;font-weight:700;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;">👥 Asesores</button>
    </div>

    <!-- SECCION GRUPOS -->
    <div id="secGrupos">

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card orange"><div class="stat-num" id="stGrupos">-</div><div class="stat-label">Grupos (3 meses)</div></div>
      <div class="stat-card blue"><div class="stat-num" id="stAlumnos">-</div><div class="stat-label">Alumnos activos</div></div>
      <div class="stat-card green"><div class="stat-num" id="stLugares">-</div><div class="stat-label">Vacantes totales</div></div>
      <div class="stat-card red"><div class="stat-num" id="stVencidos">-</div><div class="stat-label">Pagos vencidos</div></div>
    </div>

    <!-- LEYENDA -->
    <div class="leyenda">
      <span style="font-size:11px;color:var(--muted);margin-right:4px;">Vacantes:</span>
      <div class="ley-item"><div class="ley-dot" style="background:#3b82f6;"></div>10+</div>
      <div class="ley-item"><div class="ley-dot" style="background:#22c55e;"></div>7-9</div>
      <div class="ley-item"><div class="ley-dot" style="background:#eab308;"></div>5-6</div>
      <div class="ley-item"><div class="ley-dot" style="background:#f97316;"></div>3-4</div>
      <div class="ley-item"><div class="ley-dot" style="background:#ef4444;"></div>1-2</div>
      <div class="ley-item"><div class="ley-dot" style="background:rgba(255,255,255,0.12);"></div>Sin lugares</div>
    </div>

    <!-- CALENDARIOS -->
    <div class="cals-wrap" id="calsWrap"></div>

    <!-- GRUPOS DEL DIA -->
    <div class="grupos-dia-wrap" id="gruposDiaWrap">
      <div class="grupos-dia-header">
        <div class="grupos-dia-titulo" id="gruposDiaTitulo"></div>
        <button class="btn-cerrar-dia" onclick="cerrarDia()">x Cerrar</button>
      </div>
      <div class="grupos-grid" id="gruposGrid"></div>
    </div>
    </div><!-- /secGrupos -->

    <!-- SECCION ASESORES -->
    <div id="secAsesores" style="display:none;">
      <div id="filtroAsesores" style="display:flex;gap:8px;margin-bottom:16px;"></div>
      <div id="listaAsesores"><div style="text-align:center;color:#64748b;padding:40px;">Cargando asesores...</div></div>
    </div>

    <!-- MODAL HISTORICO POR ASESOR -->
    <div id="modalHistoricoAsesor" style="display:none;position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,0.75);align-items:center;justify-content:center;">
      <div style="background:#1a2540;border:1px solid rgba(255,255,255,0.1);border-radius:16px;width:92%;max-width:480px;max-height:82vh;overflow-y:auto;padding:22px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <h3 id="tituloHistoricoAsesor" style="color:#f1f5f9;margin:0;font-size:15px;"></h3>
          <button onclick="document.getElementById('modalHistoricoAsesor').style.display='none'" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;border-radius:8px;padding:4px 12px;cursor:pointer;">X</button>
        </div>
        <div id="cuerpoHistoricoAsesor"><div style="text-align:center;color:#64748b;padding:20px;">Cargando...</div></div>
      </div>
    </div>

  </div><!-- /panel-root -->
</div><!-- /screenPanel -->

<!-- MODAL -->
<div class="modal-bg" id="modalGrupo" onclick="closeMbg(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div><div class="modal-titulo" id="mNombre"></div><div class="modal-sub" id="mSub"></div></div>
      <button class="modal-x" onclick="closeModal()">x</button>
    </div>
    <div class="modal-personal" id="mPersonal"></div>
    <div class="modal-stats" id="mStats"></div>
    <div class="modal-body"><h4>Alumnos inscritos</h4><table class="tabla-alumnos"><thead><tr><th>Alumno</th><th>Asesor</th><th>Situacion</th><th>Pago hasta</th></tr></thead><tbody id="mTabla"></tbody></table></div>
  </div>
</div>

<script>
var APPS='https://script.google.com/macros/s/AKfycbwZm4Yl1u_Qm-FSyS6FGA84wV8cp6flpHggXnslzg-PxlUD7LVD-1Iftr3NHBJwHFYO/exec';
var caData=null,dataMeses=[],dataAsesores=[],diaSeleccionado=null;

/* == LOGIN== */
function login(){
  var id=document.getElementById('inputId').value.trim().toUpperCase();
  var clave=document.getElementById('inputClave').value.trim();
  var err=document.getElementById('errorMsg');
  if(!id||!clave){err.style.display='block';err.textContent='Completa todos los campos.';return;}
  err.style.display='none';
  var btn=document.querySelector('.btn-primary');btn.textContent='Verificando...';btn.disabled=true;
  fetch(APPS+'?action=loginCoordinadorAsesores&id='+encodeURIComponent(id)+'&clave='+encodeURIComponent(clave),{redirect:'follow'})
    .then(function(r){return r.json();})
    .then(function(d){
      btn.textContent='Entrar';btn.disabled=false;
      if(d.status==='ok'){caData=d;mostrarPanel();}
      else{err.style.display='block';err.textContent=d.mensaje||'ID o clave incorrectos.';}
    })
    .catch(function(){btn.textContent='Entrar';btn.disabled=false;err.style.display='block';err.textContent='Error de conexion.';});
}
function mostrarPanel(){
  document.getElementById('screenLogin').classList.remove('active');
  document.getElementById('screenPanel').classList.add('active');
  var ini=(caData.nombre||'CA').split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();
  document.getElementById('avatarIni').textContent=ini||'CA';
  cargarDatos();
}
function logout(){
  caData=null;dataMeses=[];
  document.getElementById('screenPanel').classList.remove('active');
  document.getElementById('screenLogin').classList.add('active');
  document.getElementById('inputId').value='';document.getElementById('inputClave').value='';
}
document.getElementById('inputClave').addEventListener('keypress',function(e){if(e.key==='Enter')login();});

/* == DATOS== */
function cargarDatos(){
  document.getElementById('calsWrap').innerHTML='<div style="text-align:center;color:var(--muted);padding:40px;grid-column:1/-1;">Cargando...</div>';
  fetch(APPS+'?action=getDatosCoordinadorAsesores',{redirect:'follow'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.status!=='ok'){document.getElementById('calsWrap').innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;">Error: '+d.mensaje+'</div>';return;}
      dataMeses=d.meses||[];
      dataAsesores=d.asesores||[];
      renderStats();
      renderCalendarios();
      renderAsesores();
    })

    return {bg:'rgba(148,163,184,0.15)',border:'rgba(148,163,184,0.5)',tag:'#94a3b8'};
  if (n.includes('A1'))
    return {bg:'rgba(28,43,94,0.4)',border:'rgba(59,91,219,0.6)',tag:'#7b9ef5'};
  if (n.includes('A2'))
    return {bg:'rgba(8,145,178,0.15)',border:'rgba(8,145,178,0.5)',tag:'#22d3ee'};
  if (n.includes('B1'))
    return {bg:'rgba(22,163,74,0.15)',border:'rgba(22,163,74,0.5)',tag:'#4ade80'};
  if (n.includes('B2'))

function nombreColor(nombre) {

function vacColor(ll){

/* == CALENDARIOS== */
var hoy=new Date(); hoy.setHours(0,0,0,0);
var mesActualKey=(function(){var h=new Date();return h.getFullYear()+'-'+('0'+(h.getMonth()+1)).slice(-2);})();
var MESES_NOM=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var DIAS_NOM=['Do','Lu','Ma','Mi','Ju','Vi','Sa'];

// Mapa: 'YYYY-MM-DD' -> max vacantes del dia
function buildMapaDias(){
  var mapa={};
  dataMeses.forEach(function(m){
    m.grupos.forEach(function(g){
      // Parsear fecha DD/MM/YYYY
      var parts=g.fechaInicio.split('/');
      if(parts.length!==3)return;
      var key=parts[2]+'-'+parts[1]+'-'+parts[0];
      var ll=g.lugaresLibres||0;
      if(!mapa[key])mapa[key]={vacantes:0,grupos:[]};
      mapa[key].vacantes=Math.max(mapa[key].vacantes,ll);
      mapa[key].grupos.push(g);
    });
  });
  return mapa;
}

function renderCalendarios(){
  var mapa=buildMapaDias();
  var wrap=document.getElementById('calsWrap');
  wrap.innerHTML='';

  // Ordenar meses: anterior -> actual -> siguiente
  var ordenado=[].concat(dataMeses).sort(function(a,b){
    return a.key.localeCompare(b.key);
  });

  // Mostrar siempre 3 meses aunque no tengan grupos
  var mesesMostrar=[];
  for(var delta=-1;delta<=1;delta++){
    var d=new Date(hoy.getFullYear(),hoy.getMonth()+delta,1);
    var k=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2);
    var mesData=dataMeses.find(function(m){return m.key===k;})||{key:k,nombre:MESES_NOM[d.getMonth()]+' '+d.getFullYear(),grupos:[]};
    mesesMostrar.push({mesData:mesData,fecha:d});
  }
  // Ordenar: anterior, actual, siguiente
  mesesMostrar.sort(function(a,b){
    return a.mesData.key.localeCompare(b.mesData.key);
  });

  mesesMostrar.forEach(function(item){
    wrap.appendChild(buildCal(item.fecha,mapa,item.mesData));
  });
}

function buildCal(fechaMes,mapa,mesData){
  var anio=fechaMes.getFullYear();
  var mes=fechaMes.getMonth();
  var mesKey=anio+'-'+('0'+(mes+1)).slice(-2);
  var esActual=mesKey===mesActualKey;
  var esSig=mesKey>mesActualKey;
  var tipoLabel=esSig?'Proximo mes':(esActual?'Mes actual':'Mes anterior');
  var tipoCls=esSig?'siguiente':(esActual?'actual':'anterior');

  var card=document.createElement('div');
  card.className='cal-card';

  // Header
  var hdr=document.createElement('div');
  hdr.className='cal-header';
  hdr.innerHTML='<span class="cal-mes-nombre">'+mesData.nombre+'</span><span class="cal-badge '+tipoCls+'">'+tipoLabel+'</span>';
  card.appendChild(hdr);

  // Grid
  var grid=document.createElement('div');
  grid.className='cal-grid';

  // Dias de la semana
  var dHdr=document.createElement('div');
  dHdr.className='cal-dias-header';
  DIAS_NOM.forEach(function(d){
    var s=document.createElement('div');s.className='cal-dia-header';s.textContent=d;
    dHdr.appendChild(s);
  });
  grid.appendChild(dHdr);

  // Dias del mes
  var diasDiv=document.createElement('div');
  diasDiv.className='cal-dias';

  var primerDia=new Date(anio,mes,1).getDay(); // 0=Dom
  // Agregar vacios al inicio
  for(var e=0;e<primerDia;e++){
    var vacio=document.createElement('div');vacio.className='cal-dia vacio';
    diasDiv.appendChild(vacio);
  }

  var diasEnMes=new Date(anio,mes+1,0).getDate();
  for(var d=1;d<=diasEnMes;d++){
    var dd=('0'+d).slice(-2);
    var mm=('0'+(mes+1)).slice(-2);
    var key=anio+'-'+mm+'-'+dd;
    var diaDiv=document.createElement('div');
    diaDiv.className='cal-dia';
    diaDiv.textContent=d;

    var esHoy=(new Date(anio,mes,d)).getTime()===hoy.getTime();
    if(esHoy)diaDiv.classList.add('hoy');

    var info=mapa[key];
    if(info&&info.grupos.length>0){
      diaDiv.classList.add('con-grupos');
      var col=vacColor(info.vacantes);
      diaDiv.classList.add('vac-'+col);
      // Click
      (function(grupos,diaStr){
        diaDiv.onclick=function(){seleccionarDia(grupos,diaStr,this);};
      })(info.grupos, dd+'/'+mm+'/'+anio);
    } else {
      diaDiv.style.color='rgba(255,255,255,0.15)';
    }
    diasDiv.appendChild(diaDiv);
  }
  grid.appendChild(diasDiv);
  card.appendChild(grid);
  return card;
}

var diaActualEl=null;
function seleccionarDia(grupos,diaStr,el){
  // Desmarcar anterior
  if(diaActualEl)diaActualEl.classList.remove('seleccionado');
  diaActualEl=el;
  el.classList.add('seleccionado');

  var wrap=document.getElementById('gruposDiaWrap');
  var grid=document.getElementById('gruposGrid');
  var titulo=document.getElementById('gruposDiaTitulo');

  titulo.textContent='Grupos con inicio '+diaStr;
  grid.innerHTML='';

  // Ordenar: primero con vacantes, luego sin
  var conV=grupos.filter(function(g){return(g.lugaresLibres||0)>0;});
  var sinV=grupos.filter(function(g){return(g.lugaresLibres||0)===0;});
  var todos=conV.concat(sinV);

  todos.forEach(function(g){
    var ll=g.lugaresLibres||0;
    var col=vacColor(ll);
    var card=document.createElement('div');
    card.className='grupo-card'+(ll===0?' lleno':'');
    var nv=nivelBg(g.nivel||'');
    card.style.background=nv.bg;
    card.style.borderColor=nv.border;
    card.innerHTML=
      '<div class="grupo-top">'+
        '<span class="grupo-id">'+g.id+'</span>'+
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">'+
          '<span class="vac-pill '+col+'">'+vacText(ll)+'</span>'+
          (g.pendientes&&g.pendientes>0 ? '<span style="background:rgba(250,204,21,0.15);color:#facc15;border:1px solid rgba(250,204,21,0.4);border-radius:100px;font-size:10px;font-weight:700;padding:2px 8px;white-space:nowrap;">⏳ '+g.pendientes+' pend.</span>' : '')+
        '</div>'+
      '</div>'+
      '<div class="grupo-nombre" style="'+(nombreColor(g.nombre)?'color:'+nombreColor(g.nombre)+';':'')+'">'+g.nombre+'</div>'+
      '<div style="font-size:10px;font-weight:600;color:'+nv.tag+';margin:2px 0;">'+g.nivel+'</div>'+
      '<div class="grupo-meta">'+g.horario+'</div>'+
      '<div class="grupo-footer">'+
        'Maestro: '+g.maestro+' &nbsp;|&nbsp; '+g.inscritos+'/'+g.cupoMax+' alumnos'+
      '</div>';
    if(ll>0)card.onclick=function(){abrirGrupo(g);};
    grid.appendChild(card);
  });

  wrap.classList.add('visible');
  wrap.scrollIntoView({behavior:'smooth',block:'start'});
}

function mandarReporte(){

  var horaStr=hh+':'+mm+' '+ampm;

  function vacEmoji(ll){
    if(ll>=10)return String.fromCodePoint(0x1F535);

  var sep='━━━━━━━━━━━━━━━━━━━━━━';

function renderAsesores() {

  if (!dataAsesores.length) {

  // Stats globales — SIEMPRE de todos los asesores, sin importar el filtro visual
  var totalActivos   = dataAsesores.filter(function(a){ return a.activo; }).length;
  var totalComision  = dataAsesores.reduce(function(s,a){ return s + (a.comisionCatorcena||0); }, 0);
  var totalBajas     = dataAsesores.reduce(function(s,a){ return s + (a.alumnosBaja||0); }, 0);

  // Ranking (medallas) — solo entre asesores activos, por comisión, SIN
  // reordenar la lista visible (esa se mantiene en el orden de la hoja)
  var medallas = {};
  dataAsesores.filter(function(a){ return a.activo; })
    .slice().sort(function(a,b){ return (b.comisionCatorcena||0) - (a.comisionCatorcena||0); })
    .slice(0,3)
    .forEach(function(a, idx){ medallas[a.id] = ['🥇','🥈','🥉'][idx]; });

  // Aplicar filtro visual
  var listaFiltrada = dataAsesores.filter(function(a) {
    if (filtroActivoAsesores === 'activos')   return a.activo;
    if (filtroActivoAsesores === 'inactivos') return !a.activo;
    return true;
  });

  var html = '';

  // Resumen catorcena
  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;">' +
    '<div style="background:#1a2540;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;text-align:center;">' +
      '<div style="font-size:26px;font-weight:800;color:#f97316;">' + totalActivos + '</div>' +
      '<div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-top:4px;">Asesores activos</div>' +
    '</div>' +
    '<div style="background:#1a2540;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;text-align:center;">' +
      '<div style="font-size:26px;font-weight:800;color:#22c55e;">$' + totalComision + '</div>' +
      '<div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-top:4px;">Comisión catorcena total</div>' +
    '</div>' +
    '<div style="background:#1a2540;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;text-align:center;">' +
      '<div style="font-size:26px;font-weight:800;color:' + (totalBajas>0?'#ef4444':'#64748b') + ';">' + totalBajas + '</div>' +
      '<div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-top:4px;">Bajas totales</div>' +
    '</div>' +
  '</div>';

  if (!listaFiltrada.length) {
    html += '<p style="color:#64748b;text-align:center;padding:30px;">No hay asesores en este filtro.</p>';
    cont.innerHTML = html;
    return;
  }

  // Lista de asesores — EN EL MISMO ORDEN que la pestaña ASESORES
  html += '<div style="display:flex;flex-direction:column;gap:10px;">';
  listaFiltrada.forEach(function(a) {
    var waLink = a.whatsapp
      ? 'https://wa.me/52' + cleanWAca(a.whatsapp) + '?text=' + encodeURIComponent('Hola ' + a.nombre + ', te contacta Coordinación de Asesores de Organic English.')
      : '';
    var colorCom = a.comisionCatorcena >= 500 ? '#22c55e' : a.comisionCatorcena >= 200 ? '#f97316' : '#94a3b8';
    var avatarHtml = a.foto
      ? '<img src="' + a.foto + '" style="width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid rgba(249,115,22,0.4);flex-shrink:0;" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';" />' +
        '<div style="display:none;width:42px;height:42px;border-radius:50%;background:rgba(249,115,22,0.15);border:2px solid rgba(249,115,22,0.4);align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#f97316;flex-shrink:0;">' + a.nombre.charAt(0).toUpperCase() + '</div>'
      : '<div style="width:42px;height:42px;border-radius:50%;background:rgba(249,115,22,0.15);border:2px solid rgba(249,115,22,0.4);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#f97316;flex-shrink:0;">' + a.nombre.charAt(0).toUpperCase() + '</div>';

    var totalAlumnosA = (a.alumnosActivos||0) + (a.alumnosBaja||0);
    var retencion = totalAlumnosA > 0 ? Math.round((a.alumnosActivos/totalAlumnosA)*100) : null;
    var sinComisionAlerta = a.activo && (a.comisionCatorcena||0) === 0;
    var medalla = medallas[a.id] ? ' ' + medallas[a.id] : '';

    html +=
      '<div style="background:#1a2540;border:1px solid ' + (sinComisionAlerta ? 'rgba(239,68,68,0.5)' : 'rgba(255,255,255,0.08)') + ';border-radius:14px;padding:14px 20px;display:grid;grid-template-columns:auto 1fr auto auto auto;align-items:center;gap:14px;">' +

        // Avatar + nombre
        '<div style="display:flex;align-items:center;gap:12px;">' +
          avatarHtml +
          '<div>' +
            '<div style="font-size:14px;font-weight:700;color:#f1f5f9;line-height:1.3;">' + a.nombre + medalla + '</div>' +
            '<div style="font-size:11px;color:#475569;margin-top:2px;">' + a.id +
              (a.activo
                ? ' &nbsp;<span style="color:#22c55e;font-weight:700;">● Activo</span>'
                : ' &nbsp;<span style="color:#ef4444;font-weight:700;">● Inactivo</span>') +
            '</div>' +
            (a.whatsapp ? '<div style="font-size:11px;color:#475569;margin-top:1px;">📱 ' + a.whatsapp + '</div>' : '') +
            (sinComisionAlerta ? '<div style="font-size:10px;color:#ef4444;font-weight:700;margin-top:2px;">⚠ Sin comisión esta catorcena</div>' : '') +
          '</div>' +
        '</div>' +

        // Stats en fila
        '<div style="display:flex;gap:20px;justify-content:center;">' +
          '<div style="text-align:center;">' +
            '<div style="font-size:20px;font-weight:800;color:' + colorCom + ';">$' + (a.comisionCatorcena||0) + '</div>' +
            '<div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;">Comisión</div>' +
          '</div>' +
          '<div style="width:1px;background:rgba(255,255,255,0.07);"></div>' +
          '<div style="text-align:center;">' +
            '<div style="font-size:20px;font-weight:800;color:#f1f5f9;">' + (a.alumnosActivos||0) + '</div>' +
            '<div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;">Activos</div>' +
          '</div>' +
          '<div style="width:1px;background:rgba(255,255,255,0.07);"></div>' +
          '<div style="text-align:center;">' +
            '<div style="font-size:20px;font-weight:800;color:' + (a.alumnosBaja>0?'#ef4444':'#475569') + ';">' + (a.alumnosBaja||0) + '</div>' +
            '<div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;">Bajas</div>' +
          '</div>' +
          '<div style="width:1px;background:rgba(255,255,255,0.07);"></div>' +
          '<div style="text-align:center;">' +
            '<div style="font-size:20px;font-weight:800;color:' + (retencion===null?'#475569':retencion>=80?'#22c55e':retencion>=50?'#f97316':'#ef4444') + ';">' + (retencion===null?'—':retencion+'%') + '</div>' +
            '<div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;">Retención</div>' +
          '</div>' +
        '</div>' +

        // Boton historico
        '<button onclick="abrirHistoricoAsesor(\'' + a.id + '\',\'' + a.nombre.replace(/'/g,"\\'") + '\')" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#94a3b8;padding:9px 14px;border-radius:100px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">📊 Histórico</button>' +

        // Botón WhatsApp
        '<div>' +
          (waLink
            ? '<a href="' + waLink + '" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;padding:9px 16px;border-radius:100px;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;">📱 WhatsApp</a>'
            : '<span style="font-size:11px;color:#334155;">Sin número</span>') +
        '</div>' +

      '</div>';
  });
  html += '</div>';
  cont.innerHTML = html;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Coordinación de Asesores — Organic English</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b1120;--surface:#1a2540;--surface2:#1e2d4e;--border:rgba(255,255,255,0.07);
  --orange:#f97316;--orsoft:#fb923c;--blue:#3b82f6;--green:#22c55e;
  --red:#ef4444;--purple:#8b5cf6;--gold:#f59e0b;
  --text:#f1f5f9;--muted:#64748b;--subtle:#334155;
}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:#0f172a url('https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/hero3.webp') center/cover fixed;
  color:var(--text);min-height:100vh;
}
body::before{content:'';position:fixed;inset:0;background:rgba(11,17,32,0.82);z-index:0;pointer-events:none;}
.screen,.login-wrap{position:relative;z-index:1;}
/* == LOGIN == */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:#1e2a4a;border-radius:20px;padding:32px 28px;width:100%;max-width:400px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 24px 60px rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;gap:6px;}
.login-box img{width:220px;margin-bottom:6px;}
.login-box h1{color:#fff;font-size:20px;font-weight:700;margin-bottom:2px;}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:14px;}
.field{width:100%;margin-bottom:14px;}
.field label{display:block;color:#94a3b8;font-size:11px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;margin-bottom:7px;}
.field input{width:100%;background:var(--bg);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:13px 16px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--orange);}
.btn-primary{width:100%;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;border-radius:100px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .2s;}
.btn-primary:hover{opacity:.9;}
.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px;color:#f87171;font-size:13px;margin-top:12px;display:none;text-align:center;width:100%;}
/* ── PANEL ── */
.screen{display:none;}
.screen.active{display:block;}
.panel-root{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}
/* TOPBAR */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-area img{height:42px;}
.logo-text{font-size:15px;font-weight:600;}
.top-right{display:flex;align-items:center;gap:10px;}
.avatar{width:34px;height:34px;border-radius:50%;background:#1c2b5e;border:2px solid var(--orange);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.btn-logout{font-size:13px;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:6px 13px;background:transparent;cursor:pointer;}
.btn-reporte{font-size:13px;font-weight:700;color:#fff;background:var(--orange);border:none;border-radius:8px;padding:8px 16px;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;gap:6px;}
.btn-reporte:hover{opacity:.88;}
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;}
.stat-card.orange{border-color:rgba(249,115,22,0.3);}
.stat-card.blue{border-color:rgba(59,130,246,0.3);}
.stat-card.green{border-color:rgba(34,197,94,0.3);}
.stat-card.purple{border-color:rgba(139,92,246,0.3);}
.stat-num{font-size:26px;font-weight:700;}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px;}
/* SECTION MONTH */
.mes-section{margin-bottom:2rem;}
.mes-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem;}
.mes-title{font-size:16px;font-weight:800;color:#fff;}
.mes-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;background:rgba(249,115,22,0.15);color:var(--orsoft);border:1px solid rgba(249,115,22,0.3);}
.mes-badge.actual{background:rgba(34,197,94,0.15);color:#4ade80;border-color:rgba(34,197,94,0.3);}
.mes-badge.siguiente{background:rgba(59,130,246,0.12);color:#93c5fd;border-color:rgba(59,130,246,0.25);}
/* GRUPOS GRID */
.grupos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.grupo-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:16px 18px;cursor:pointer;
  transition:all .22s;
}
.grupo-card:hover{
  background:var(--surface2);border-color:rgba(249,115,22,0.3);
  transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.3);
}
.grupo-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.grupo-id{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.06em;}
.lugares-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;}
.lugares-ok{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.25);}
.lugares-poco{background:rgba(249,115,22,0.15);color:var(--orsoft);border:1px solid rgba(249,115,22,0.25);}
.lugares-lleno{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.25);}
.grupo-nombre{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3;}
.grupo-meta{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px;}
.grupo-meta span{display:flex;align-items:center;gap:5px;}
.grupo-footer{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px;color:var(--muted);}
.grupo-footer strong{color:#94a3b8;}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:900;display:none;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;}
.modal-bg.open{display:flex;}
.modal-box{background:#1a2540;border:1px solid rgba(255,255,255,0.08);border-radius:20px;width:100%;max-width:680px;box-shadow:0 24px 60px rgba(0,0,0,0.6);position:relative;margin:auto;}
.modal-header{padding:22px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.modal-header-info{}
.modal-titulo{font-size:18px;font-weight:800;color:#fff;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--muted);}
.modal-x{background:rgba(255,255,255,0.07);border:none;color:var(--muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.modal-x:hover{background:rgba(255,255,255,0.14);color:#fff;}
.modal-personal{display:flex;gap:8px;padding:14px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.personal-chip{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12px;}
.personal-chip .pc-label{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:2px;}
.personal-chip .pc-val{color:#fff;font-weight:600;}
.modal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 24px;border-bottom:1px solid var(--border);}
.mstat{text-align:center;}
.mstat-num{font-size:22px;font-weight:800;}
.mstat-label{font-size:10px;color:var(--muted);margin-top:2px;}
.modal-body{padding:16px 24px 24px;}
.modal-body h4{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;}
/* TABLA ALUMNOS */
.tabla-alumnos{width:100%;border-collapse:collapse;font-size:13px;}
.tabla-alumnos th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;padding:0 10px 8px;text-align:left;border-bottom:1px solid var(--border);}
.tabla-alumnos td{padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.03);color:#94a3b8;vertical-align:middle;}
.tabla-alumnos tr:last-child td{border-bottom:none;}
.tabla-alumnos tr:hover td{background:rgba(255,255,255,0.02);}
.al-nombre{font-size:13px;font-weight:600;color:#fff;}
.al-id{font-size:11px;color:var(--muted);}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;display:inline-block;}
.chip-vigente{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.25);}
.chip-vencido{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.25);}
.chip-sinpago{background:rgba(100,116,139,0.15);color:#94a3b8;border:1px solid rgba(100,116,139,0.25);}
.chip-becado{background:rgba(245,158,11,0.15);color:#fcd34d;border:1px solid rgba(245,158,11,0.3);}
.chip-pendiente{background:rgba(249,115,22,0.15);color:var(--orsoft);border:1px solid rgba(249,115,22,0.25);}
.chip-baja{background:rgba(139,92,246,0.15);color:#c4b5fd;border:1px solid rgba(139,92,246,0.25);}
.empty-table{text-align:center;color:var(--muted);padding:32px;font-size:13px;}
.loading-state{text-align:center;color:var(--muted);padding:40px;font-size:14px;}
@media(max-width:768px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .grupos-grid{grid-template-columns:1fr;}
  .modal-stats{grid-template-columns:1fr 1fr;}
  .modal-personal{flex-direction:column;}
  .panel-root{padding:1.2rem 1rem 3rem;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screenLogin" class="screen active">
  <div class="login-wrap">
    <div class="login-box">
      <img src="https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/logoblanco.png" alt="OE"/>
      <h1>Coordinación de Asesores</h1>
      <p>Ingresa tus credenciales para acceder</p>
      <div class="field">
        <label>ID de Coordinador</label>
        <input type="text" id="inputId" placeholder="Ej. CA001" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Clave de acceso</label>
        <input type="password" id="inputClave" placeholder="Tu contraseña" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" onclick="login()">Entrar</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>
</div>

<!-- PANEL -->
<div id="screenPanel" class="screen">
  <div class="panel-root">
    <div class="top-bar">
      <div class="logo-area">
        <img src="https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/logoblanco.png" alt="OE"/>
        <span class="logo-text">Coordinación de Asesores</span>
      </div>
      <div class="top-right">
        <button class="btn-reporte" onclick="mandarReporte()">📊 Mandar reporte</button>
        <div class="avatar" id="avatarIni">CA</div>
        <button class="btn-logout" onclick="logout()">Salir</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card orange"><div class="stat-num" id="stGrupos">—</div><div class="stat-label">Grupos (3 meses)</div></div>
      <div class="stat-card blue"><div class="stat-num" id="stAlumnos">—</div><div class="stat-label">Alumnos activos</div></div>
      <div class="stat-card green"><div class="stat-num" id="stLugares">—</div><div class="stat-label">Lugares disponibles</div></div>
      <div class="stat-card purple"><div class="stat-num" id="stVencidos">—</div><div class="stat-label">Pagos vencidos</div></div>
    </div>

    <!-- MESES -->
    <div id="contenidoMeses"><div class="loading-state">Cargando grupos...</div></div>
  </div>
</div>

<!-- MODAL GRUPO -->
<div class="modal-bg" id="modalGrupo" onclick="closeMbg(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-info">
        <div class="modal-titulo" id="mGrupoNombre">—</div>
        <div class="modal-sub" id="mGrupoSub">—</div>
      </div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-personal" id="mPersonal"></div>
    <div class="modal-stats" id="mStats"></div>
    <div class="modal-body">
      <h4>Alumnos inscritos</h4>
      <table class="tabla-alumnos">
        <thead>
          <tr>
            <th>Alumno</th>
            <th>Asesor</th>
            <th>Situación</th>
            <th>Pago hasta</th>
          </tr>
        </thead>
        <tbody id="mTablaBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
var APPS = 'https://script.google.com/macros/s/AKfycbwZm4Yl1u_Qm-FSyS6FGA84wV8cp6flpHggXnslzg-PxlUD7LVD-1Iftr3NHBJwHFYO/exec';
var caData = null;
var dataMeses = [];

/* == LOGIN == */
function login(){
  var id    = document.getElementById('inputId').value.trim().toUpperCase();
  var clave = document.getElementById('inputClave').value.trim();
  var err   = document.getElementById('errorMsg');
  if(!id||!clave){err.style.display='block';err.textContent='Completa todos los campos.';return;}
  err.style.display='none';
  var btn=document.querySelector('.btn-primary');btn.textContent='Verificando...';btn.disabled=true;
  fetch(APPS+'?action=loginCoordinadorAsesores&id='+encodeURIComponent(id)+'&clave='+encodeURIComponent(clave),{redirect:'follow'})
    .then(function(r){return r.json();})
    .then(function(d){
      btn.textContent='Entrar';btn.disabled=false;
      if(d.status==='ok'){caData=d;mostrarPanel();}
      else{err.style.display='block';err.textContent=d.mensaje||'ID o clave incorrectos.';}
    })
    .catch(function(e){btn.textContent='Entrar';btn.disabled=false;err.style.display='block';err.textContent='Error de conexion.';});
}

function mostrarPanel(){
  document.getElementById('screenLogin').classList.remove('active');
  document.getElementById('screenPanel').classList.add('active');
  var ini=(caData.nombre||'CA').split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();
  document.getElementById('avatarIni').textContent=ini||'CA';
  cargarDatos();
}

function logout(){
  caData=null;dataMeses=[];
  document.getElementById('screenPanel').classList.remove('active');
  document.getElementById('screenLogin').classList.add('active');
  document.getElementById('inputId').value='';
  document.getElementById('inputClave').value='';
}

document.getElementById('inputClave').addEventListener('keypress',function(e){if(e.key==='Enter')login();});

/* == DATOS == */
function cargarDatos(){
  document.getElementById('contenidoMeses').innerHTML='<div class="loading-state">Cargando grupos...</div>';
  fetch(APPS+'?action=getDatosCoordinadorAsesores',{redirect:'follow'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.status!=='ok'){document.getElementById('contenidoMeses').innerHTML='<div class="loading-state">Error: '+d.mensaje+'</div>';return;}
      dataMeses=d.meses||[];
      renderStats();
      renderMeses();
    })
    .catch(function(e){document.getElementById('contenidoMeses').innerHTML='<div class="loading-state">Error de conexión.</div>';});
}

/* == STATS GLOBALES == */
function renderStats(){
  var totalGrupos=0,totalAlumnos=0,totalLugares=0,totalVencidos=0;
  dataMeses.forEach(function(mes){
    mes.grupos.forEach(function(g){
      totalGrupos++;
      totalAlumnos+=g.inscritos||0;
      totalLugares+=g.lugaresLibres||0;
      (g.alumnos||[]).forEach(function(a){if(a.situacion==='Vencido')totalVencidos++;});
    });
  });
  document.getElementById('stGrupos').textContent=totalGrupos;
  document.getElementById('stAlumnos').textContent=totalAlumnos;
  document.getElementById('stLugares').textContent=totalLugares;
  document.getElementById('stVencidos').textContent=totalVencidos;
}

/* == RENDER MESES == */
var mesActualKey=(function(){var h=new Date();return h.getFullYear()+'-'+('0'+(h.getMonth()+1)).slice(-2);})();

function renderMeses(){
  var cont=document.getElementById('contenidoMeses');
  if(!dataMeses.length){cont.innerHTML='<div class="loading-state">Sin grupos en el período.</div>';return;}
  cont.innerHTML='';
  // Orden: proximo -> actual -> anterior
  var ordenado=[].concat(dataMeses).sort(function(a,b){
    var pa=a.key>mesActualKey?0:(a.key===mesActualKey?1:2);
    var pb=b.key>mesActualKey?0:(b.key===mesActualKey?1:2);
    return pa-pb;
  });
  ordenado.forEach(function(mes){
    var esActual=mes.key===mesActualKey;
    var esSiguiente=mes.key>mesActualKey;
    var tipoBadge=esActual?'actual':(esSiguiente?'siguiente':'');
    var tipoLabel=esActual?'Mes actual':(esSiguiente?'Proximo mes':'Mes anterior');
    var sec=document.createElement('div');
    sec.className='mes-section';
    sec.innerHTML='<div class="mes-header"><span class="mes-title">'+mes.nombre+'</span><span class="mes-badge '+tipoBadge+'">'+tipoLabel+' - '+mes.grupos.length+' grupo'+(mes.grupos.length!==1?'s':'')+'</span></div><div class="grupos-grid" id="grid-'+mes.key+'"></div>';
    cont.appendChild(sec);
    var grid=document.getElementById('grid-'+mes.key);
    mes.grupos.forEach(function(g){
      var ll=g.lugaresLibres||0;
      var llClass=ll===0?'lugares-lleno':(ll<=2?'lugares-poco':'lugares-ok');
      var llText=ll===0?'Lleno':(ll+' libre'+(ll!==1?'s':''));
      var card=document.createElement('div');
      card.className='grupo-card';
      // Grupos llenos: tono tenue
      if(ll===0) card.style.cssText='opacity:0.38;filter:saturate(0.3);';
      card.innerHTML=
        '<div class="grupo-top">'+
          '<span class="grupo-id">'+g.id+'</span>'+
          '<span class="lugares-badge '+llClass+'" style="font-size:14px;padding:5px 14px;font-weight:800;">'+
            (ll===0?'Sin lugares':'<strong>'+ll+'</strong> lugar'+(ll!==1?'es':''))+
          '</span>'+
        '</div>'+
        '<div class="grupo-nombre">'+g.nombre+'</div>'+
        '<div class="grupo-meta">'+
          '<span>📅 '+g.fechaInicio+'</span>'+
          '<span>🕐 '+g.horario+'</span>'+
        '</div>'+
        '<div class="grupo-footer">'+
          '<span>👨‍🏫 <strong>'+g.maestro+'</strong></span>'+
          '<span style="color:#64748b;">'+g.inscritos+'/'+g.cupoMax+'</span>'+
        '</div>';
      card.onclick=function(){abrirGrupo(g);};
      grid.appendChild(card);
    });
  });
}

/* == MODAL GRUPO == */
function abrirGrupo(g){
  document.getElementById('mGrupoNombre').textContent=g.nombre;
  document.getElementById('mGrupoSub').textContent=g.id+' | '+g.fechaInicio+' | '+g.horario;

  // Personal
  document.getElementById('mPersonal').innerHTML=
    '<div class="personal-chip"><span class="pc-label">Maestro</span><span class="pc-val">'+g.maestro+'</span></div>'+
    '<div class="personal-chip"><span class="pc-label">Asistente CE</span><span class="pc-val">'+g.asistente+'</span></div>'+
    '<div class="personal-chip"><span class="pc-label">Cupo</span><span class="pc-val">'+g.cupoMax+' lugares</span></div>';

  // Mini stats
  var alumnos=g.alumnos||[];
  var vigentes=alumnos.filter(function(a){return a.situacion==='Vigente';}).length;
  var vencidos=alumnos.filter(function(a){return a.situacion==='Vencido';}).length;
  var sinPago=alumnos.filter(function(a){return a.situacion==='Sin pago';}).length;
  var becados=alumnos.filter(function(a){return a.situacion==='Becado';}).length;
  document.getElementById('mStats').innerHTML=
    '<div class="mstat"><div class="mstat-num" style="color:#4ade80;">'+vigentes+'</div><div class="mstat-label">Vigentes</div></div>'+
    '<div class="mstat"><div class="mstat-num" style="color:#f87171;">'+vencidos+'</div><div class="mstat-label">Vencidos</div></div>'+
    '<div class="mstat"><div class="mstat-num" style="color:#94a3b8;">'+sinPago+'</div><div class="mstat-label">Sin pago</div></div>'+
    '<div class="mstat"><div class="mstat-num" style="color:#fcd34d;">'+becados+'</div><div class="mstat-label">Becados</div></div>';

  // Tabla alumnos
  var tbody=document.getElementById('mTablaBody');
  if(!alumnos.length){
    tbody.innerHTML='<tr><td colspan="4" class="empty-table">Sin alumnos inscritos</td></tr>';
  } else {
    tbody.innerHTML=alumnos.map(function(a){
      var chipClass={
        'Vigente':'chip-vigente','Vencido':'chip-vencido','Sin pago':'chip-sinpago',
        'Becado':'chip-becado','Pendiente':'chip-pendiente','Baja':'chip-baja'
      }[a.situacion]||'chip-sinpago';
      return '<tr>'+
        '<td><div class="al-nombre">'+a.nombre+'</div><div class="al-id">'+a.id+'</div></td>'+
        '<td>'+a.asesor+'</td>'+
        '<td><span class="chip '+chipClass+'">'+a.situacion+'</span></td>'+
        '<td>'+(a.pagoHasta||'—')+'</td>'+
      '</tr>';
    }).join('');
  }
  document.getElementById('modalGrupo').classList.add('open');
}

function closeModal(){document.getElementById('modalGrupo').classList.remove('open');}
function closeMbg(e){if(e.target===document.getElementById('modalGrupo'))closeModal();}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

/* == REPORTE WHATSAPP == */
function mandarReporte(){
  var numero='522721564694'; // Numero de prueba - ajustar al grupo de ventas
  var ahora=new Date();
  var meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var diasSem=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  var fechaStr=diasSem[ahora.getDay()]+' '+('0'+ahora.getDate()).slice(-2)+'/'+meses[ahora.getMonth()]+'/'+ahora.getFullYear();
  var hh=ahora.getHours();var mm=('0'+ahora.getMinutes()).slice(-2);
  var ampm=hh>=12?'PM':'AM';hh=hh%12||12;
  var horaStr=hh+':'+mm+' '+ampm;

  // Recopilar grupos con vacantes ordenados: siguiente->actual->anterior
  var ordenado=[].concat(dataMeses).sort(function(a,b){
    var pa=a.key>mesActualKey?0:(a.key===mesActualKey?1:2);
    var pb=b.key>mesActualKey?0:(b.key===mesActualKey?1:2);
    return pa-pb;
  });

  var lineas=[];
  var totalGrupos=0,totalVacantes=0;

  ordenado.forEach(function(mes){
    var conVacantes=mes.grupos.filter(function(g){return (g.lugaresLibres||0)>0;});
    if(!conVacantes.length) return;

    // Agrupar por fecha de inicio dentro del mes
    var porFecha={};
    conVacantes.forEach(function(g){
      if(!porFecha[g.fechaInicio]) porFecha[g.fechaInicio]=[];
      porFecha[g.fechaInicio].push(g);
    });

    Object.keys(porFecha).sort(function(a,b){
      return new Date(a.split('/').reverse().join('-'))-new Date(b.split('/').reverse().join('-'));
    }).forEach(function(fecha){
      // Formato fecha: "01 JUN"
      var parts=fecha.split('/');
      var mesNomCorto=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'][parseInt(parts[1])-1];
      lineas.push('');
      lineas.push('📅 INICIO '+parts[0]+' '+mesNomCorto);
      porFecha[fecha].forEach(function(g){
        var ll=g.lugaresLibres||0;
        lineas.push('  • '+g.id+' · '+g.nombre+' · '+g.horario+' → '+ll+' lugar'+(ll!==1?'es':''));
        totalGrupos++;totalVacantes+=ll;
      });
    });
  });

  if(!totalGrupos){
    alert('No hay grupos con vacantes disponibles en este momento.');
    return;
  }

  var reporte=
    '\u{1F4CA} *REPORTE DE DISPONIBILIDAD*\n'+
    'Organic English - '+fechaStr+' - '+horaStr+'\n\n'+
    '\u{1F7E2} *GRUPOS CON VACANTES DISPONIBLES*'+
    lineas.join('\n')+'\n\n'+
    '-----------------------\n'+
    'Total grupos: '+totalGrupos+'  |  Total vacantes: '+totalVacantes+'\n'+
    '-----------------------\n'+
    'Organic English - organicenglish1.com';

    var url='https://wa.me/'+numero+'?text='+encodeURIComponent(reporte);
  window.open(url,'_blank');
}
</script>

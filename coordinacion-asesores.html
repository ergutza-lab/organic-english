<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coordinación de Asesores — Organic English</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0b1120;--surface:#1a2540;--surface2:#1e2d4e;--border:rgba(255,255,255,0.07);
      --orange:#f97316;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--purple:#8b5cf6;
      --text:#f1f5f9;--muted:#64748b;--subtle:#334155;
    }
    body { font-family:'Segoe UI',Arial,sans-serif; background-color:#0f172a; background-image:url('https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/hero3.webp'); background-size:cover; background-position:center; background-attachment:fixed; color:var(--text); min-height:100vh; }
    body::before { content:''; position:fixed; inset:0; background:rgba(15,23,42,0.3); z-index:0; pointer-events:none; }
    .screen,header { position:relative; z-index:1; }
    .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.login-box { background: #1e2a4a; border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 24px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; }
  .login-box img { width: 340px; height: auto; }
  .login-box h1 { color: #fff; font-size: 22px; font-weight: 600; margin: 10px 0 0 0; }
  .login-box p { color: #64748b; font-size: 13px; margin: 4px 0 16px 0; }
    .field { margin-bottom:16px; }
    .field label { display:block; color:#94a3b8; font-size:11px; font-weight:700; letter-spacing:0.7px; text-transform:uppercase; margin-bottom:7px; }
    .field input { width:100%; background:var(--bg); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:13px 16px; color:var(--text); font-size:15px; outline:none; transition:border-color 0.2s; }
    .field input:focus { border-color:var(--orange); }
    .btn-primary { width:100%; background:linear-gradient(135deg,#f97316,#ea580c); color:#fff; border:none; border-radius:100px; padding:15px; font-size:15px; font-weight:700; cursor:pointer; margin-top:8px; }
    .btn-primary:hover { opacity:0.9; }
    .error-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:10px; padding:12px; color:#f87171; font-size:13px; margin-top:12px; display:none; text-align:center; }
    .screen { display:none; }
    .screen.active { display:block; }
    .panel-root { max-width:1100px; margin:0 auto; padding:2rem 2rem 3rem; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; }
    .logo-area { display:flex; align-items:center; gap:12px; }
    .logo-area img { height:48px; }
    .logo-text { font-size:16px; font-weight:600; color:var(--text); }
    .top-right { display:flex; align-items:center; gap:10px; }
    .avatar { width:36px; height:36px; border-radius:50%; background:#1c2b5e; border:2px solid var(--orange); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; }
    .btn-logout { font-size:13px; color:var(--muted); border:1px solid var(--border); border-radius:8px; padding:6px 13px; background:transparent; cursor:pointer; }
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:1.5rem; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem 0.8rem; text-align:center; }
    .stat-card.orange { border-color:rgba(249,115,22,0.3); }
    .stat-card.blue { border-color:rgba(59,130,246,0.3); }
    .stat-card.green { border-color:rgba(34,197,94,0.3); }
    .stat-card.purple { border-color:rgba(139,92,246,0.3); }
    .stat-num { font-size:28px; font-weight:700; color:var(--text); }
    .stat-label { font-size:11px; color:var(--muted); margin-top:4px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.4rem; margin-bottom:1.5rem; }
    .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.2rem; }
    .card-title { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; }
    .tabla-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; padding:0 12px 10px; text-align:left; border-bottom:1px solid var(--border); }
    td { padding:14px 12px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle; color:#94a3b8; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:rgba(255,255,255,0.02); }
    .asesor-nombre { font-size:14px; font-weight:600; color:var(--text); }
    .asesor-id { font-size:11px; color:var(--muted); margin-top:2px; }
    .asesor-foto { width:38px; height:38px; border-radius:50%; object-fit:cover; border:2px solid rgba(249,115,22,0.4); }
    .asesor-foto-fallback { width:38px; height:38px; border-radius:50%; background:rgba(249,115,22,0.15); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:var(--orange); border:2px solid rgba(249,115,22,0.3); }
    .badge { font-size:11px; padding:4px 10px; border-radius:20px; font-weight:600; display:inline-block; }
    .badge-activo { background:rgba(34,197,94,0.15); color:#4ade80; border:1px solid rgba(34,197,94,0.25); }
    .badge-inactivo { background:rgba(239,68,68,0.12); color:#f87171; border:1px solid rgba(239,68,68,0.25); }
    .badge-pendiente { background:rgba(249,115,22,0.15); color:#fb923c; border:1px solid rgba(249,115,22,0.25); }
    .btn-wa { display:inline-flex; align-items:center; gap:6px; background:rgba(34,197,94,0.15); color:#4ade80; border:1px solid rgba(34,197,94,0.25); padding:6px 12px; border-radius:8px; font-size:12px; text-decoration:none; }
    .btn-wa:hover { background:rgba(34,197,94,0.2); }
    .btn-wa svg { width:14px; height:14px; }
    .info-row { display:flex; gap:20px; flex-wrap:wrap; }
    .info-col { font-size:12px; color:var(--muted); }
    .info-col span { color:var(--text); font-weight:500; }
    .empty-state { text-align:center; color:var(--muted); padding:40px; font-size:14px; }
    @media(max-width:768px){
      .stats-row{grid-template-columns:1fr}
      .tabla-wrap{overflow-x:auto}
      table{min-width:700px}
    }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="screenLogin" class="screen active">
    <div class="login-wrap">
      <div class="login-box">
        <img src="images/flor.jpg.webp" alt="Logo" />
        <h1>Coordinación de Asesores</h1>
        <p>Ingresa tus credenciales para acceder</p>
        <div class="field">
          <label>ID de Coordinador</label>
          <input type="text" id="inputId" placeholder="Ej. CA001" />
        </div>
        <div class="field">
          <label>Clave de acceso</label>
          <input type="password" id="inputClave" placeholder="Tu contraseña" />
        </div>
        <button class="btn-primary" onclick="login()">Entrar</button>
        <div class="error-msg" id="errorMsg"></div>
      </div>
    </div>
  </div>

  <!-- PANEL -->
  <div id="screenPanel" class="screen">
    <div class="panel-root">
      <div class="top-bar">
        <div class="logo-area">
          <img src="images/flor.jpg.webp" alt="Logo" />
          <span class="logo-text">Organic English</span>
        </div>
        <div class="top-right">
          <div class="avatar" id="avatarInitials">CA</div>
          <button class="btn-logout" onclick="logout()">Salir</button>
        </div>
      </div>

      <div class="date-selector">
        <label>Selecciona semana:</label>
        <input type="date" id="semanaSelector" />
        <button class="btn-confirm" onclick="confirmarFecha()">Cargar</button>
        <span class="date-range" id="dateRange">Presiona Cargar para ver datos</span>
      </div>

      <div class="stats-row">
        <div class="stat-card orange">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-label">Asesores Activos</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-num" id="statInscritos">0</div>
          <div class="stat-label">Inscritos esta semana</div>
        </div>
        <div class="stat-card green">
          <div class="stat-num" id="statPendientes">0</div>
          <div class="stat-label">En trámite</div>
        </div>
        <div class="stat-card purple">
          <div class="stat-num" id="statCancelados">0</div>
          <div class="stat-label">Cancelados</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Lista de Asesores</span>
        </div>
        <div class="tabla-wrap">
          <table>
            <thead>
              <tr>
                <th>Asesor</th>
                <th>Esta Semana</th>
                <th>Pendientes</th>
                <th>Cancelados</th>
                <th>Estado</th>
                <th>WhatsApp</th>
              </tr>
            </thead>
            <tbody id="tablaAsesores">
              <tr><td colspan="6" class="empty-state" id="loadingMsg">Cargando asesores...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbwZm4Yl1u_Qm-FSyS6FGA84wV8cp6flpHggXnslzg-PxlUD7LVD-1Iftr3NHBJwHFYO/exec';
    var caData = null;
    var asesoresData = [];

    function login() {
      var id = document.getElementById('inputId').value.trim().toUpperCase();
      var clave = document.getElementById('inputClave').value.trim();
      var err = document.getElementById('errorMsg');
      if (!id || !clave) {
        err.style.display = 'block';
        err.textContent = 'Completa todos los campos.';
        return;
      }
      err.style.display = 'none';
      var btn = document.querySelector('.btn-primary');
      btn.textContent = 'Verificando...';
      btn.disabled = true;
      
      var url = APPS_SCRIPT + '?action=loginCoordinadorAsesores&id=' + encodeURIComponent(id) + '&clave=' + encodeURIComponent(clave);
      console.log('Login URL:', url);
      
      fetch(url)
        .then(function(response) {
          console.log('Response status:', response.status);
          if (!response.ok) throw new Error('HTTP ' + response.status);
          return response.json();
        })
        .then(function(data) {
          console.log('Login response:', data);
          btn.textContent = 'Entrar';
          btn.disabled = false;
          if (data.status === 'ok') {
            caData = data;
            mostrarPanel();
          } else {
            err.style.display = 'block';
            err.textContent = data.mensaje || 'ID o clave incorrectos.';
          }
        })
        .catch(function(e) {
          console.error('Login error:', e);
          btn.textContent = 'Entrar';
          btn.disabled = false;
          err.style.display = 'block';
          err.textContent = 'Error de conexión: ' + e.message + '. Verifica que el Apps Script esté desplegado.';
        });
    }

    function mostrarPanel() {
      document.getElementById('screenLogin').classList.remove('active');
      document.getElementById('screenPanel').classList.add('active');
      var ini = (caData.nombre || 'CA').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
      document.getElementById('avatarInitials').textContent = ini;
      
      var hoy = new Date();
      var fechaDefault = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
      document.getElementById('semanaSelector').value = fechaDefault.toISOString().split('T')[0];
      
      document.getElementById('dateRange').textContent = 'Presiona Cargar para ver datos';
      document.getElementById('tablaAsesores').innerHTML = '<tr><td colspan="6" class="empty-state">Selecciona una semana y presiona Cargar</td></tr>';
    }

    function formatDate(date) {
      var meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      return ('0' + date.getDate()).slice(-2) + '/' + meses[date.getMonth()] + '/' + date.getFullYear();
    }
    
    function confirmarFecha() {
      var fechaSemana = document.getElementById('semanaSelector').value;
      if (!fechaSemana) {
        alert('Selecciona una fecha');
        return;
      }
      
      var fechaSeleccionada = new Date(fechaSemana + 'T12:00:00');
      
      var dia = fechaSeleccionada.getDay();
      var diff = dia === 0 ? 6 : dia - 1;
      var lunes = new Date(fechaSeleccionada);
      lunes.setDate(lunes.getDate() - diff);
      
      var domingo = new Date(lunes);
      domingo.setDate(domingo.getDate() + 6);
      
      document.getElementById('dateRange').textContent = formatDate(lunes) + ' al ' + formatDate(domingo);
      
      cargarDatos(fechaSemana);
    }

    function cargarDatos(fechaSemana) {
      var loadingEl = document.getElementById('loadingMsg');
      if (loadingEl) loadingEl.textContent = 'Cargando datos...';
      var url = APPS_SCRIPT + '?action=getDatosCoordinadorAsesores&fecha=' + encodeURIComponent(fechaSemana);
      console.log('Data URL:', url);
      
      fetch(url)
        .then(function(response) {
          console.log('Data response status:', response.status);
          if (!response.ok) throw new Error('HTTP ' + response.status);
          return response.json();
        })
        .then(function(data) {
          console.log('Datos recibidos:', data);
          if (data.status === 'error') {
            document.getElementById('loadingMsg').textContent = 'Error: ' + data.mensaje;
            return;
          }
          if (data.status !== 'ok') {
            document.getElementById('loadingMsg').textContent = 'Error desconocido';
            return;
          }
          asesoresData = data.asesores || [];
          console.log('Asesores:', asesoresData);
          renderStats(data);
          renderAsesores();
        })
        .catch(function(e) {
          console.error('Error cargando datos:', e);
          document.getElementById('loadingMsg').textContent = 'Error de conexión: ' + e.message;
        });
    }

    function renderStats(data) {
      console.log('RenderStats called with:', data);
      var activos = asesoresData.filter(a => a.activo !== false).length;
      document.getElementById('statTotal').textContent = activos;
      document.getElementById('statInscritos').textContent = data.inscritosSemana || 0;
      document.getElementById('statPendientes').textContent = data.pendientesSemana || 0;
      document.getElementById('statCancelados').textContent = data.canceladosTotal || 0;
    }

    function renderAsesores() {
      var tbody = document.getElementById('tablaAsesores');
      if (!asesoresData.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Sin asesores registrados</td></tr>';
        return;
      }
      
      tbody.innerHTML = asesoresData.map(function(a) {
        var foto = a.Foto_URL 
          ? '<img src="' + a.Foto_URL + '" class="asesor-foto" onerror="this.style.display=\'none\'" />'
          : '<div class="asesor-foto-fallback">' + (a.Nombre ? a.Nombre[0] : 'A') + '</div>';
        
        var badge = a.activo !== false 
          ? '<span class="badge badge-activo">Activo</span>'
          : '<span class="badge badge-inactivo">Inactivo</span>';
        
        var waLink = a.WhatsApp 
          ? '<a href="https://wa.me/52' + a.WhatsApp.replace(/\D/g,'') + '" target="_blank" class="btn-wa"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.549 4.122 1.515 5.86L0 24l6.318-1.498A11.951 11.951 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.001-1.372l-.36-.213-3.741.886.902-3.636-.234-.374A9.818 9.818 0 1112 21.818z"/></svg></a>'
          : '—';
        
        var semana = a.inscritos_semana || 0;
        var pendientes = a.pendientes_semana || 0;
        var cancelados = a.cancelados || 0;
        
        return '<tr>' +
          '<td><div style="display:flex;align-items:center;gap:10px;">' + foto + '<div><div class="asesor-nombre">' + (a.Nombre || '—') + '</div><div class="asesor-id">' + (a.ID_Asesor || '—') + '</div></div></td>' +
          '<td style="font-weight:700;color:var(--green);">' + semana + '</td>' +
          '<td style="font-weight:700;color:var(--orange);">' + pendientes + '</td>' +
          '<td style="font-weight:700;color:var(--red);">' + cancelados + '</td>' +
          '<td>' + badge + '</td>' +
          '<td>' + waLink + '</td>' +
        '</tr>';
      }).join('');
    }

    function logout() {
      caData = null;
      document.getElementById('screenPanel').classList.remove('active');
      document.getElementById('screenLogin').classList.add('active');
      document.getElementById('inputId').value = '';
      document.getElementById('inputClave').value = '';
    }

    document.getElementById('inputClave').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>

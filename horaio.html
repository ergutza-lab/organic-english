<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Horario de Clases · Organic English</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f172a;--navy:#1c2b5e;--surface:#1e2a4a;--surface2:#243373;--border:rgba(255,255,255,0.1);--orange:#f97316;--orange2:#fb923c;--green:#22c55e;--yellow:#facc15;--red:#ef4444;--text:#f1f5f9;--text-muted:#94a3b8;--text-subtle:#475569}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{background:rgba(28,43,94,0.98);border-bottom:1px solid var(--border);padding:0.55rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:60px}
.logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none}
.logo-img{height:70px;object-fit:contain}
.nav-right{display:flex;align-items:center;gap:8px}
.btn-nav{background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--text-muted);padding:8px 16px;border-radius:100px;font-size:13px;font-weight:600;text-decoration:none;transition:all 0.2s;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-nav:hover{background:rgba(255,255,255,0.14);color:#fff}
.btn-nav.primary{background:var(--orange);border-color:var(--orange);color:#fff}
.btn-nav.primary:hover{background:var(--orange2)}

/* HERO */
.hero{background:linear-gradient(135deg,var(--navy) 0%,#0f1a3d 100%);border-bottom:1px solid var(--border);padding:2rem 1.5rem 0}
.hero-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:1rem;padding-bottom:1.5rem}
.hero h1{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;color:#fff}
.hero p{color:var(--text-muted);font-size:0.9rem;max-width:600px}
.week-selector{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.week-selector button{background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--text-muted);padding:7px 16px;border-radius:100px;font-size:13px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif}
.week-selector button:hover{background:rgba(255,255,255,0.14);color:#fff}
.week-label{font-size:14px;font-weight:600;color:var(--text)}

/* CONTAINER */
.container{max-width:1200px;margin:0 auto;padding:1.25rem 1.25rem 4rem}

/* LOADING / ERROR */
.loading{text-align:center;padding:3rem;color:var(--text-muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top:3px solid var(--orange);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:1.5rem;text-align:center;color:var(--red)}

/* WEEKLY GRID */
.schedule-wrap{overflow-x:auto;padding-bottom:8px}
.schedule{display:grid;grid-template-columns:80px repeat(6,1fr);gap:6px;min-width:820px}
.schedule-header{display:contents}
.day-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;font-weight:700;font-size:13px;color:var(--text)}
.day-header.today{background:rgba(249,115,22,0.15);border-color:var(--orange);color:var(--orange2)}
.day-header .day-name{display:block;text-transform:uppercase;letter-spacing:0.06em;font-size:11px;color:var(--text-muted)}
.day-header.today .day-name{color:var(--orange2)}
.day-header .day-date{display:block;font-size:18px;margin-top:2px}
.corner{background:transparent;border:none}

/* TIME SLOTS */
.time-label{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text-muted);padding:4px;min-height:100px}

/* GROUP CELL */
.cell{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:8px;min-height:100px;display:flex;flex-direction:column;gap:6px}
.cell.has-groups{background:rgba(255,255,255,0.05)}

/* GROUP CARD */
.g-card{background:var(--surface2);border-radius:8px;padding:10px 12px;cursor:default;transition:all 0.2s;position:relative;overflow:hidden}
.g-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.g-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:8px 0 0 8px}
.g-card.level-a1::before{background:#22c55e}
.g-card.level-a2::before{background:#3b82f6}
.g-card.level-b1::before{background:#facc15}
.g-card.level-b2::before{background:#f97316}
.g-card.level-c1::before{background:#ef4444}

.g-card .g-name{font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px}
.g-card .g-name .g-id{font-size:10px;color:var(--text-muted);font-weight:500}
.g-card .g-level{font-size:10px;font-weight:700;color:var(--orange2);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px}
.g-card .g-meta{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.g-card .g-time{font-size:10px;color:var(--text-muted)}
.g-card .g-capacity{font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.g-card .g-capacity .g-count{font-weight:700;color:var(--text)}
.g-card .g-status{font-size:9px;font-weight:700;padding:2px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:0.04em}
.g-status.activo{background:rgba(34,197,94,0.15);color:#4ade80}
.g-status.disponible{background:rgba(34,197,94,0.15);color:#4ade80}
.g-status.lleno{background:rgba(239,68,68,0.12);color:#f87171}
.g-status.curso{background:rgba(202,138,4,0.15);color:#fbbf24}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted)}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.legend-dot.l1{background:#22c55e}
.legend-dot.l2{background:#3b82f6}
.legend-dot.l3{background:#facc15}
.legend-dot.l4{background:#f97316}
.legend-dot.l5{background:#ef4444}

/* EMPTY */
.empty-week{text-align:center;padding:3rem;color:var(--text-muted)}
.empty-week p{font-size:15px;margin-top:8px}

/* RESPONSIVE */
@media(max-width:768px){
  header{padding:0.55rem 0.75rem}
  .logo-img{height:50px}
  .hero{padding:1.25rem 0.75rem 0}
  .hero-inner{padding-bottom:1rem}
  .container{padding:1rem 0.75rem 3rem}
  .schedule{grid-template-columns:60px repeat(6,1fr);gap:4px;min-width:640px;font-size:12px}
  .day-header{padding:8px 4px;font-size:11px}
  .day-header .day-date{font-size:15px}
  .time-label{font-size:11px;min-height:80px}
  .cell{min-height:80px;padding:5px}
  .g-card{padding:7px 8px}
  .g-card .g-name{font-size:12px}
  .g-card .g-level{font-size:9px}
  .legend{gap:6px;padding:10px 12px}
  .legend-item{font-size:11px}
}
@media(max-width:480px){
  .day-header .day-date{font-size:13px}
  .day-header .day-name{font-size:9px}
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <img src="https://github.com/ergutza-lab/organic-english-classes/raw/main/imagenes/logoblanco2.png" alt="OE" class="logo-img">
  </a>
  <div class="nav-right">
    <a href="niveles.html" class="btn-nav">Niveles</a>
    <a href="inscripcion.html" class="btn-nav primary">Inscribirse</a>
  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <h1>Horario de Clases 📅</h1>
    <p>Grupos activos de <strong>Organic English</strong> — Horarios, niveles y disponibilidad para esta semana.</p>
    <div class="week-selector">
      <button id="prevWeek" onclick="cambiarSemana(-1)">◀ Semana anterior</button>
      <span class="week-label" id="weekLabel">Esta semana</span>
      <button id="nextWeek" onclick="cambiarSemana(1)">Semana siguiente ▶</button>
    </div>
  </div>
</section>

<div class="container">
  <div id="legend" class="legend"></div>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando horario...</p>
  </div>
  <div id="error" class="error-box" style="display:none">
    <p>No se pudieron cargar los datos. Intenta de nuevo más tarde.</p>
  </div>
  <div id="scheduleWrap" class="schedule-wrap" style="display:none"></div>
</div>

<script>
const SHEET_ID = '1o4j9xO55LOMe7APJGYZlonq6pbAiN8Gy16istfKh0vU';
const DAYS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const DAYS_SHORT = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const SHOW_DAYS = [1,2,3,4,5,6]; // Mon–Sat
const LEVEL_COLORS = { 'A1':'#22c55e','A2':'#3b82f6','B1':'#facc15','B2':'#f97316','C1':'#ef4444' };

var grupos = [];
var semanaOffset = 0;

function parseFecha(cell) {
  if (!cell || !cell.v) return null;
  if (cell.v && typeof cell.v === 'object' && cell.v.$t) return new Date(cell.v.$t);
  if (typeof cell.v === 'string' && cell.v.includes('Date')) {
    var m = cell.v.match(/Date\((\d+),(\d+),(\d+)/);
    if (m) return new Date(+m[1], +m[2], +m[3]);
  }
  return null;
}

function fechaISO(f) {
  var y=f.getFullYear(), m=String(f.getMonth()+1).padStart(2,'0'), d=String(f.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+d;
}

function getWeekStart(fecha) {
  var d = new Date(fecha);
  var dia = d.getDay();
  var diff = dia === 0 ? -6 : 1 - dia;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function getWeekEnd(weekStart) {
  var d = new Date(weekStart);
  d.setDate(d.getDate() + 6);
  return d;
}

function formatDate(d) {
  return d.getDate()+' '+['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()];
}

function parseTimeRange(horario) {
  var m = horario.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)?/i);
  if (!m) return 12;
  var h = parseInt(m[1], 10);
  var ampm = (m[3]||'').toUpperCase();
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return h;
}

async function cargarGrupos() {
  try {
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=GRUPOS&t=' + Date.now();
    var res = await fetch(url);
    var text = await res.text();
    var json = JSON.parse(text.substring(47, text.length - 2));
    grupos = json.table.rows.map(function(r) {
      return {
        id: r.c[0]?.v || '',
        nombre: r.c[1]?.v || '',
        horario: r.c[2]?.v || '',
        fechaObj: parseFecha(r.c[3]),
        nivel: String(r.c[4]?.v || '').trim(),
        cupoMax: r.c[5]?.v ?? 10,
        inscritos: r.c[6]?.v ?? 0,
        libres: r.c[7]?.v ?? 0,
        estado: r.c[8]?.v || ''
      };
    }).filter(function(g) {
      return g.id && String(g.estado).trim() !== 'Cancelado';
    });
    renderizar();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function getLevelBase(nivel) {
  if (!nivel) return 'A1';
  var m = nivel.match(/^([ABC]\d)/);
  return m ? m[1] : 'A1';
}

function renderizar() {
  document.getElementById('loading').style.display = 'none';

  var today = new Date();
  var weekStart = getWeekStart(today);
  weekStart.setDate(weekStart.getDate() + semanaOffset * 7);
  var weekEnd = getWeekEnd(weekStart);

  // Update week label
  var label = document.getElementById('weekLabel');
  if (semanaOffset === 0) label.textContent = 'Esta semana';
  else if (semanaOffset === -1) label.textContent = 'Semana pasada';
  else if (semanaOffset === 1) label.textContent = 'Próxima semana';
  else label.textContent = 'Semana del ' + formatDate(weekStart);

  // Build time slots (6 AM to 11 PM)
  var slots = [];
  for (var h = 6; h <= 23; h++) slots.push(h);

  // Filter groups to this week
  var weekGroups = grupos.filter(function(g) {
    if (!g.fechaObj) return false;
    return g.fechaObj >= weekStart && g.fechaObj <= weekEnd;
  });

  // Build grid data: groupsByDayAndHour[day][hour] = [group, ...]
  var groupsByDay = {};
  SHOW_DAYS.forEach(function(d) { groupsByDay[d] = {}; });

  weekGroups.forEach(function(g) {
    if (!g.fechaObj) return;
    var day = g.fechaObj.getDay();
    if (SHOW_DAYS.indexOf(day) === -1) return;
    var hour = parseTimeRange(g.horario);
    // Round to nearest hour slot
    var slot = hour;
    if (!groupsByDay[day][slot]) groupsByDay[day][slot] = [];
    groupsByDay[day][slot].push(g);
  });

  // Render
  var wrap = document.getElementById('scheduleWrap');
  var html = '<div class="schedule">';

  // Header row
  html += '<div class="corner"></div>';
  SHOW_DAYS.forEach(function(d) {
    var date = new Date(weekStart);
    date.setDate(date.getDate() + (d - 1));
    var isToday = fechaISO(date) === fechaISO(today);
    html += '<div class="day-header' + (isToday ? ' today' : '') + '">';
    html += '<span class="day-name">' + DAYS_SHORT[d] + '</span>';
    html += '<span class="day-date">' + date.getDate() + '</span>';
    html += '</div>';
  });

  // Time rows
  slots.forEach(function(h) {
    var timeLabel = (h > 12 ? (h - 12) : h) + ':00' + (h >= 12 ? ' PM' : ' AM');
    if (h === 12) timeLabel = '12:00 PM';
    if (h === 0) timeLabel = '12:00 AM';
    if (h === 24) timeLabel = '12:00 AM';

    html += '<div class="time-label">' + timeLabel + '</div>';

    SHOW_DAYS.forEach(function(d) {
      var dayGroups = groupsByDay[d] && groupsByDay[d][h];
      var hasGroups = dayGroups && dayGroups.length > 0;
      html += '<div class="cell' + (hasGroups ? ' has-groups' : '') + '">';

      if (hasGroups) {
        dayGroups.forEach(function(g) {
          var levelBase = getLevelBase(g.nivel);
          var estado = String(g.estado || '').trim().toLowerCase();
          var statusClass = estado === 'disponible' ? 'disponible' : (estado === 'lleno' ? 'lleno' : (g.inscritos > 0 ? 'curso' : 'activo'));
          var inscritos = Math.max(0, Math.min(g.cupoMax, g.inscritos));

          html += '<div class="g-card level-' + levelBase.toLowerCase() + '">';
          html += '<div class="g-name">' + g.nombre + ' <span class="g-id">' + g.id + '</span></div>';
          html += '<div class="g-level">' + g.nivel + '</div>';
          html += '<div class="g-meta">';
          html += '<span class="g-time">' + g.horario + '</span>';
          html += '<span class="g-capacity"><span class="g-count">' + inscritos + '</span>/' + g.cupoMax + '</span>';
          html += '</div>';
          html += '<div style="display:flex;justify-content:flex-end;margin-top:4px;"><span class="g-status ' + statusClass + '">' + (estado || 'activo') + '</span></div>';
          html += '</div>';
        });
      }

      html += '</div>';
    });
  });

  html += '</div>';
  wrap.innerHTML = html;
  wrap.style.display = 'block';

  // Build legend
  var legendHtml = '';
  Object.keys(LEVEL_COLORS).forEach(function(lv) {
    legendHtml += '<span class="legend-item"><span class="legend-dot" style="background:' + LEVEL_COLORS[lv] + '"></span>' + lv + '</span>';
  });
  legendHtml += '<span class="legend-item"><span class="legend-dot" style="background:rgba(34,197,94,0.15);border:1px solid #4ade80"></span>Activo</span>';
  legendHtml += '<span class="legend-item"><span class="legend-dot" style="background:rgba(202,138,4,0.15);border:1px solid #fbbf24"></span>En curso</span>';
  legendHtml += '<span class="legend-item"><span class="legend-dot" style="background:rgba(239,68,68,0.12);border:1px solid #f87171"></span>Lleno</span>';
  document.getElementById('legend').innerHTML = legendHtml;
}

function cambiarSemana(dir) {
  semanaOffset += dir;
  renderizar();
}

cargarGrupos();
</script>
</body>
</html>

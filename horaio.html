<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Horario de Clases · Organic English</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f172a;--navy:#1c2b5e;--surface:#1e2a4a;--surface2:#243373;--border:rgba(255,255,255,0.1);--orange:#f97316;--orange2:#fb923c;--green:#22c55e;--yellow:#facc15;--red:#ef4444;--text:#f1f5f9;--text-muted:#94a3b8;--text-subtle:#475569}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

header{background:rgba(28,43,94,0.98);border-bottom:1px solid var(--border);padding:0.55rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:60px}
.logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none}
.logo-img{height:70px;object-fit:contain}
.nav-right{display:flex;align-items:center;gap:8px}
.btn-nav{background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--text-muted);padding:8px 16px;border-radius:100px;font-size:13px;font-weight:600;text-decoration:none;transition:all 0.2s;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-nav:hover{background:rgba(255,255,255,0.14);color:#fff}
.btn-nav.primary{background:var(--orange);border-color:var(--orange);color:#fff}
.btn-nav.primary:hover{background:var(--orange2)}

.hero{background:linear-gradient(135deg,var(--navy) 0%,#0f1a3d 100%);border-bottom:1px solid var(--border);padding:2rem 1.5rem 0}
.hero-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:0.75rem;padding-bottom:1.5rem}
.hero h1{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;color:#fff}
.hero p{color:var(--text-muted);font-size:0.9rem;max-width:600px}
.hero .week-selector{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hero .week-selector button{background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--text-muted);padding:7px 16px;border-radius:100px;font-size:13px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif}
.hero .week-selector button:hover{background:rgba(255,255,255,0.14);color:#fff}
.week-label{font-size:14px;font-weight:600;color:var(--text)}

.container{max-width:1200px;margin:0 auto;padding:1.25rem 1.25rem 4rem}

.loading{text-align:center;padding:3rem;color:var(--text-muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top:3px solid var(--orange);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:1.5rem;text-align:center;color:var(--red)}

/* SCHEDULE GRID */
.schedule-wrap{overflow-x:auto;padding-bottom:8px}
.schedule{display:grid;gap:6px;min-width:600px}

/* TEACHER HEADER */
.t-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center;min-width:160px}
.t-header .t-name{display:block;font-size:14px;font-weight:700;color:#fff}
.t-header .t-id{display:block;font-size:10px;color:var(--text-muted);margin-top:2px}
.t-header .t-count{display:inline-block;margin-top:6px;font-size:10px;font-weight:700;background:rgba(249,115,22,0.15);color:var(--orange2);padding:2px 10px;border-radius:100px}

/* TIME LABEL */
.time-label{display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text-muted);padding:4px;min-height:100px;white-space:nowrap}

/* CELL */
.cell{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:8px;min-height:100px;display:flex;flex-direction:column;gap:6px}
.cell.has-groups{background:rgba(255,255,255,0.05)}

/* GROUP CARD */
.g-card{background:var(--surface2);border-radius:8px;padding:10px 12px;cursor:default;transition:all 0.2s;position:relative;overflow:hidden}
.g-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.g-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:8px 0 0 8px}
.g-card.lvl-a1::before{background:#1e3a6e}
.g-card.lvl-a2::before{background:#0891b2}
.g-card.lvl-b1::before{background:#16a34a}
.g-card.lvl-b2::before{background:#ea580c}
.g-card.lvl-c1::before{background:#7c3aed}
.g-card .g-id{font-size:11px;font-weight:700;color:#fff}
.g-card .g-name{font-size:10px;color:var(--text-muted);margin-top:1px}
.g-card .g-level{font-size:9px;font-weight:700;color:var(--orange2);text-transform:uppercase;letter-spacing:0.04em;margin-top:3px}
.g-card .g-meta{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
.g-card .g-cap{font-size:10px;color:var(--text-muted)}
.g-card .g-cap strong{color:var(--text)}
.g-card .g-st{font-size:8px;font-weight:700;padding:2px 7px;border-radius:100px;text-transform:uppercase;letter-spacing:0.03em}
.g-st.lleno{background:rgba(239,68,68,0.12);color:#f87171}
.g-st.disp{background:rgba(34,197,94,0.15);color:#4ade80}
.g-st.curso{background:rgba(202,138,4,0.15);color:#fbbf24}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;align-items:center}
.legend .leg-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-right:6px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted)}
.ldot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

@media(max-width:768px){
  header{padding:0.55rem 0.75rem}
  .logo-img{height:50px}
  .hero{padding:1.25rem 0.75rem 0}
  .hero-inner{padding-bottom:1rem}
  .container{padding:1rem 0.75rem 3rem}
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <img src="https://github.com/ergutza-lab/organic-english-classes/raw/main/imagenes/logoblanco2.png" alt="OE" class="logo-img">
  </a>
  <div class="nav-right">
    <a href="niveles.html" class="btn-nav">Niveles</a>
    <a href="inscripcion.html" class="btn-nav primary">Inscribirse</a>
  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <h1>Horario de Clases 📅</h1>
    <p>Grupos activos por maestro y horario.</p>
    <div class="week-selector" style="display:none" id="weekSelector">
      <button id="prevWeek" onclick="cambiarSemana(-1)">◀ Anterior</button>
      <span class="week-label" id="weekLabel">Todos los grupos activos</span>
      <button id="nextWeek" onclick="cambiarSemana(1)">Siguiente ▶</button>
    </div>
  </div>
</section>

<div class="container">
  <div id="legend" class="legend"></div>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando horario...</p>
  </div>
  <div id="error" class="error-box" style="display:none">
    <p>No se pudieron cargar los datos. Intenta de nuevo más tarde.</p>
  </div>
  <div id="scheduleWrap" class="schedule-wrap" style="display:none"></div>
</div>

<script>
const SHEET_ID = '1o4j9xO55LOMe7APJGYZlonq6pbAiN8Gy16istfKh0vU';

function parseGS(cell) {
  if (!cell || !cell.v) return null;
  if (typeof cell.v === 'object' && cell.v.$t) return cell.v.$t;
  return cell.v;
}

function parseHour(horario) {
  if (!horario) return 99;
  var m = horario.match(/(\d{1,2})[:\s]*(\d{2})?\s*(AM|PM)/i);
  if (!m) return 99;
  var h = parseInt(m[1], 10);
  var p = (m[3]||'').toUpperCase();
  if (p === 'PM' && h !== 12) h += 12;
  if (p === 'AM' && h === 12) h = 0;
  return h;
}

function fmtHour(h) {
  if (h === 0) return '12 AM';
  if (h < 12) return h + ' AM';
  if (h === 12) return '12 PM';
  return (h - 12) + ' PM';
}

function getLevelBase(nivel) {
  if (!nivel) return 'a1';
  var m = nivel.match(/([ABC]\d)/i);
  return m ? m[1].toLowerCase() : 'a1';
}

var grupos = [];
var maestros = {};
var allTeachers = [];
var byTeacher = {};

async function cargarMaestros() {
  try {
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=MAESTROS&t=' + Date.now();
    var res = await fetch(url);
    var text = await res.text();
    var json = JSON.parse(text.substring(47, text.length - 2));
    json.table.rows.forEach(function(r) {
      var id = r.c[0]?.v || '';
      var name = r.c[1]?.v || '';
      if (id && name) maestros[id] = name;
    });
  } catch(e) { /* ignore - will show IDs only */ }
}

async function cargarGrupos() {
  await cargarMaestros();
  try {
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=GRUPOS&t=' + Date.now();
    var res = await fetch(url);
    var text = await res.text();
    var json = JSON.parse(text.substring(47, text.length - 2));
    grupos = json.table.rows.map(function(r) {
      return {
        id: parseGS(r.c[0]),
        nombre: parseGS(r.c[1]),
        horario: parseGS(r.c[2]),
        nivel: String(parseGS(r.c[4]) || '').trim(),
        cupoMax: r.c[5]?.v ?? 10,
        inscritos: r.c[6]?.v ?? 0,
        estado: parseGS(r.c[8]) || '',
        idMaestro: parseGS(r.c[11]) || '',
        demo: parseGS(r.c[15]) || ''
      };
    }).filter(function(g) {
      return g.id && String(g.estado).trim() !== 'Cancelado' && g.idMaestro && maestros[g.idMaestro] && !g.demo;
    });
    renderizar();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function renderizar() {
  document.getElementById('loading').style.display = 'none';

  // Group by teacher ID
  byTeacher = {};
  grupos.forEach(function(g) {
    if (!byTeacher[g.idMaestro]) byTeacher[g.idMaestro] = [];
    byTeacher[g.idMaestro].push(g);
  });

  // Get teacher list sorted by name
  allTeachers = Object.keys(byTeacher).sort(function(a, b) {
    return (maestros[a] || a).localeCompare(maestros[b] || b);
  });

  if (allTeachers.length === 0) {
    document.getElementById('scheduleWrap').innerHTML = '<div class="loading"><p>No hay grupos con maestros asignados.</p></div>';
    document.getElementById('scheduleWrap').style.display = 'block';
    return;
  }

  // Collect all hours used
  var hoursSet = {};
  grupos.forEach(function(g) {
    var h = parseHour(g.horario);
    if (h !== 99) hoursSet[h] = true;
  });
  var hours = Object.keys(hoursSet).map(Number).sort(function(a,b){return a-b;});

  // Build grid
  var cols = allTeachers.length + 1; // +1 for time label
  var html = '<div class="schedule" style="grid-template-columns:70px repeat(' + allTeachers.length + ',1fr);">';

  // Header row
  html += '<div></div>';
  allTeachers.forEach(function(tid) {
    var tname = maestros[tid] || tid;
    var count = byTeacher[tid].length;
    html += '<div class="t-header"><span class="t-name">' + tname + '</span><span class="t-id">' + tid + '</span><span class="t-count">' + count + ' grupo' + (count !== 1 ? 's' : '') + '</span></div>';
  });

  // Time rows
  hours.forEach(function(h) {
    html += '<div class="time-label">' + fmtHour(h) + '</div>';
    allTeachers.forEach(function(tid) {
      var teacherGroups = byTeacher[tid] || [];
      var matching = teacherGroups.filter(function(g) { return parseHour(g.horario) === h; });
      html += '<div class="cell' + (matching.length > 0 ? ' has-groups' : '') + '">';
      matching.forEach(function(g) {
        var levelBase = getLevelBase(g.nivel);
        var st = String(g.estado || '').trim().toLowerCase();
        var stClass = st === 'lleno' ? 'lleno' : (st === 'disponible' ? 'disp' : 'curso');
        var insc = Math.max(0, Math.min(g.cupoMax, g.inscritos));
        html += '<div class="g-card lvl-' + levelBase + '">';
        html += '<div class="g-id">' + g.id + '</div>';
        html += '<div class="g-name">' + (g.nombre || '') + '</div>';
        html += '<div class="g-level">' + g.nivel + '</div>';
        html += '<div class="g-meta"><span class="g-cap"><strong>' + insc + '</strong>/' + g.cupoMax + '</span><span class="g-st ' + stClass + '">' + st + '</span></div>';
        html += '</div>';
      });
      html += '</div>';
    });
  });

  html += '</div>';
  document.getElementById('scheduleWrap').innerHTML = html;
  document.getElementById('scheduleWrap').style.display = 'block';

  // Legend
  document.getElementById('legend').innerHTML =
    '<span class="leg-title">Niveles</span>' +
    '<span class="legend-item"><span class="ldot" style="background:#1e3a6e"></span>A1</span>' +
    '<span class="legend-item"><span class="ldot" style="background:#0891b2"></span>A2</span>' +
    '<span class="legend-item"><span class="ldot" style="background:#16a34a"></span>B1</span>' +
    '<span class="legend-item"><span class="ldot" style="background:#ea580c"></span>B2</span>' +
    '<span class="legend-item"><span class="ldot" style="background:#7c3aed"></span>C1</span>&nbsp;&nbsp;' +
    '<span class="leg-title">Estado</span>' +
    '<span class="legend-item"><span class="ldot" style="background:rgba(34,197,94,0.15);border:1px solid #4ade80"></span>Disponible</span>' +
    '<span class="legend-item"><span class="ldot" style="background:rgba(202,138,4,0.15);border:1px solid #fbbf24"></span>Curso</span>' +
    '<span class="legend-item"><span class="ldot" style="background:rgba(239,68,68,0.12);border:1px solid #f87171"></span>Lleno</span>';
}

function cambiarSemana(dir) { /* placeholder for future week filtering */ }

cargarGrupos();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Horario de Clases · Organic English</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f172a;--navy:#1c2b5e;--surface:#1e2a4a;--surface2:#243373;--border:rgba(255,255,255,0.1);--orange:#f97316;--orange2:#fb923c;--text:#f1f5f9;--text-muted:#94a3b8}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',system-ui,sans-serif;background:rgba(0,0,0,0.65);color:var(--text);display:flex;align-items:center;justify-content:center}

/* MODAL */
.modal{width:92%;max-width:1200px;max-height:92vh;background:var(--bg);border:1px solid rgba(249,115,22,0.25);border-radius:20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,0.6)}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--navy);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-left img{height:44px;object-fit:contain}
.topbar-left h1{font-size:20px;font-weight:800;color:#fff}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn-sm{background:rgba(255,255,255,0.1);border:1px solid var(--border);color:var(--text-muted);padding:8px 18px;border-radius:100px;font-size:14px;font-weight:600;text-decoration:none;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif}
.btn-sm:hover{background:rgba(255,255,255,0.16);color:#fff}
.btn-close{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);color:#f87171;font-size:16px;padding:8px 22px}
.btn-close:hover{background:rgba(239,68,68,0.25);color:#fff}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:10px 24px;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border);flex-shrink:0;align-items:center}
.legend .lg-t{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-right:6px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted)}
.ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* SCHEDULE */
.schedule-wrap{flex:1;overflow:hidden;padding:12px 20px 12px 20px;min-height:0}
.schedule-scroll{overflow:auto;height:100%}
.schedule-scroll::-webkit-scrollbar{width:5px;height:5px}
.schedule-scroll::-webkit-scrollbar-track{background:transparent}
.schedule-scroll::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}
.schedule{display:grid;gap:6px;min-width:550px}

/* TEACHER HEADER */
.t-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 12px;text-align:center;min-width:170px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.t-header .t-name{font-size:18px;font-weight:700;color:#fff;line-height:1.3}
.t-header .t-id{font-size:13px;color:var(--text-muted);margin-top:3px}
.t-header .t-count{display:inline-block;margin-top:6px;font-size:13px;font-weight:700;background:rgba(249,115,22,0.15);color:var(--orange2);padding:3px 14px;border-radius:100px}

/* TIME */
.time-label{display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--text-muted);padding:6px;white-space:nowrap}

/* CELL */
.cell{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:9px;padding:8px;display:flex;flex-direction:column;gap:5px;min-height:0}
.cell.has-groups{background:rgba(255,255,255,0.04)}

/* GROUP CARD */
.g-card{background:var(--surface2);border-radius:8px;padding:10px 12px;cursor:default;transition:all 0.15s;position:relative;overflow:hidden}
.g-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.g-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:8px 0 0 8px}
.g-card.lvl-a1::before{background:#1e3a6e}
.g-card.lvl-a2::before{background:#0891b2}
.g-card.lvl-b1::before{background:#16a34a}
.g-card.lvl-b2::before{background:#ea580c}
.g-card.lvl-c1::before{background:#7c3aed}
.g-card.muted{opacity:0.4}
.g-card .g-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.g-card .g-id{font-size:15px;font-weight:700;color:#fff}
.g-card .g-level{font-size:13px;font-weight:700;color:var(--orange2);text-transform:uppercase;letter-spacing:0.04em}
.g-card .g-name{font-size:14px;font-weight:700;color:var(--text-muted);margin-top:3px}
.g-card .g-name.jovenes{color:#facc15}
.g-card .g-meta{display:flex;align-items:center;gap:8px}
.g-card .g-cap{font-size:14px;color:var(--text-muted)}
.g-card .g-cap strong{color:var(--text);font-weight:700}
.g-st{font-size:12px;font-weight:700;padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:0.03em}
.g-st.lleno{background:rgba(239,68,68,0.12);color:#f87171}
.g-st.disp{background:rgba(34,197,94,0.15);color:#4ade80}
.g-st.curso{background:rgba(202,138,4,0.15);color:#fbbf24}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text-muted);gap:14px;padding:3rem}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top:3px solid var(--orange);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:16px}
.error-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:2rem;text-align:center;color:#f87171;margin:auto;font-size:15px}

@media(max-width:900px){
  .modal{width:98%;max-height:98vh;border-radius:14px}
  .topbar{padding:12px 16px}
  .topbar-left h1{font-size:17px}
  .topbar-right{gap:6px}
  .btn-sm{padding:6px 12px;font-size:13px}
}
</style>
</head>
<body>

<div class="modal">

<div class="topbar">
  <div class="topbar-left">
    <img src="https://github.com/ergutza-lab/organic-english-classes/raw/main/imagenes/logoblanco2.png" alt="OE">
    <h1>Horario de Clases</h1>
  </div>
  <div class="topbar-right">
    <span id="weekLabel" style="font-size:14px;color:var(--text-muted);font-weight:600"></span>
    <button class="btn-sm" onclick="cambiarSemana(-1)">◀</button>
    <button class="btn-sm" onclick="cambiarSemana(1)">▶</button>
    <a id="btnCerrar" class="btn-sm btn-close" href="javascript:history.back()">✕ Cerrar</a>
  </div>
</div>

<div class="legend" id="legend"></div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>Cargando horario...</p>
</div>
<div id="error" class="error-box" style="display:none"><p>No se pudieron cargar los datos.</p></div>
<div id="scheduleWrap" class="schedule-wrap" style="display:none">
  <div class="schedule-scroll">
    <div class="schedule" id="scheduleGrid"></div>
  </div>
</div>

</div>

<script>
const SHEET_ID = '1o4j9xO55LOMe7APJGYZlonq6pbAiN8Gy16istfKh0vU';

var urlParams = new URLSearchParams(window.location.search);
var returnUrl = urlParams.get('return');
if (returnUrl) document.getElementById('btnCerrar').href = returnUrl;

function parseGS(cell) {
  if (!cell || !cell.v) return null;
  if (typeof cell.v === 'object' && cell.v.$t) return cell.v.$t;
  return cell.v;
}

function parseHour(h) {
  if (!h) return 99;
  var m = h.match(/(\d{1,2})[:\s]*(\d{2})?\s*(AM|PM)/i);
  if (!m) return 99;
  var hr = parseInt(m[1], 10);
  var p = (m[3]||'').toUpperCase();
  if (p === 'PM' && hr !== 12) hr += 12;
  if (p === 'AM' && hr === 12) hr = 0;
  return hr;
}

function fmtHour(h) {
  if (h === 0) return '12 AM';
  if (h < 12) return h + ' AM';
  if (h === 12) return '12 PM';
  return (h - 12) + ' PM';
}

function getLevelBase(n) {
  if (!n) return 'a1';
  var m = n.match(/([ABC]\d)/i);
  return m ? m[1].toLowerCase() : 'a1';
}

var grupos = [], maestros = {}, allTeachers = [], byTeacher = {}, semanaOffset = 0;

async function cargarMaestros() {
  try {
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=MAESTROS&t=' + Date.now();
    var res = await fetch(url);
    var text = await res.text();
    var json = JSON.parse(text.substring(47, text.length - 2));
    json.table.rows.forEach(function(r) {
      var id = r.c[0]?.v || '', name = r.c[1]?.v || '';
      if (id && name) maestros[id] = name;
    });
  } catch(e) {}
}

async function cargarGrupos() {
  await cargarMaestros();
  try {
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=GRUPOS&t=' + Date.now();
    var res = await fetch(url);
    var text = await res.text();
    var json = JSON.parse(text.substring(47, text.length - 2));
    grupos = json.table.rows.map(function(r) {
      return {
        id: parseGS(r.c[0]), nombre: parseGS(r.c[1]), horario: parseGS(r.c[2]),
        nivel: String(parseGS(r.c[4]) || '').trim(), cupoMax: r.c[5]?.v ?? 10,
        inscritos: r.c[6]?.v ?? 0, estado: parseGS(r.c[8]) || '',
        idMaestro: parseGS(r.c[11]) || '', demo: parseGS(r.c[15]) || ''
      };
    }).filter(function(g) {
      return g.id && String(g.estado).trim() !== 'Cancelado' && g.idMaestro && maestros[g.idMaestro] && !g.demo;
    });
    renderizar();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function renderizar() {
  document.getElementById('loading').style.display = 'none';

  byTeacher = {};
  grupos.forEach(function(g) {
    if (!byTeacher[g.idMaestro]) byTeacher[g.idMaestro] = [];
    byTeacher[g.idMaestro].push(g);
  });

  allTeachers = Object.keys(byTeacher).sort(function(a,b) {
    return (maestros[a]||a).localeCompare(maestros[b]||b);
  });

  if (!allTeachers.length) {
    document.getElementById('scheduleWrap').innerHTML = '<div class="loading"><p>No hay grupos activos.</p></div>';
    document.getElementById('scheduleWrap').style.display = 'flex';
    return;
  }

  var hoursSet = {};
  grupos.forEach(function(g) { var h = parseHour(g.horario); if (h !== 99) hoursSet[h] = true; });
  var hours = Object.keys(hoursSet).map(Number).sort(function(a,b){return a-b;});

  var grid = document.getElementById('scheduleGrid');
  grid.style.gridTemplateColumns = '65px repeat(' + allTeachers.length + ', 1fr)';

  var html = '<div></div>';
  allTeachers.forEach(function(tid) {
    var tname = maestros[tid] || tid;
    var count = byTeacher[tid].length;
    html += '<div class="t-header"><span class="t-name">' + tname + '</span><span class="t-id">' + tid + '</span><span class="t-count">' + count + '</span></div>';
  });

  hours.forEach(function(h) {
    html += '<div class="time-label">' + fmtHour(h) + '</div>';
    allTeachers.forEach(function(tid) {
      var matching = (byTeacher[tid]||[]).filter(function(g) { return parseHour(g.horario) === h; });
      html += '<div class="cell' + (matching.length ? ' has-groups' : '') + '">';
      matching.forEach(function(g) {
        var lb = getLevelBase(g.nivel);
        var st = String(g.estado||'').trim().toLowerCase();
        var sc = st === 'lleno' ? 'lleno' : (st === 'disponible' ? 'disp' : 'curso');
        var insc = Math.max(0, Math.min(g.cupoMax, g.inscritos));
        var muted = g.inscritos === 0 ? ' muted' : '';
        var nom = (g.nombre||'').trim();
        var nc = 'g-name';
        if (nom.toLowerCase() === 'jovenes') nc += ' jovenes';
        html += '<div class="g-card lvl-' + lb + muted + '">';
        html += '<div class="g-row"><span class="g-id">' + g.id + '</span><span class="g-level">' + g.nivel + '</span></div>';
        html += '<div class="' + nc + '">' + nom + '</div>';
        html += '<div class="g-row"><span class="g-cap"><strong>' + insc + '</strong>/' + g.cupoMax + '</span><span class="g-st ' + sc + '">' + st + '</span></div>';
        html += '</div>';
      });
      html += '</div>';
    });
  });

  grid.innerHTML = html;
  document.getElementById('scheduleWrap').style.display = 'block';

  document.getElementById('weekLabel').textContent = semanaOffset === 0 ? 'Esta semana' : (semanaOffset === -1 ? 'Semana pasada' : 'Próxima semana');

  document.getElementById('legend').innerHTML =
    '<span class="lg-t">Niveles</span>' +
    '<span class="legend-item"><span class="ldot" style="background:#1e3a6e"></span>A1</span>' +
    '<span class="legend-item"><span class="ldot" style="background:#0891b2"></span>A2</span>' +
    '<span class="legend-item"><span class="ldot" style="background:#16a34a"></span>B1</span>' +
    '<span class="legend-item"><span class="ldot" style="background:#ea580c"></span>B2</span>' +
    '<span class="legend-item"><span class="ldot" style="background:#7c3aed"></span>C1</span>' +
    '<span style="width:1px;height:16px;background:var(--border);margin:0 6px"></span>' +
    '<span class="lg-t">Estado</span>' +
    '<span class="legend-item"><span class="ldot" style="background:rgba(34,197,94,0.15);border:1px solid #4ade80"></span>Disponible</span>' +
    '<span class="legend-item"><span class="ldot" style="background:rgba(202,138,4,0.15);border:1px solid #fbbf24"></span>En curso</span>' +
    '<span class="legend-item"><span class="ldot" style="background:rgba(239,68,68,0.12);border:1px solid #f87171"></span>Lleno</span>';
}

function cambiarSemana(dir) { semanaOffset += dir; renderizar(); }
cargarGrupos();
</script>
</body>
</html>

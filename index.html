<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic English - Método Intuitivo</title>
    <style>
        /* CSS INTEGRADO - 13 LÍNEAS */
        body {
          margin: 0;
          padding: 0;
          background-color: #0f172a; /* Azul oscuro profesional */
          color: white;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #root {
          min-height: 100vh;
          display: flex;
          flex-direction: column;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="module">
        import React, { useState } from "https://esm.sh/react@18.2.0";
        import ReactDOM from "https://esm.sh/react-dom@18.2.0/client";

        // --- ACTIVOS DE IMAGEN Y ICONOGRAFÍA ---
        const LOGO_SYMBOL = 'https://media.base44.com/images/public/69b6f6597a3725a9077d7706/42de62c34_image.png';
        const HERO_BG = 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1600&q=80';
        const METHOD_STUDENT = 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1200&q=80';
        const NEW_ZOOM_IMG = 'https://images.unsplash.com/photo-1588196749597-9ff075ee6b5b?w=1200&q=80';

        const CheckIcon = () => (
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{ marginRight: '15px' }}>
            <circle cx="12" cy="12" r="10" stroke="#f97316" strokeWidth="2" />
            <path d="M7 12L10 15L17 8" stroke="#f97316" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
        );

        const MailIcon = () => (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f97316" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginRight: '12px'}}>
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
        );

        const PhoneIcon = () => (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f97316" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginRight: '12px'}}>
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        );

        const WorldIcon = () => (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f97316" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginRight: '12px'}}>
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        );

        // --- 1. NAVBAR & HERO ---
        const Navbar = ({ onOpen }) => (
          <nav style={stHero.nav}>
            <div style={stHero.navContainer}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                <img src={LOGO_SYMBOL} alt="Logo" style={{ height: '35px' }} />
                <span style={{ color: 'white', fontWeight: 'bold' }}>ORGANIC ENGLISH</span>
              </div>
              <div style={stHero.navLinks}>
                {['Inicio', 'Método', 'Niveles', 'Cómo Funciona', 'Beneficios', 'Contacto'].map(l => (
                  <a key={l} href={`#${l.toLowerCase().replace(/\s+/g, '-')}`} style={stHero.link}>{l}</a>
                ))}
                <button onClick={onOpen} style={stHero.navBtn}>Solicitar información</button>
              </div>
            </div>
          </nav>
        );

        const Hero = ({ onOpen }) => (
          <header id="inicio" style={stHero.hero}>
            <div style={stHero.heroOverlay} />
            <div style={stHero.heroContent}>
              <div style={stHero.heroLabel}><span style={stHero.dot}></span> 100% Online vía Zoom · Clases en Vivo</div>
              <h1 style={stHero.heroTitle}>Aprende inglés en línea con <br/> <span style={{ color: '#fb923c' }}>Organic English</span></h1>
              <p style={stHero.heroSub}>Método intuitivo, clases virtuales y resultados reales. Aprende a comunicarte con confianza desde el primer día.</p>
              <div style={stHero.heroBtns}>
                <button onClick={onOpen} style={stHero.btnOrange}>Solicitar información →</button>
                <button style={stHero.btnOutline}>Conocer el método <span style={{fontSize:'12px'}}>∨</span></button>
              </div>
              <div style={stHero.statsGrid}>
                <div style={stHero.statItem}><h3 style={stHero.statVal}>100%</h3><p style={stHero.statText}>Online vía Zoom</p></div>
                <div style={stHero.statItem}><h3 style={stHero.statVal}>6</h3><p style={stHero.statText}>Alumnos máx. por grupo</p></div>
                <div style={stHero.statItem}><h3 style={stHero.statVal}>5★</h3><p style={stHero.statText}>Calificación promedio</p></div>
              </div>
            </div>
          </header>
        );

        // --- 2. MÉTODO ---
        const MetodoSection = () => (
          <section id="método" style={stMetodo.secMetodo}>
            <div style={stMetodo.metodoContainer}>
              <div style={stMetodo.metodoTextCol}>
                <p style={stMetodo.metodoTag}>NUESTRO MÉTODO</p>
                <h2 style={stMetodo.metodoTitle}>Inglés Intuitivo, <br/> No Memorización</h2>
                <p style={stMetodo.metodoPara}>
                  En <strong style={stMetodo.boldText}>Organic English</strong> creemos que aprender inglés debe sentirse natural, como cuando aprendiste tu idioma natal. No se trata de memorizar reglas interminables, sino de <strong style={stMetodo.boldText}>vivir el idioma</strong> desde el primer día.
                </p>
                <p style={stMetodo.metodoPara}>
                  Nuestro enfoque se centra en la <strong style={stMetodo.highlightText}>comunicación real</strong>: hablar, escuchar, entender y responder en situaciones reales de la vida cotidiana.
                </p>
                <ul style={stMetodo.metodoList}>
                  {['Comunicación desde la primera clase', 'Contextos reales: trabajo, viajes, vida diaria', 'Aprendizaje progresivo y sin presión', 'Clases dinámicas con grupos pequeños'].map((item, idx) => (
                    <li key={idx} style={stMetodo.listItem}><CheckIcon /> {item}</li>
                  ))}
                </ul>
              </div>
              <div style={stMetodo.metodoImgCol}>
                <div style={stMetodo.imgFrame}><div style={stMetodo.imgRotateWrapper}><img src={METHOD_STUDENT} alt="Estudiante" style={stMetodo.imgReal} /></div></div>
              </div>
            </div>
          </section>
        );

        // --- 3. NIVELES ---
        const LevelCard = ({ number, title, subtitle, description }) => {
          const [isHovered, setIsHovered] = useState(false);
          return (
            <div style={{...stNiveles.card, ...(isHovered ? stNiveles.cardHover : {})}} onMouseEnter={() => setIsHovered(true)} onMouseLeave={() => setIsHovered(false)}>
              <div style={stNiveles.cardHeader}><div style={stNiveles.circleNumber}>{number}</div></div>
              <h3 style={stNiveles.cardTitle}>{title}</h3>
              <p style={stNiveles.cardSubtitle}>{subtitle}</p>
              <p style={stNiveles.cardDescription}>{description}</p>
            </div>
          );
        };

        const NivelesSection = () => {
          const [btnHover, setBtnHover] = useState(false);
          return (
            <section id="niveles" style={stNiveles.sec}>
              <div style={stNiveles.container}>
                <p style={stNiveles.tag}>NIVELES</p>
                <h2 style={stNiveles.title}>Encuentra tu nivel ideal</h2>
                <p style={stNiveles.subTitle}>Desde cero hasta avanzado. Realizamos un <strong>examen de ubicación gratuito</strong> para <br/> colocarte en el grupo perfecto para ti.</p>
                <div style={stNiveles.grid}>
                  {[
                    { number: 1, title: 'Principiante', subtitle: 'Beginner', description: 'Empiezas desde cero. Te llevamos paso a paso con total confianza.' },
                    { number: 2, title: 'Elemental', subtitle: 'Elementary', description: 'Conoces lo básico y quieres empezar a comunicarte.' },
                    { number: 3, title: 'Intermedio', subtitle: 'Intermediate', description: 'Ya puedes sostener conversaciones simples y quieres mejorar.' },
                    { number: 4, title: 'Intermedio Alto', subtitle: 'Upper Intermediate', description: 'Te expresas bien pero buscas fluidez y precisión.' },
                    { number: 5, title: 'Avanzado', subtitle: 'Advanced', description: 'Dominas el idioma y perfeccionas matices y pronunciación.' }
                  ].map((level, idx) => <LevelCard key={idx} {...level} />)}
                </div>
                <div style={stNiveles.btnWrapper}>
                  <button style={{...stNiveles.btn, ...(btnHover ? stNiveles.btnHover : {})}} onMouseEnter={() => setBtnHover(true)} onMouseLeave={() => setBtnHover(false)}>Toma tu examen de ubicación gratis →</button>
                </div>
              </div>
            </section>
          );
        };

        // --- 4. CÓMO FUNCIONA ---
        const StepItem = ({ icon, title, description, descriptionBold }) => (
          <div style={stComo.stepItem}>
            <div style={stComo.iconContainer}>{icon}</div>
            <div style={stComo.stepText}>
              <h3 style={stComo.stepTitle}>{title}</h3>
              <p style={stComo.stepDescription}>{description} <strong style={{ fontWeight: '600' }}>{descriptionBold}</strong></p>
            </div>
          </div>
        );

        const ComoFuncionaSection = () => (
          <section id="cómo-funciona" style={stComo.secComo}>
            <div style={stComo.metodoContainer}>
              <div style={stComo.metodoTextCol}>
                <p style={stComo.metodoTag}>CÓMO FUNCIONA</p>
                <h2 style={stComo.metodoTitle}>Clases online diseñadas <br/> para tu éxito</h2>
                <div style={stComo.stepsGrid}>
                  {[
                    { icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f97316" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>, title: '100% Online vía Zoom', description: 'Todas las clases se realizan en vivo por Zoom.', descriptionBold: 'Sin desplazamientos, desde la comodidad de tu hogar o donde prefieras.' },
                    { icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f97316" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>, title: 'Grupos pequeños', description: 'Máximo 10 alumnos por grupo para atención personalizada.', descriptionBold: 'Más tiempo de práctica real.' },
                    { icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f97316" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h6z"/></svg>, title: 'Clases grabadas', description: 'Cada clase queda grabada.', descriptionBold: 'Si no puedes asistir o quieres repasar, tienes acceso a la grabación cuando quieras.' },
                    { icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f97316" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>, title: 'Aprendizaje flexible', description: 'Horarios adaptados a tu ritmo de vida.', descriptionBold: 'Tú eliges cuándo aprender sin presión ni compromisos rigidos.' }
                  ].map((step, idx) => <StepItem key={idx} {...step} />)}
                </div>
              </div>
              <div style={stComo.metodoImgCol}>
                <div style={stComo.imgFrame}><div style={stComo.imgRotateWrapper}><img src={NEW_ZOOM_IMG} alt="Zoom Class" style={stComo.imgReal} /></div></div>
              </div>
            </div>
          </section>
        );

        // --- 5. BENEFICIOS ---
        const BenefitBox = ({ icon, text }) => {
          const [isHover, setIsHover] = useState(false);
          return (
            <div onMouseEnter={() => setIsHover(true)} onMouseLeave={() => setIsHover(false)}
              style={{...stBeneficios.card, backgroundColor: isHover ? '#2a418d' : 'rgba(255,255,255,0.05)', transform: isHover ? 'translateY(-5px)' : 'translateY(0)'}}>
              <div style={stBeneficios.cardIcon}>{icon}</div>
              <p style={stBeneficios.cardText}>{text}</p>
            </div>
          );
        };

        const BeneficiosSection = ({ onOpen }) => {
          const [btnHover, setBtnHover] = useState(false);
          return (
            <section id="beneficios" style={stBeneficios.sec}>
              <div style={stBeneficios.container}>
                <p style={stBeneficios.tag}>BENEFICIOS</p>
                <h2 style={stBeneficios.title}>¿Por qué elegir Organic English?</h2>
                <p style={stBeneficios.subTitle}>Precios accesibles, sin barreras y con resultados que cambian tu vida.</p>
                <div style={stBeneficios.contentGrid}>
                  <div style={stBeneficios.listCol}>
                    <h3 style={stBeneficios.colTitle}>Lo que incluye tu programa</h3>
                    <ul style={stBeneficios.list}>
                      {['Sin costo de inscripción', 'Sin tareas forzadas', 'Sin exámenes escritos', 'Grupos pequeños (máximo 6 personas)', 'Aprendizaje práctico y flexible', 'Clases 100% online vía Zoom', 'Clases grabadas para repasar', 'Nivel personalizado con examen de ubicación'].map((item, i) => (
                        <li key={i} style={stBeneficios.listItem}><span style={stBeneficios.check}>✔</span> {item}</li>
                      ))}
                    </ul>
                  </div>
                  <div style={stBeneficios.gridCol}>
                    <h3 style={stBeneficios.colTitle}>Lo que lograrás</h3>
                    <div style={stBeneficios.cardsGrid}>
                      <BenefitBox icon="⚡" text="Mayor confianza al hablar inglés" />
                      <BenefitBox icon="🌐" text="Mejora tu currículo y empleabilidad" />
                      <BenefitBox icon="📖" text="Más oportunidades laborales" />
                      <BenefitBox icon="⭐" text="Disfruta más tus viajes al extranjero" />
                    </div>
                    <div style={stBeneficios.priceBox}>
                      <div style={{textAlign:'left'}}>
                        <h4 style={stBeneficios.priceTitle}>Precios accesibles</h4>
                        <p style={stBeneficios.pricePara}>Sin costo de inscripción. Planes flexibles adaptados a tu presupuesto.</p>
                      </div>
                      <button onClick={onOpen} onMouseEnter={() => setBtnHover(true)} onMouseLeave={() => setBtnHover(false)}
                        style={{...stBeneficios.btnTranslúcido, ...(btnHover ? stBeneficios.btnHover : {})}}>
                        Toma tu examen gratis →
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          );
        };

        // --- 6. CONTACTO ---
        const ContactoSection = () => {
          const [btnHover, setBtnHover] = useState(false);
          return (
            <section id="contacto" style={stContacto.sec}>
              <div style={stContacto.container}>
                <div style={stContacto.infoCol}>
                  <p style={stContacto.tag}>CONTACTO</p>
                  <h2 style={stContacto.title}>¿Listo para empezar? <br/> Escríbenos hoy</h2>
                  <p style={stContacto.subTitle}>Responde en menos de 24 horas. Cuéntanos tu objetivo y te ayudamos a encontrar el plan ideal.</p>
                  <div style={stContacto.linksGrid}>
                    <a href="mailto:info@organicenglish.com.mx" style={stContacto.linkItem}><MailIcon /> info@organicenglish.com.mx</a>
                    <a href="tel:+522721234567" style={stContacto.linkItem}><PhoneIcon /> +52 (272) 123-4567</a>
                    <div style={stContacto.linkItem}><WorldIcon /> 100% Online — Orizaba para el mundo</div>
                  </div>
                  <div style={stContacto.giftBox}>
                    <div style={stContacto.giftHeader}><span style={{fontSize: '20px', marginRight: '10px'}}>🎁</span><h4 style={stContacto.giftTitle}>Clase de prueba gratuita</h4></div>
                    <p style={stContacto.giftPara}>Solicita tu primera clase sin costo y descubre el método Organic English. Sin compromisos ni pagos anticipados.</p>
                  </div>
                </div>
                <div style={stContacto.formCol}>
                  <div style={stContacto.formCard}>
                    <h3 style={stContacto.formHeader}>Solicitar información</h3>
                    <form onSubmit={(e) => { e.preventDefault(); alert('Solicitud enviada. ¡Pronto nos comunicaremos!'); }}>
                      <div style={stContacto.inputGroup}><label style={stContacto.label}>Nombre completo *</label><input type="text" placeholder="Tu nombre" required style={stContacto.input} /></div>
                      <div style={stContacto.inputGroup}><label style={stContacto.label}>Correo electrónico *</label><input type="email" placeholder="tu@correo.com" required style={stContacto.input} /></div>
                      <div style={stContacto.inputGroup}><label style={stContacto.label}>Mensaje</label><textarea placeholder="¿Cuál es tu objetivo?" style={stContacto.textarea} /></div>
                      <button type="submit" onMouseEnter={() => setBtnHover(true)} onMouseLeave={() => setBtnHover(false)}
                        style={{...stContacto.btn, backgroundColor: btnHover ? '#ea580c' : '#f97316'}}>Solicitar información →</button>
                    </form>
                    <p style={stContacto.disclaimer}>Al enviar aceptas que te contactemos. Sin spam, prometido.</p>
                  </div>
                </div>
              </div>
            </section>
          );
        };

        // --- APP & ESTILOS FINALES ---
        function App() {
          const [modal, setModal] = useState(false);
          return (
            <div style={{ scrollBehavior: 'smooth' }}>
              <Navbar onOpen={() => setModal(true)} />
              <Hero onOpen={() => setModal(true)} />
              <MetodoSection />
              <NivelesSection />
              <ComoFuncionaSection />
              <BeneficiosSection onOpen={() => setModal(true)} />
              <ContactoSection />
              <footer style={{ padding: '60px 20px', textAlign: 'center', background: '#0f172a', color: '#fff', fontSize: '14px' }}>
                © 2026 Organic English · Orizaba, Veracruz · Diseñado para el éxito.
              </footer>
            </div>
          );
        }

        const stHero = {
          nav: { position: 'fixed', top: 0, width: '100%', zIndex: 1000, background: 'rgba(28, 43, 94, 0.98)', padding: '15px 0', backdropFilter: 'blur(10px)', borderBottom: '1px solid rgba(255,255,255,0.1)' },
          navContainer: { maxWidth: '1200px', margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0 30px' },
          navLinks: { display: 'flex', gap: '25px', alignItems: 'center' },
          link: { color: 'white', textDecoration: 'none', fontSize: '13px', fontWeight: '500', opacity: 0.9 },
          navBtn: { background: '#f97316', color: 'white', border: 'none', padding: '10px 25px', borderRadius: '50px', fontWeight: 'bold', cursor: 'pointer', fontSize: '13px' },
          hero: { position: 'relative', minHeight: '90vh', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', paddingTop: '80px', overflow: 'hidden' },
          heroOverlay: { position: 'absolute', inset: 0, background: `linear-gradient(rgba(28,43,94,0.92), rgba(28,43,94,0.7)), url(${HERO_BG})`, backgroundSize: 'cover', backgroundPosition: 'center', zIndex: -1 },
          heroContent: { textAlign: 'center', maxWidth: '850px', padding: '40px 20px', display: 'flex', flexDirection: 'column', alignItems: 'center' },
          heroLabel: { display: 'inline-flex', alignItems: 'center', gap: '10px', background: 'rgba(249,115,22,0.15)', border: '1px solid #f97316', padding: '8px 20px', borderRadius: '50px', color: '#fb923c', fontSize: '12px', marginBottom: '25px' },
          dot: { width: '8px', height: '8px', background: '#f97316', borderRadius: '50%' },
          heroTitle: { fontSize: 'clamp(2.5rem, 5vw, 4.2rem)', fontWeight: '900', lineHeight: 1.1, margin: 0 },
          heroSub: { fontSize: '1.1rem', margin: '25px 0 45px', opacity: 0.9, lineHeight: 1.6, fontWeight: '300' },
          heroBtns: { display: 'flex', justifyContent: 'center', gap: '20px', marginBottom: '60px' },
          btnOrange: { background: '#f97316', color: 'white', border: 'none', padding: '18px 40px', borderRadius: '50px', fontSize: '16px', fontWeight: 'bold', cursor: 'pointer', boxShadow: '0 10px 20px rgba(249,115,22,0.3)' },
          btnOutline: { background: 'transparent', color: 'white', border: '1px solid rgba(255,255,255,0.4)', padding: '18px 40px', borderRadius: '50px', fontSize: '16px', fontWeight: '500', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '8px' },
          statsGrid: { display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '30px', borderTop: '1px solid rgba(255,255,255,0.15)', paddingTop: '40px', width: '100%', maxWidth: '600px' },
          statItem: { textAlign: 'center' },
          statVal: { fontSize: '2.5rem', fontWeight: '800', margin: 0 },
          statText: { fontSize: '12px', opacity: 0.8, margin: '5px 0 0' }
        };

        const stMetodo = {
          secMetodo: { padding: '100px 20px', backgroundColor: '#ffffff', display: 'flex', justifyContent: 'center' },
          metodoContainer: { maxWidth: '1100px', width: '100%', display: 'grid', gridTemplateColumns: '1.1fr 1fr', gap: '60px', alignItems: 'center' },
          metodoTextCol: { padding: '0' },
          metodoTag: { color: '#f97316', fontWeight: '700', fontSize: '13px', letterSpacing: '1px', marginBottom: '15px', textTransform: 'uppercase' },
          metodoTitle: { color: '#1c2b5e', fontSize: 'clamp(2.5rem, 5vw, 3.5rem)', fontWeight: '900', lineHeight: '1.1', marginBottom: '30px' },
          metodoPara: { color: '#64748b', fontSize: '1.1rem', lineHeight: '1.7', marginBottom: '20px', fontWeight: '300' },
          boldText: { fontWeight: '600', color: '#1c2b5e' },
          highlightText: { color: '#f97316', fontWeight: '700' },
          metodoList: { listStyle: 'none', padding: 0, marginTop: '30px' },
          listItem: { display: 'flex', alignItems: 'center', marginBottom: '15px', color: '#475569', fontSize: '1rem', fontWeight: '500' },
          metodoImgCol: { display: 'flex', justifyContent: 'center', alignItems: 'center' },
          imgFrame: { background: '#fff7ed', padding: '15px', borderRadius: '35px', boxShadow: '0 30px 60px rgba(0,0,0,0.08)', maxWidth: '480px', width: '100%' },
          imgRotateWrapper: { transform: 'rotate(1.2deg)' },

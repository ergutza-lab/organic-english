<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic English - Método Intuitivo</title>
    <style>
        body {
          margin: 0;
          padding: 0;
          background-color: #0f172a;
          color: white;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #root {
          min-height: 100vh;
          display: flex;
          flex-direction: column;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="module">
        import React, { useState } from "https://esm.sh/react@18.2.0";
        import ReactDOM from "https://esm.sh/react-dom@18.2.0/client";

        // --- ACTIVOS DE IMAGEN ---
        const LOGO_SYMBOL = 'https://media.base44.com/images/public/69b6f6597a3725a9077d7706/42de62c34_image.png';
        const HERO_BG = 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1600&q=80';
        const METHOD_STUDENT = 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1200&q=80';
        const NEW_ZOOM_IMG = 'https://images.unsplash.com/photo-1588196749597-9ff075ee6b5b?w=1200&q=80';

        // --- COMPONENTES ICONOGRAFÍA ---
        const CheckIcon = () => (
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{ marginRight: '15px' }}>
            <circle cx="12" cy="12" r="10" stroke="#f97316" strokeWidth="2" />
            <path d="M7 12L10 15L17 8" stroke="#f97316" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
        );

        const MailIcon = () => (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f97316" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginRight: '12px'}}>
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
        );

        const PhoneIcon = () => (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f97316" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginRight: '12px'}}>
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        );

        const WorldIcon = () => (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f97316" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginRight: '12px'}}>
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        );

        // --- SECCIONES ---
        const Navbar = ({ onOpen }) => (
          <nav style={stHero.nav}>
            <div style={stHero.navContainer}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                <img src={LOGO_SYMBOL} alt="Logo" style={{ height: '35px' }} />
                <span style={{ color: 'white', fontWeight: 'bold' }}>ORGANIC ENGLISH</span>
              </div>
              <div style={stHero.navLinks}>
                {['Inicio', 'Método', 'Niveles', 'Cómo Funciona', 'Beneficios', 'Contacto'].map(l => (
                  <a key={l} href={`#${l.toLowerCase().replace(/\s+/g, '-')}`} style={stHero.link}>{l}</a>
                ))}
                <button onClick={onOpen} style={stHero.navBtn}>Solicitar información</button>
              </div>
            </div>
          </nav>
        );

        const Hero = ({ onOpen }) => (
          <header id="inicio" style={stHero.hero}>
            <div style={stHero.heroOverlay} />
            <div style={stHero.heroContent}>
              <div style={stHero.heroLabel}><span style={stHero.dot}></span> 100% Online vía Zoom · Clases en Vivo</div>
              <h1 style={stHero.heroTitle}>Aprende inglés en línea con <br/> <span style={{ color: '#fb923c' }}>Organic English</span></h1>
              <p style={stHero.heroSub}>Método intuitivo, clases virtuales y resultados reales. Aprende a comunicarte con confianza desde el primer día.</p>
              <div style={stHero.heroBtns}>
                <button onClick={onOpen} style={stHero.btnOrange}>Solicitar información →</button>
                <button style={stHero.btnOutline}>Conocer el método <span style={{fontSize:'12px'}}>∨</span></button>
              </div>
            </div>
          </header>
        );

        const MetodoSection = () => (
          <section id="método" style={stMetodo.secMetodo}>
            <div style={stMetodo.metodoContainer}>
              <div style={stMetodo.metodoTextCol}>
                <p style={stMetodo.metodoTag}>NUESTRO MÉTODO</p>
                <h2 style={stMetodo.metodoTitle}>Inglés Intuitivo, <br/> No Memorización</h2>
                <p style={stMetodo.metodoPara}>En <strong style={stMetodo.boldText}>Organic English</strong> creemos que aprender inglés debe sentirse natural.</p>
                <ul style={stMetodo.metodoList}>
                  {['Comunicación desde la primera clase', 'Contextos reales', 'Grupos pequeños'].map((item, idx) => (
                    <li key={idx} style={stMetodo.listItem}><CheckIcon /> {item}</li>
                  ))}
                </ul>
              </div>
              <div style={stMetodo.metodoImgCol}>
                <div style={stMetodo.imgFrame}><img src={METHOD_STUDENT} alt="Estudiante" style={stMetodo.imgReal} /></div>
              </div>
            </div>
          </section>
        );

        const LevelCard = ({ number, title, subtitle, description }) => {
          const [isHovered, setIsHovered] = useState(false);
          return (
            <div style={{...stNiveles.card, ...(isHovered ? stNiveles.cardHover : {})}} onMouseEnter={() => setIsHovered(true)} onMouseLeave={() => setIsHovered(false)}>
              <div style={stNiveles.circleNumber}>{number}</div>
              <h3 style={stNiveles.cardTitle}>{title}</h3>
              <p style={stNiveles.cardSubtitle}>{subtitle}</p>
              <p style={stNiveles.cardDescription}>{description}</p>
            </div>
          );
        };

        const NivelesSection = () => (
          <section id="niveles" style={stNiveles.sec}>
            <div style={stNiveles.container}>
              <p style={stNiveles.tag}>NIVELES</p>
              <h2 style={stNiveles.title}>Encuentra tu nivel ideal</h2>
              <div style={stNiveles.grid}>
                {[
                  { number: 1, title: 'Principiante', subtitle: 'Beginner', description: 'Empiezas desde cero.' },
                  { number: 2, title: 'Elemental', subtitle: 'Elementary', description: 'Conoces lo básico.' },
                  { number: 3, title: 'Intermedio', subtitle: 'Intermediate', description: 'Sostienes conversaciones simples.' },
                  { number: 4, title: 'Intermedio Alto', subtitle: 'Upper Intermediate', description: 'Buscas fluidez.' },
                  { number: 5, title: 'Avanzado', subtitle: 'Advanced', description: 'Dominas el idioma.' }
                ].map((level, idx) => <LevelCard key={idx} {...level} />)}
              </div>
            </div>
          </section>
        );

        const ComoFuncionaSection = () => (
          <section id="cómo-funciona" style={stComo.secComo}>
            <div style={stComo.metodoContainer}>
              <div style={stComo.metodoTextCol}>
                <p style={stComo.metodoTag}>CÓMO FUNCIONA</p>
                <h2 style={stComo.metodoTitle}>Clases online diseñadas para tu éxito</h2>
                <p style={stMetodo.metodoPara}>Máximo 10 alumnos por grupo para atención personalizada.</p>
              </div>
              <div style={stComo.metodoImgCol}>
                <div style={stComo.imgFrame}><img src={NEW_ZOOM_IMG} alt="Zoom Class" style={stComo.imgReal} /></div>
              </div>
            </div>
          </section>
        );

        const BeneficiosSection = ({ onOpen }) => (
          <section id="beneficios" style={stBeneficios.sec}>
            <div style={stBeneficios.container}>
              <h2 style={stBeneficios.title}>¿Por qué elegir Organic English?</h2>
              <button onClick={onOpen} style={stNiveles.btn}>Toma tu examen gratis →</button>
            </div>
          </section>
        );

        const ContactoSection = () => (
          <section id="contacto" style={stContacto.sec}>
            <div style={stContacto.container}>
              <div style={stContacto.infoCol}>
                <h2 style={stContacto.title}>¿Listo para empezar?</h2>
                <div style={stContacto.linksGrid}>
                  <div style={stContacto.linkItem}><MailIcon /> info@organicenglish.com.mx</div>
                </div>
              </div>
              <div style={stContacto.formCol}>
                <div style={stContacto.formCard}>
                   <h3>Solicitar información</h3>
                   <form onSubmit={(e) => { e.preventDefault(); alert('Solicitud enviada'); }}>
                      <input type="text" placeholder="Nombre" style={stContacto.input} required /><br/><br/>
                      <button type="submit" style={stContacto.btn}>Enviar →</button>
                   </form>
                </div>
              </div>
            </div>
          </section>
        );

        // --- APP INTEGRADA ---
        function App() {
          const [modal, setModal] = useState(false);
          return (
            <div style={{ scrollBehavior: 'smooth' }}>
              <Navbar onOpen={() => setModal(true)} />
              <Hero onOpen={() => setModal(true)} />
              <MetodoSection />
              <NivelesSection />
              <ComoFuncionaSection />
              <BeneficiosSection onOpen={() => setModal(true)} />
              <ContactoSection />
              <footer style={{ padding: '60px 20px', textAlign: 'center', background: '#0f172a', color: '#fff' }}>
                © 2026 Organic English · Orizaba, Veracruz.
              </footer>
            </div>
          );
        }

        // --- RENDER ---
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);

        // --- ESTILOS (DEFINICIÓN) ---
        const stHero = {
          nav: { position: 'fixed', top: 0, width: '100%', zIndex: 1000, background: 'rgba(28, 43, 94, 0.98)', padding: '15px 0', backdropFilter: 'blur(10px)', borderBottom: '1px solid rgba(255,255,255,0.1)' },
          navContainer: { maxWidth: '1200px', margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0 30px' },
          navLinks: { display: 'flex', gap: '25px', alignItems: 'center' },
          link: { color: 'white', textDecoration: 'none', fontSize: '13px', fontWeight: '500' },
          navBtn: { background: '#f97316', color: 'white', border: 'none', padding: '10px 25px', borderRadius: '50px', fontWeight: 'bold', cursor: 'pointer' },
          hero: { position: 'relative', minHeight: '90vh', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', paddingTop: '80px', overflow: 'hidden' },
          heroOverlay: { position: 'absolute', inset: 0, background: `linear-gradient(rgba(28,43,94,0.92), rgba(28,43,94,0.7)), url(${HERO_BG})`, backgroundSize: 'cover', backgroundPosition: 'center', zIndex: -1 },
          heroContent: { textAlign: 'center', maxWidth: '850px', padding: '40px 20px' },
          heroLabel: { display: 'inline-flex', alignItems: 'center', gap: '10px', background: 'rgba(249,115,22,0.15)', border: '1px solid #f97316', padding: '8px 20px', borderRadius: '50px', color: '#fb923c', fontSize: '12px', marginBottom: '25px' },
          dot: { width: '8px', height: '8px', background: '#f97316', borderRadius: '50%' },
          heroTitle: { fontSize: '4.2rem', fontWeight: '900', lineHeight: 1.1 },
          heroSub: { fontSize: '1.1rem', margin: '25px 0 45px' },
          heroBtns: { display: 'flex', justifyContent: 'center', gap: '20px' },
          btnOrange: { background: '#f97316', color: 'white', border: 'none', padding: '18px 40px', borderRadius: '50px', fontWeight: 'bold', cursor: 'pointer' },
          btnOutline: { background: 'transparent', color: 'white', border: '1px solid rgba(255,255,255,0.4)', padding: '18px 40px', borderRadius: '50px' }
        };

        const stMetodo = {
          secMetodo: { padding: '100px 20px', backgroundColor: '#ffffff' },
          metodoContainer: { maxWidth: '1100px', margin: '0 auto', display: 'grid', gridTemplateColumns: '1.1fr 1fr', gap: '60px', alignItems: 'center' },
          metodoTag: { color: '#f97316', fontWeight: '700', fontSize: '13px', textTransform: 'uppercase' },
          metodoTitle: { color: '#1c2b5e', fontSize: '3.5rem', fontWeight: '900' },
          metodoPara: { color: '#64748b', fontSize: '1.1rem' },
          metodoList: { listStyle: 'none', padding: 0 },
          listItem: { display: 'flex', alignItems: 'center', marginBottom: '15px' },
          imgFrame: { background: '#fff7ed', padding: '15px', borderRadius: '35px' },
          imgReal: { width: '100%', borderRadius: '22px' }
        };

        const stNiveles = {
          sec: { padding: '80px 20px', backgroundColor: '#f8fafc', textAlign: 'center' },
          container: { maxWidth: '1200px', margin: '0 auto' },
          tag: { color: '#f97316', fontWeight: 'bold' },
          title: { color: '#1c2b5e', fontSize: '32px', fontWeight: '900' },
          grid: { display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '15px' },
          card: { backgroundColor: '#ffffff', padding: '25px 15px', borderRadius: '15px', border: '1px solid #edf2f7', transition: '0.3s' },
          cardHover: { transform: 'translateY(-5px)', boxShadow: '0 15px 30px rgba(0,0,0,0.1)' },
          circleNumber: { backgroundColor: '#f97316', color: 'white', width: '35px', height: '35px', borderRadius: '50%', display: 'flex', margin: '0 auto 15px', alignItems: 'center', justifyContent: 'center' },
          cardTitle: { color: '#1c2b5e', fontSize: '17px', fontWeight: '800' },
          cardSubtitle: { color: '#f97316', fontSize: '11px', textTransform: 'uppercase' },
          cardDescription: { color: '#64748b', fontSize:

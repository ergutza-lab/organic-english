<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Maestro — Organic English</title>
<style>
  :root {
    --azul: #1c2b5e;
    --azul-medio: #243570;
    --naranja: #f97316;
    --naranja2: #fb923c;
    --blanco: #f1f5f9;
    --gris: #94a3b8;
    --gris2: #64748b;
    --gris3: #475569;
    --fondo: #0f172a;
    --card: #1e2a4a;
    --verde: #16a34a;
    --rojo: #dc2626;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    color: var(--blanco);
    min-height: 100vh;
    background-color: var(--fondo);
    background-image: url('https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/hero3.webp');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.82);
    z-index: -1;
  }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── LOGIN ── */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-box { background: var(--card); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.08); }
  .login-box img { display: block; margin: 0 auto 14px; height: 72px; }
  .login-box h1 { color: #fff; font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 6px; }
  .login-box p { color: var(--gris2); font-size: 13px; text-align: center; margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; color: var(--gris); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
  .field input { width: 100%; background: var(--fondo); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 16px; color: var(--blanco); font-size: 15px; outline: none; }
  .field input:focus { border-color: var(--naranja); }
  .btn-primary { width: 100%; background: linear-gradient(135deg, var(--naranja), #ea580c); color: #fff; border: none; border-radius: 100px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
  .btn-primary:hover { opacity: 0.9; }
  .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 12px 16px; color: #f87171; font-size: 13px; margin-top: 14px; display: none; text-align: center; }

  /* ── PANEL ── */
  .panel-wrap { max-width: 680px; margin: 0 auto; padding: 24px 16px 60px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .topbar img { height: 36px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .maestro-nombre { color: var(--gris); font-size: 13px; }
  .btn-logout { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--gris); border-radius: 100px; padding: 8px 16px; font-size: 12px; cursor: pointer; }

  .bienvenida { background: linear-gradient(135deg, var(--azul), #0f1a3d); border-radius: 16px; padding: 22px 24px; margin-bottom: 24px; border-bottom: 3px solid var(--naranja); }
  .bienvenida p { color: var(--gris); font-size: 13px; margin-bottom: 4px; }
  .bienvenida h2 { color: #fff; font-size: 22px; font-weight: 600; }

  .seccion-titulo { color: var(--gris2); font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; margin-top: 28px; }

  /* ── GRUPOS ── */
  .grupo-card { background: var(--card); border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06); cursor: pointer; transition: border-color 0.2s; }
  .grupo-card:hover { border-color: rgba(249,115,22,0.4); }
  .grupo-card .gc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .grupo-chip { background: rgba(249,115,22,0.15); color: var(--naranja2); border-radius: 100px; padding: 4px 12px; font-size: 12px; font-weight: 700; }
  .grupo-nivel { color: var(--gris); font-size: 12px; }
  .grupo-nombre { color: var(--blanco); font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .grupo-detalle { color: var(--gris2); font-size: 12px; }
  .grupo-alumnos { color: var(--gris); font-size: 12px; margin-top: 6px; }

  /* ── VISTA GRUPO ── */
  .back-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--gris); border-radius: 100px; padding: 8px 16px; font-size: 13px; cursor: pointer; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 6px; }

  .grupo-info-card { background: linear-gradient(135deg, var(--azul), #0f1a3d); border-radius: 14px; padding: 18px 20px; margin-bottom: 20px; border-bottom: 2px solid var(--naranja); }
  .grupo-info-card h3 { color: #fff; font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .grupo-info-card p { color: var(--gris); font-size: 13px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { flex: 1; padding: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: var(--gris); font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
  .tab.active { background: rgba(249,115,22,0.15); border-color: rgba(249,115,22,0.4); color: var(--naranja2); }

  /* ── REGISTRO DIARIO ── */
  .fecha-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .fecha-row label { color: var(--gris); font-size: 12px; font-weight: 600; text-transform: uppercase; }
  .fecha-row input[type="date"] { background: var(--fondo); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 12px; color: var(--blanco); font-size: 13px; outline: none; }

  .alumno-row { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }
  .alumno-row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .alumno-row-nombre { color: var(--blanco); font-size: 14px; font-weight: 600; }
  .alumno-row-id { color: var(--gris2); font-size: 11px; }
  .alumno-row-controles { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .control-grupo { display: flex; flex-direction: column; gap: 4px; }
  .control-grupo label { color: var(--gris2); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .control-btns { display: flex; gap: 4px; }
  .ctrl-btn { flex: 1; padding: 8px 4px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: rgba(255,255,255,0.04); color: var(--gris); font-size: 12px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.15s; }
  .ctrl-btn.selected-A { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.5); color: #4ade80; }
  .ctrl-btn.selected-F { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #f87171; }
  .ctrl-btn.selected-T { background: rgba(59,130,246,0.2); border-color: rgba(59,130,246,0.4); color: #60a5fa; }
  .ctrl-btn.selected-X { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: #f87171; }
  .actitud-input { width: 100%; background: var(--fondo); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px; color: var(--blanco); font-size: 13px; text-align: center; outline: none; }
  .actitud-input:focus { border-color: var(--naranja); }

  .btn-guardar { width: 100%; background: linear-gradient(135deg, var(--verde), #15803d); color: #fff; border: none; border-radius: 100px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 16px; transition: opacity 0.2s; }
  .btn-guardar:hover { opacity: 0.9; }
  .btn-guardar:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── CALIFICACIONES ── */
  .calif-card { background: var(--card); border-radius: 12px; padding: 16px 18px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.06); }
  .calif-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .calif-nombre { color: var(--blanco); font-size: 14px; font-weight: 600; }
  .calif-total { font-size: 22px; font-weight: 700; }
  .calif-total.aprobado { color: #4ade80; }
  .calif-total.reprobado { color: #f87171; }
  .calif-desglose { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
  .calif-item { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px; text-align: center; }
  .calif-item-label { color: var(--gris2); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .calif-item-val { color: var(--blanco); font-size: 14px; font-weight: 700; }
  .progress-bar { background: rgba(255,255,255,0.07); border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-fill { height: 6px; border-radius: 4px; transition: width 0.5s; }
  .status-chip { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 100px; }
  .status-chip.aprobado { background: rgba(34,197,94,0.15); color: #4ade80; }
  .status-chip.reprobado { background: rgba(239,68,68,0.15); color: #f87171; }
  .status-chip.en-curso { background: rgba(249,115,22,0.15); color: var(--naranja2); }

  /* ── EXAMEN ── */
  .examen-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; }
  .examen-nombre { color: var(--blanco); font-size: 14px; font-weight: 600; }
  .examen-input { width: 80px; background: var(--fondo); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px; color: var(--blanco); font-size: 14px; text-align: center; outline: none; }
  .examen-input:focus { border-color: var(--naranja); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e2a4a; border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; padding: 12px 24px; color: var(--blanco); font-size: 14px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.success { border-color: rgba(34,197,94,0.4); color: #4ade80; }
  .toast.error { border-color: rgba(239,68,68,0.4); color: #f87171; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--gris3); }
  .loading { text-align: center; padding: 40px; color: var(--gris3); font-size: 14px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screenLogin" class="screen active">
  <div class="login-wrap">
    <div class="login-box">
      <img src="https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/logoblanco.png" alt="Organic English" />
      <h1>Panel del Maestro</h1>
      <p>Ingresa con tu ID y clave personal</p>
      <div class="field">
        <label>ID de Maestro</label>
        <input type="text" id="inputId" placeholder="Ej: MAE-01" autocomplete="off" />
      </div>
      <div class="field">
        <label>Clave</label>
        <input type="password" id="inputClave" placeholder="Tu clave personal" autocomplete="off" />
      </div>
      <button class="btn-primary" onclick="login()">Entrar</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>
</div>

<!-- PANEL -->
<div id="screenPanel" class="screen">
  <div class="panel-wrap">

    <!-- TOPBAR -->
    <div class="topbar">
      <img src="https://media.base44.com/images/public/69b6f6597a3725a9077d7706/42de62c34_image.png" alt="Organic English" />
      <div class="topbar-right">
        <span class="maestro-nombre" id="maestroNombre"></span>
        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
      </div>
    </div>

    <!-- BIENVENIDA -->
    <div class="bienvenida">
      <p>Bienvenido/a,</p>
      <h2 id="maestroNombrePanel">—</h2>
    </div>

    <!-- VISTA GRUPOS -->
    <div id="vistaGrupos">
      <div class="seccion-titulo">Mis grupos</div>
      <div id="listaGrupos"><div class="loading">Cargando...</div></div>
    </div>

    <!-- VISTA DETALLE GRUPO -->
    <div id="vistaDetalle" style="display:none;">
      <button class="back-btn" onclick="volverGrupos()">← Mis grupos</button>
      <div class="grupo-info-card">
        <h3 id="detalleGrupoId">—</h3>
        <p id="detalleGrupoInfo">—</p>
      </div>
      <div class="tabs">
        <div class="tab active" id="tabRegistro" onclick="cambiarTab('registro')">Registro del día</div>
        <div class="tab" id="tabCalif" onclick="cambiarTab('calificaciones')">Calificaciones</div>
        <div class="tab" id="tabExamen" onclick="cambiarTab('examen')">Examen</div>
      </div>

      <!-- TAB REGISTRO -->
      <div id="contenidoRegistro">
        <div class="fecha-row">
          <label>Fecha de clase:</label>
          <input type="date" id="fechaClase" />
        </div>
        <div id="listaAlumnosRegistro"></div>
        <button class="btn-guardar" id="btnGuardar" onclick="guardarRegistro()">Guardar registro del día</button>
      </div>

      <!-- TAB CALIFICACIONES -->
      <div id="contenidoCalif" style="display:none;">
        <div id="listaCalificaciones"><div class="loading">Cargando...</div></div>
      </div>

      <!-- TAB EXAMEN -->
      <div id="contenidoExamen" style="display:none;">
        <p style="color:var(--gris);font-size:13px;margin-bottom:16px;">Captura la calificación del examen final de unidad (0 a 10) para cada alumno.</p>
        <div id="listaExamen"></div>
        <button class="btn-guardar" onclick="guardarExamen()" style="margin-top:16px;">Guardar calificaciones de examen</button>
      </div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbwZm4Yl1u_Qm-FSyS6FGA84wV8cp6flpHggXnslzg-PxlUD7LVD-1Iftr3NHBJwHFYO/exec';

  var maestroData  = null;
  var panelData    = null;
  var grupoActual  = null;
  var tabActual    = 'registro';

  // ── LOGIN ──────────────────────────────────────────────────────────
  function login() {
    var id    = document.getElementById('inputId').value.trim().toUpperCase();
    var clave = document.getElementById('inputClave').value.trim();
    var err   = document.getElementById('errorMsg');
    if (!id || !clave) { err.style.display = 'block'; err.textContent = 'Completa todos los campos.'; return; }
    err.style.display = 'none';
    var btn = document.querySelector('.btn-primary');
    btn.textContent = 'Verificando...'; btn.disabled = true;
    fetch(APPS_SCRIPT + '?action=loginMaestro&id=' + encodeURIComponent(id) + '&clave=' + encodeURIComponent(clave))
      .then(r => r.json())
      .then(data => {
        btn.textContent = 'Entrar'; btn.disabled = false;
        if (data.success) {
          maestroData = data.maestro;
          mostrarPanel();
        } else {
          err.style.display = 'block';
          err.textContent = data.error || 'ID o clave incorrectos.';
        }
      })
      .catch(() => {
        btn.textContent = 'Entrar'; btn.disabled = false;
        err.style.display = 'block';
        err.textContent = 'Error de conexión. Intenta más tarde.';
      });
  }

  function mostrarPanel() {
    document.getElementById('screenLogin').classList.remove('active');
    document.getElementById('screenPanel').classList.add('active');
    document.getElementById('maestroNombre').textContent = maestroData.nombre;
    document.getElementById('maestroNombrePanel').textContent = maestroData.nombre;
    cargarDatos();
  }

  function cargarDatos() {
    fetch(APPS_SCRIPT + '?action=getDatosMaestro&id=' + encodeURIComponent(maestroData.id))
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          panelData = data;
          renderGrupos(data.grupos);
        } else {
          mostrarToast('Error al cargar datos', 'error');
        }
      })
      .catch(() => mostrarToast('Error de conexión', 'error'));
  }

  // ── GRUPOS ─────────────────────────────────────────────────────────
  function renderGrupos(grupos) {
    var lista = document.getElementById('listaGrupos');
    if (!grupos || grupos.length === 0) {
      lista.innerHTML = '<div class="empty-state"><p>No tienes grupos asignados.</p></div>';
      return;
    }
    lista.innerHTML = grupos.map(function(g) {
      var inicio = g.fechaInicio ? new Date(g.fechaInicio) : null;
      var inicioStr = inicio ? inicio.getDate() + '/' + (inicio.getMonth()+1) + '/' + inicio.getFullYear() : '—';
      return '<div class="grupo-card" onclick="abrirGrupo(\'' + g.id + '\')">' +
        '<div class="gc-header">' +
          '<span class="grupo-chip">' + g.id + '</span>' +
          '<span class="grupo-nivel">' + g.nivel + '</span>' +
        '</div>' +
        '<div class="grupo-nombre">' + g.nombre + '</div>' +
        '<div class="grupo-detalle">' + g.horario + ' · Lunes a Jueves · Inicio ' + inicioStr + '</div>' +
        '<div class="grupo-alumnos">' + (g.inscritos || 0) + ' alumnos activos</div>' +
      '</div>';
    }).join('');
  }

  function abrirGrupo(idGrupo) {
    grupoActual = panelData.grupos.find(function(g) { return g.id === idGrupo; });
    if (!grupoActual) return;

    document.getElementById('vistaGrupos').style.display = 'none';
    document.getElementById('vistaDetalle').style.display = 'block';
    document.getElementById('detalleGrupoId').textContent = grupoActual.id + ' — ' + grupoActual.nombre;
    document.getElementById('detalleGrupoInfo').textContent = grupoActual.horario + ' · ' + grupoActual.nivel;

    // Fecha de hoy por defecto
    var hoy = new Date();
    var yyyy = hoy.getFullYear();
    var mm   = String(hoy.getMonth()+1).padStart(2,'0');
    var dd   = String(hoy.getDate()).padStart(2,'0');
    document.getElementById('fechaClase').value = yyyy + '-' + mm + '-' + dd;

    cambiarTab('registro');
  }

  function volverGrupos() {
    document.getElementById('vistaDetalle').style.display = 'none';
    document.getElementById('vistaGrupos').style.display = 'block';
    grupoActual = null;
  }

  // ── TABS ───────────────────────────────────────────────────────────
  function cambiarTab(tab) {
    tabActual = tab;
    document.getElementById('tabRegistro').classList.toggle('active', tab === 'registro');
    document.getElementById('tabCalif').classList.toggle('active', tab === 'calificaciones');
    document.getElementById('tabExamen').classList.toggle('active', tab === 'examen');
    document.getElementById('contenidoRegistro').style.display  = tab === 'registro' ? 'block' : 'none';
    document.getElementById('contenidoCalif').style.display     = tab === 'calificaciones' ? 'block' : 'none';
    document.getElementById('contenidoExamen').style.display    = tab === 'examen' ? 'block' : 'none';

    if (tab === 'registro')       renderRegistro();
    if (tab === 'calificaciones') cargarCalificaciones();
    if (tab === 'examen')         renderExamen();
  }

  // ── REGISTRO DIARIO ────────────────────────────────────────────────
  function renderRegistro() {
    var alumnos = grupoActual.alumnos || [];
    var lista   = document.getElementById('listaAlumnosRegistro');
    if (!alumnos.length) {
      lista.innerHTML = '<div class="empty-state"><p>No hay alumnos en este grupo.</p></div>';
      return;
    }
    lista.innerHTML = alumnos.map(function(a) {
      return '<div class="alumno-row" id="row-' + a.id + '">' +
        '<div class="alumno-row-header">' +
          '<span class="alumno-row-nombre">' + a.nombre + '</span>' +
          '<span class="alumno-row-id">' + a.id + '</span>' +
        '</div>' +
        '<div class="alumno-row-controles">' +
          '<div class="control-grupo">' +
            '<label>Asistencia</label>' +
            '<div class="control-btns">' +
              '<button class="ctrl-btn selected-A" id="asis-A-' + a.id + '" onclick="selAsist(\'' + a.id + '\',\'A\')">A</button>' +
              '<button class="ctrl-btn" id="asis-F-' + a.id + '" onclick="selAsist(\'' + a.id + '\',\'F\')">F</button>' +
            '</div>' +
          '</div>' +
          '<div class="control-grupo">' +
            '<label>Tarea</label>' +
            '<div class="control-btns">' +
              '<button class="ctrl-btn selected-T" id="tarea-T-' + a.id + '" onclick="selTarea(\'' + a.id + '\',\'T\')">T</button>' +
              '<button class="ctrl-btn" id="tarea-X-' + a.id + '" onclick="selTarea(\'' + a.id + '\',\'X\')">X</button>' +
            '</div>' +
          '</div>' +
          '<div class="control-grupo">' +
            '<label>Actitud (1-10)</label>' +
            '<input class="actitud-input" type="number" id="actitud-' + a.id + '" min="1" max="10" value="8" />' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function selAsist(idAlumno, valor) {
    document.getElementById('asis-A-' + idAlumno).className = 'ctrl-btn' + (valor === 'A' ? ' selected-A' : '');
    document.getElementById('asis-F-' + idAlumno).className = 'ctrl-btn' + (valor === 'F' ? ' selected-F' : '');
  }

  function selTarea(idAlumno, valor) {
    document.getElementById('tarea-T-' + idAlumno).className = 'ctrl-btn' + (valor === 'T' ? ' selected-T' : '');
    document.getElementById('tarea-X-' + idAlumno).className = 'ctrl-btn' + (valor === 'X' ? ' selected-X' : '');
  }

  function calcularUnidadSemana() {
    if (!grupoActual || !grupoActual.fechaInicio) return { unidad: 1, semana: 1 };
    var inicio = new Date(grupoActual.fechaInicio);
    var hoy    = new Date();
    var diff   = Math.floor((hoy - inicio) / (1000*60*60*24));
    var sem    = Math.max(1, Math.min(16, Math.ceil((diff + 1) / 7)));
    var unidad = sem <= 5 ? 1 : sem <= 10 ? 2 : sem <= 15 ? 3 : 4;
    return { unidad: unidad, semana: sem };
  }

  function guardarRegistro() {
    var alumnos = grupoActual.alumnos || [];
    var fecha   = document.getElementById('fechaClase').value;
    var btn     = document.getElementById('btnGuardar');
    if (!fecha) { mostrarToast('Selecciona la fecha de la clase', 'error'); return; }

    var uw = calcularUnidadSemana();
    var registros = alumnos.map(function(a) {
      var asistencia = document.getElementById('asis-A-' + a.id).classList.contains('selected-A') ? 'A' : 'F';
      var tarea      = document.getElementById('tarea-T-' + a.id).classList.contains('selected-T') ? 'T' : 'X';
      var actitud    = parseFloat(document.getElementById('actitud-' + a.id).value) || 8;
      actitud = Math.max(1, Math.min(10, actitud));
      return { idAlumno: a.id, asistencia: asistencia, actitud: actitud, tarea: tarea };
    });

    btn.textContent = 'Guardando...'; btn.disabled = true;

    fetch(APPS_SCRIPT + '?action=registrarClase&idGrupo=' + encodeURIComponent(grupoActual.id) +
      '&fecha=' + encodeURIComponent(fecha) +
      '&unidad=' + uw.unidad +
      '&semana=' + uw.semana +
      '&registros=' + encodeURIComponent(JSON.stringify(registros)))
      .then(r => r.json())
      .then(data => {
        btn.textContent = 'Guardar registro del día'; btn.disabled = false;
        if (data.success) {
          mostrarToast('Registro guardado correctamente', 'success');
        } else {
          mostrarToast('Error al guardar: ' + data.error, 'error');
        }
      })
      .catch(() => {
        btn.textContent = 'Guardar registro del día'; btn.disabled = false;
        mostrarToast('Error de conexión', 'error');
      });
  }

  // ── CALIFICACIONES ─────────────────────────────────────────────────
  function cargarCalificaciones() {
    var lista = document.getElementById('listaCalificaciones');
    lista.innerHTML = '<div class="loading">Calculando...</div>';
    fetch(APPS_SCRIPT + '?action=getCalificaciones&idGrupo=' + encodeURIComponent(grupoActual.id))
      .then(r => r.json())
      .then(data => {
        if (data.success) renderCalificaciones(data.calificaciones);
        else lista.innerHTML = '<div class="empty-state"><p>Error al cargar calificaciones.</p></div>';
      })
      .catch(() => { lista.innerHTML = '<div class="empty-state"><p>Error de conexión.</p></div>'; });
  }

  function renderCalificaciones(califs) {
    var lista = document.getElementById('listaCalificaciones');
    if (!califs || !califs.length) {
      lista.innerHTML = '<div class="empty-state"><p>Sin registros aún.</p></div>';
      return;
    }
    lista.innerHTML = califs.map(function(c) {
      var pct    = Math.round(c.total / 10 * 100);
      var color  = c.total >= 9 ? '#4ade80' : c.total >= 7 ? '#fb923c' : '#f87171';
      var status = c.totalClases === 0 ? 'en-curso' : (c.aprobado ? 'aprobado' : 'reprobado');
      var statusTxt = c.totalClases === 0 ? 'Sin registros' : (c.aprobado ? 'Aprobado' : 'Reprobado');
      return '<div class="calif-card">' +
        '<div class="calif-header">' +
          '<div>' +
            '<div class="calif-nombre">' + c.nombre + '</div>' +
            '<div style="color:var(--gris2);font-size:11px;">' + c.id + ' · ' + c.asistencias + '/' + c.totalClases + ' clases</div>' +
          '</div>' +
          '<div style="text-align:right;">' +
            '<div class="calif-total ' + (c.aprobado ? 'aprobado' : 'reprobado') + '">' + (c.total > 0 ? c.total.toFixed(1) : '—') + '</div>' +
            '<span class="status-chip ' + status + '">' + statusTxt + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="calif-desglose">' +
          '<div class="calif-item"><div class="calif-item-label">Asistencia</div><div class="calif-item-val">' + c.ptsAsistencia.toFixed(2) + '</div></div>' +
          '<div class="calif-item"><div class="calif-item-label">Actitud</div><div class="calif-item-val">' + c.ptsActitud.toFixed(2) + '</div></div>' +
          '<div class="calif-item"><div class="calif-item-label">Tareas</div><div class="calif-item-val">' + c.ptsTareas.toFixed(2) + '</div></div>' +
          '<div class="calif-item"><div class="calif-item-label">Examen</div><div class="calif-item-val">' + c.ptsExamen.toFixed(2) + '</div></div>' +
        '</div>' +
        '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%;background:' + color + ';"></div></div>' +
      '</div>';
    }).join('');
  }

  // ── EXAMEN ─────────────────────────────────────────────────────────
  function renderExamen() {
    var alumnos = grupoActual.alumnos || [];
    var lista   = document.getElementById('listaExamen');
    if (!alumnos.length) {
      lista.innerHTML = '<div class="empty-state"><p>No hay alumnos en este grupo.</p></div>';
      return;
    }
    lista.innerHTML = alumnos.map(function(a) {
      return '<div class="examen-row">' +
        '<div>' +
          '<div class="examen-nombre">' + a.nombre + '</div>' +
          '<div style="color:var(--gris2);font-size:11px;">' + a.id + '</div>' +
        '</div>' +
        '<input class="examen-input" type="number" id="exam-' + a.id + '" min="0" max="10" step="0.1" placeholder="0-10" />' +
      '</div>';
    }).join('');
  }

  function guardarExamen() {
    var alumnos = grupoActual.alumnos || [];
    var uw      = calcularUnidadSemana();
    var fecha   = new Date().toISOString().split('T')[0];
    var examenes = alumnos.map(function(a) {
      var cal = parseFloat(document.getElementById('exam-' + a.id).value);
      return { idAlumno: a.id, calificacion: isNaN(cal) ? 0 : Math.max(0, Math.min(10, cal)) };
    });

    fetch(APPS_SCRIPT + '?action=registrarExamen&idGrupo=' + encodeURIComponent(grupoActual.id) +
      '&unidad=' + uw.unidad +
      '&fecha=' + encodeURIComponent(fecha) +
      '&examenes=' + encodeURIComponent(JSON.stringify(examenes)))
      .then(r => r.json())
      .then(data => {
        if (data.success) mostrarToast('Calificaciones de examen guardadas', 'success');
        else mostrarToast('Error: ' + data.error, 'error');
      })
      .catch(() => mostrarToast('Error de conexión', 'error'));
  }

  // ── UTILIDADES ─────────────────────────────────────────────────────
  function mostrarToast(msg, tipo) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (tipo || '');
    setTimeout(function() { t.className = 'toast'; }, 3000);
  }

  function logout() {
    maestroData = null; panelData = null; grupoActual = null;
    document.getElementById('inputId').value = '';
    document.getElementById('inputClave').value = '';
    document.getElementById('screenPanel').classList.remove('active');
    document.getElementById('screenLogin').classList.add('active');
  }

  document.getElementById('inputClave').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Acceso Personal · Organic English</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy: #0f1c3f;
    --orange: #f97316;
    --orange-light: #fb923c;
    --orange-glow: rgba(249,115,22,0.18);
    --white: #f8fafc;
    --muted: #94a3b8;
    --border: rgba(255,255,255,0.09);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    background-image: url('https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/hero3.webp');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }

  .page {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .form-side {
    width: 100%;
    max-width: 700px;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    z-index: 2;
  }

  .form-side::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(249,115,22,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .form-wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    animation: fadeUp 0.9s 0.15s cubic-bezier(.22,1,.36,1) both;
  }

  .form-logo {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .form-logo img {
    height: 240px;
    object-fit: contain;
  }

  .form-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--white);
    text-align: center;
    margin-bottom: 6px;
  }

  .form-sub {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--white);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .form-input::placeholder { color: rgba(148,163,184,0.45); }

  .form-input:focus {
    border-color: rgba(249,115,22,0.5);
    background: rgba(249,115,22,0.05);
    box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
  }

  .btn-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--orange), #ea580c);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 15px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 8px 24px rgba(249,115,22,0.3);
  }

  .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(249,115,22,0.4); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .msg-error {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    margin-top: 14px;
    color: #f87171;
    font-size: 13px;
    text-align: center;
    line-height: 1.5;
  }

  .form-footer {
    margin-top: 28px;
    text-align: center;
    font-size: 12px;
    color: rgba(148,163,184,0.4);
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .modules-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    width: 100%;
    margin: 16px 0;
  }

  .module-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    background: linear-gradient(135deg, var(--orange), #ea580c);
    border: none;
    border-radius: 10px;
    color: #fff;
    text-decoration: none;
    transition: all 0.2s ease;
    box-shadow: 0 4px 16px rgba(249,115,22,0.35);
    width: 240px;
    justify-content: center;
  }

  .module-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(249,115,22,0.5);
  }

  .module-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }

  .module-name {
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
  }

  @media (max-width: 768px) {
    .form-side {
      width: calc(100% - 48px);
      padding: 48px 28px;
    }
  }
</style>
</head>

<!-- ═══════════════════════════════════════════════════
     HORARIO FLOTANTE — Pegar este bloque en cada módulo
     justo antes de </body>
     ═══════════════════════════════════════════════════ -->

<!-- Botón flotante -->
<button onclick="abrirHorario()" style="
  position:fixed;bottom:24px;right:24px;z-index:998;
  background:#1c2b5e;color:#fff;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:100px;padding:12px 20px;
  font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,0.35);
  display:flex;align-items:center;gap:8px;
  font-family:'Segoe UI',Arial,sans-serif;">
  📅 Horario
</button>

<!-- Overlay con iframe -->
<div id="horarioOverlay" style="
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,0.65);
  align-items:center;justify-content:center;">
  <iframe id="horarioFrame" src="" style="
    width:96%;max-width:1300px;height:92vh;
    border:none;border-radius:20px;
    box-shadow:0 25px 60px rgba(0,0,0,0.5);">
  </iframe>
</div>

<script>
function abrirHorario() {
  if (window.innerWidth < 768) {
    window.open('horario.html', '_blank');
    return;
  }
  var overlay = document.getElementById('horarioOverlay');
  var frame   = document.getElementById('horarioFrame');
  frame.src = 'horario.html';
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function cerrarHorario() {
  var overlay = document.getElementById('horarioOverlay');
  var frame   = document.getElementById('horarioFrame');
  overlay.style.display = 'none';
  frame.src = '';
  document.body.style.overflow = '';
}

// Escuchar mensaje de cierre desde el iframe
window.addEventListener('message', function(e) {
  if (e.data === 'cerrarHorario') cerrarHorario();
});

// Cerrar con clic en el fondo oscuro
document.getElementById('horarioOverlay').addEventListener('click', function(e) {
  if (e.target === this) cerrarHorario();
});
</script>
<!-- ═══════════════════════════════════════════════════ -->

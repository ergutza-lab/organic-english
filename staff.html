<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Acceso Personal · Organic English</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy: #0f1c3f;
    --orange: #f97316;
    --orange-light: #fb923c;
    --orange-glow: rgba(249,115,22,0.18);
    --white: #f8fafc;
    --muted: #94a3b8;
    --border: rgba(255,255,255,0.09);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── PANTALLA COMPLETA: hero + form en columnas ── */
  .page {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: stretch;
  }

  /* ── LADO IZQUIERDO: HERO ── */
  .hero-side {
    position: relative;
    flex: 1.1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 56px;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0.9;
  }

  /* overlay muy suave solo en los bordes */
  .hero-side::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right, rgba(15,28,63,0.15) 0%, transparent 60%),
      linear-gradient(to bottom, rgba(15,28,63,0.3) 0%, transparent 30%, transparent 70%, rgba(15,28,63,0.5) 100%);
    pointer-events: none;
  }

  .hero-inner {
    position: relative;
    z-index: 2;
    animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero-logo {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 48px;
  }

  .hero-logo img {
    height: 104px;
    object-fit: contain;
    filter: drop-shadow(0 2px 12px rgba(0,0,0,0.4));
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(15,28,63,0.55);
    border: 1px solid rgba(249,115,22,0.4);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--orange-light);
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }

  .badge-dot {
    width: 6px; height: 6px;
    background: var(--orange);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(1.5); }
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 3.5vw, 52px);
    font-weight: 700;
    line-height: 1.1;
    color: var(--white);
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    margin-bottom: 16px;
  }

  .hero-title em {
    font-style: italic;
    color: var(--orange-light);
  }

  .hero-subtitle {
    font-size: 14px;
    color: rgba(248,250,252,0.75);
    line-height: 1.7;
    max-width: 340px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.4);
  }

  /* ── LADO DERECHO: FORMULARIO ── */
  .form-side {
    flex: 0 0 420px;
    background: #0c1730;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 48px;
    position: relative;
    border-left: 1px solid rgba(255,255,255,0.06);
  }

  .form-side::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
  }

  /* glow sutil detrás del form */
  .form-side::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(249,115,22,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .form-wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    animation: fadeUp 0.9s 0.15s cubic-bezier(.22,1,.36,1) both;
  }

  .form-logo {
    display: flex;
    justify-content: center;
    margin-bottom: 32px;
  }

  .form-logo img {
    height: 112px;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }

  .form-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--white);
    text-align: center;
    margin-bottom: 6px;
  }

  .form-sub {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--white);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .form-input::placeholder { color: rgba(148,163,184,0.45); }

  .form-input:focus {
    border-color: rgba(249,115,22,0.5);
    background: rgba(249,115,22,0.05);
    box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
  }

  .btn-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--orange), #ea580c);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 15px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 8px 24px rgba(249,115,22,0.3);
  }

  .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(249,115,22,0.4); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .msg-error {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    margin-top: 14px;
    color: #f87171;
    font-size: 13px;
    text-align: center;
    line-height: 1.5;
  }

  .form-footer {
    margin-top: 28px;
    text-align: center;
    font-size: 12px;
    color: rgba(148,163,184,0.4);
  }

  /* ── SPINNER ── */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESPONSIVE: mobile = vertical ── */
  @media (max-width: 768px) {
    .page { flex-direction: column; }
    .hero-side {
      min-height: 42vh;
      padding: 40px 28px;
      flex: none;
    }
    .form-side {
      flex: none;
      width: 100%;
      padding: 48px 28px;
      border-left: none;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
  }
</style>
</head>
<body>

<div class="page">

  <!-- ── LADO IZQUIERDO: HERO ── -->
  <div class="hero-side">
    <img class="hero-bg" src="https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/hero3.png" alt="Organic English hero" />

    <div class="hero-inner">
      <div class="hero-logo">
        <img src="https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/logotransparente.png" alt="Organic English" />
      </div>

      <div class="hero-badge">
        <span class="badge-dot"></span>
        Portal de Personal
      </div>

      <h1 class="hero-title">Bienvenido al<br/><em>equipo OE</em></h1>
      <p class="hero-subtitle">Acceso exclusivo para asesores, maestros y personal administrativo de Organic English.</p>
    </div>
  </div>

  <!-- ── LADO DERECHO: FORMULARIO ── -->
  <div class="form-side">
    <div class="form-wrap">

      <div class="form-logo">
        <img src="https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/logotransparente.png" alt="Organic English" />
      </div>

      <h2 class="form-title">¿A dónde vas hoy?</h2>
      <p class="form-sub">Ingresa tu ID de personal y te llevamos directo a tu panel.</p>

      <div class="form-group">
        <label class="form-label" for="input-id">ID de personal</label>
        <input class="form-input" id="input-id" type="text" placeholder="Ej. ASE-01, ASI-02, CE-01" autocomplete="off" spellcheck="false" />
      </div>

      <button class="btn-submit" id="btn-login" onclick="handleLogin()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        Ir a mi panel
      </button>

      <div class="msg-error" id="msg-error"></div>

      <div class="form-footer">© 2025 Organic English · Uso exclusivo del personal</div>
    </div>
  </div>

</div>

<script>
  const ROLES = [
    { prefix: 'ASE-', panel: 'asesor.html' },
    { prefix: 'ASI-', panel: 'asistente-ce.html' },
    { prefix: 'COL-', panel: 'colocacion.html' },
    { prefix: 'CE-',  panel: 'control_ce.html' },
    { prefix: 'MAE-', panel: 'maestro.html' },
    { prefix: 'CA-',  panel: 'control-academico.html' },
    { prefix: 'DIR-', panel: 'director.html' },
  ];

  const PENDIENTES = ['maestro.html', 'control-academico.html', 'director.html'];

  function detectarRol(id) {
    return ROLES.find(r => id.toUpperCase().startsWith(r.prefix)) || null;
  }

  function mostrarError(msg) {
    const el = document.getElementById('msg-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function ocultarError() {
    document.getElementById('msg-error').style.display = 'none';
  }

  document.getElementById('input-id').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  function handleLogin() {
    const id  = document.getElementById('input-id').value.trim().toUpperCase();
    const btn = document.getElementById('btn-login');

    ocultarError();

    if (!id) {
      mostrarError('Por favor ingresa tu ID de personal.');
      return;
    }

    const rol = detectarRol(id);
    if (!rol) {
      mostrarError('ID no reconocido. Verifica el formato (ej. ASE-01, ASI-02, CE-01).');
      return;
    }

    if (PENDIENTES.includes(rol.panel)) {
      mostrarError('Este panel está en construcción. Estará disponible próximamente.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>&nbsp;Redirigiendo...';

    // Pequeña pausa para feedback visual antes de redirigir
    setTimeout(() => {
      window.location.href = rol.panel;
    }, 600);
  }
</script>
</body>
</html>

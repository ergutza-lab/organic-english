<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tutorial · Tu plataforma Organic English</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:#000;
  font-family:system-ui,sans-serif;
  overflow:hidden;
  position:fixed;
  -webkit-overflow-scrolling:touch;
}
.container{
  width:100vw;
  height:100vh;
  height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  position:relative;
}
video{
  /* Vertical 9:16 — ocupa todo el alto, ancho proporcional */
  height:100%;
  width:auto;
  max-width:100%;
  object-fit:contain;
  display:block;
  -webkit-playsinline:1;
}
.overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.25);
  cursor:pointer;
  transition:opacity 0.3s;
  -webkit-tap-highlight-color:transparent;
}
.overlay.hidden{opacity:0;pointer-events:none;}
.play-btn{
  width:80px;height:80px;border-radius:50%;
  background:rgba(255,255,255,0.92);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
  transition:transform 0.15s;
}
.overlay:active .play-btn{transform:scale(0.93);}
.play-btn svg{margin-left:6px;}
.title{
  position:absolute;top:0;left:0;right:0;
  padding:max(env(safe-area-inset-top),14px) 18px 28px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.55),transparent);
  color:rgba(255,255,255,0.75);
  font-size:13px;font-weight:500;
  letter-spacing:0.03em;
  pointer-events:none;
  text-align:center;
}
</style>
</head>
<body>
<div class="container">
  <video id="vid"
    preload="metadata"
    playsinline
    webkit-playsinline
    controls
    src="https://raw.githubusercontent.com/ergutza-lab/organic-english/main/images/tutorial_02.mp4">
  </video>
  <div class="title">Tutorial · Cómo usar tu plataforma</div>
  <div class="overlay" id="overlay" onclick="playVid()">
    <div class="play-btn">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="#111">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </div>
  </div>
</div>
<script>
var vid=document.getElementById('vid');
var ov=document.getElementById('overlay');
function playVid(){vid.play().catch(function(){});}
vid.addEventListener('play',function(){ov.classList.add('hidden');});
vid.addEventListener('pause',function(){if(!vid.ended)ov.classList.remove('hidden');});
vid.addEventListener('ended',function(){ov.classList.remove('hidden');});
document.body.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
</script>
</body>
</html>
